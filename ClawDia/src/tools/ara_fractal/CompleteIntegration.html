// ============================================================
// AGE GATE (Sprint 0) + one-click bypass
// ============================================================
(function setupAgeGate() {
  const gate = document.getElementById('age-gate');
  const monthSel = document.getElementById('ag-month');
  const daySel = document.getElementById('ag-day');
  const yearSel = document.getElementById('ag-year');
  const termsChk = document.getElementById('ag-terms');
  const enterBtn = document.getElementById('ag-enter');
  const errorDiv = document.getElementById('ag-error');
  const bypass = document.getElementById('bypass-age');

  // populate selects
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  for (let i=1;i<=12;i++) { let opt = document.createElement('option'); opt.value=i; opt.textContent=months[i-1]; monthSel.appendChild(opt); }
  for (let i=1;i<=31;i++) { let opt = document.createElement('option'); opt.value=i; opt.textContent=i; daySel.appendChild(opt); }
  const now = new Date();
  for (let y=now.getFullYear(); y>=now.getFullYear()-100; y--) {
    let opt = document.createElement('option'); opt.value=y; opt.textContent=y; yearSel.appendChild(opt);
  }

  function validate() {
    const m = parseInt(monthSel.value);
    const d = parseInt(daySel.value);
    const y = parseInt(yearSel.value);
    if (!m || !d || !y) return 'Select full date of birth';
    const dob = new Date(y, m-1, d);
    if (isNaN(dob.getTime())) return 'Invalid date';
    const adult = new Date(now.getFullYear()-18, now.getMonth(), now.getDate());
    if (dob > adult) return 'Must be 18+';
    if (!termsChk.checked) return 'Must accept terms';
    return null;
  }
  function updateButton() { enterBtn.disabled = !!validate(); errorDiv.textContent = validate() || ''; }
  monthSel.addEventListener('change', updateButton);
  daySel.addEventListener('change', updateButton);
  yearSel.addEventListener('change', updateButton);
  termsChk.addEventListener('change', updateButton);
  enterBtn.addEventListener('click', () => {
    if (!validate()) { sessionStorage.setItem('ara_age_verified', 'true'); gate.classList.add('hidden'); }
  });
  bypass.addEventListener('click', () => {
    sessionStorage.setItem('ara_age_verified', 'true');
    gate.classList.add('hidden');
  });
  if (sessionStorage.getItem('ara_age_verified') === 'true') gate.classList.add('hidden');
})();

// ExportGuard (mock payment token)
const ExportGuard = (() => {
  let activeToken = null;
  function issue(token) { activeToken = token; }
  function consume(token) { if (activeToken !== token) return false; activeToken = null; return true; }
  async function trigger(statePayload, token) {
    if (!consume(token)) throw new Error('Invalid export token');
    const json = JSON.stringify(statePayload, null, 0);
    const bytes = new TextEncoder().encode(json).length;
    if (bytes > 4*1024*1024) throw new Error(`Export exceeds 4MB (${(bytes/1048576).toFixed(2)}MB)`);
    const blob = new Blob([json], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = Object.assign(document.createElement('a'), { href: url, download: `ara_export_${Date.now()}.json` });
    a.click();
    requestAnimationFrame(() => URL.revokeObjectURL(url));
    a.remove();
  }
  return { issue, trigger };
})();
window.ExportGuard = ExportGuard;

// SovereignIntentParser (file drop + confirmation modal)
class SovereignIntentParser {
  constructor(activeToolGetter) { this.getActiveTool = activeToolGetter; this.registered = new Map(); }
  register(intent, handler) { this.registered.set(intent, handler); }
  async parseAndRoute(data) {
    let intent = 'unknown', payload = null;
    if (typeof data === 'string') {
      if (data.toLowerCase().includes('speak')) intent = 'speak', payload = data;
      else intent = 'text', payload = data;
    } else if (data instanceof File) {
      if (data.type.startsWith('image/')) intent = 'image', payload = data;
      else if (data.type === 'audio/mpeg') intent = 'audio', payload = data;
      else if (data.name.endsWith('.json')) intent = 'json', payload = data;
      else intent = 'file', payload = data;
    }
    const tool = this.getActiveTool();
    const handler = this.registered.get(`${tool}:${intent}`) || this.registered.get(`*:${intent}`);
    if (handler) {
      this._confirm(intent, payload, async (confirmed) => { if (confirmed) await handler(payload); });
    } else { toast(`No handler for ${intent} in ${tool}`); }
  }
  _confirm(intent, payload, callback) {
    const modal = document.createElement('div');
    modal.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:2000;display:flex;align-items:center;justify-content:center;';
    modal.innerHTML = `<div style="background:#111;border:1px solid #333;border-radius:12px;padding:24px;max-width:400px;">
      <div style="color:#d29b83">Intent: ${intent}</div>
      <div style="margin:12px 0;font-size:12px;color:#aaa;">${payload instanceof File ? payload.name : (String(payload).substring(0,200))}</div>
      <div style="display:flex;gap:12px;justify-content:flex-end;">
        <button id="confirm-yes" style="background:#9b2a2a;border:none;color:#fff;padding:6px 16px;border-radius:4px;cursor:pointer;">CONFIRM</button>
        <button id="confirm-no" style="background:#222;border:none;color:#aaa;padding:6px 16px;border-radius:4px;cursor:pointer;">VETO</button>
      </div>
    </div>`;
    document.body.appendChild(modal);
    modal.querySelector('#confirm-yes').onclick = () => { modal.remove(); callback(true); };
    modal.querySelector('#confirm-no').onclick = () => { modal.remove(); callback(false); };
  }
}

const tools = {

async function switchTool(toolId) {
  if (activeToolInstance && tools[activeTool]?.destroy) tools[activeTool].destroy();
  document.getElementById('tool-container').innerHTML = '';
  activeTool = toolId;
  activeToolInstance = null;
  await tools[toolId].init();
  document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
  document.querySelector(`.nav-btn[data-tool="${toolId}"]`)?.classList.add('active');
  toast(`Switched to ${tools[toolId].name}`);
}

// ============================================================
// MANIFEST EDITOR (full port from manifest_editor.html)
// ============================================================
let manifestJson = null;
let manifestSelectedPath = [];
let manifestExpanded = new Set();

function initManifestEditor() {
  const container = document.getElementById('tool-container');
  container.innerHTML = `
    <div style="display:flex; height:100%; gap:12px; padding:12px; background:#0a0a0a;">
      <div style="width:30%; background:#0f172a; border-radius:12px; overflow:auto; padding:12px;">
        <h4 style="margin-bottom:8px;">📁 MANIFEST TREE</h4>
        <div id="manifest-tree"></div>
        <button id="manifest-import" style="margin-top:12px;">📂 Import JSON</button>
        <input type="file" id="manifest-file-input" accept=".json" style="display:none">
      </div>
      <div style="flex:1; background:#0f172a; border-radius:12px; overflow:auto; padding:12px;">
        <h4>✏️ Direct Edit</h4>
        <div id="manifest-editor-area"></div>
      </div>
      <div style="width:30%; background:#0f172a; border-radius:12px; overflow:auto; padding:12px;">
        <h4>📎 Artifact Viewer</h4>
        <div id="manifest-artifact-viewer">Select a property</div>
      </div>
    </div>`;
  // default manifest
  manifestJson = {
    "VAN_ENGINE_COMPANION_MANIFEST": {
      "manifest_version": "2.0.0",
      "COMPANION_MODES": { "ChatMode": { "description": "Conversational" } }
    }
  };
  function renderTree() {
    const containerDiv = document.getElementById('manifest-tree');
    if (!containerDiv) return;
    function buildTree(obj, path=[]) {
      let html = '';
      for (let [k, v] of Object.entries(obj)) {
        const curPath = [...path, k];
        const pk = JSON.stringify(curPath);
        const isExpanded = manifestExpanded.has(pk);
        const hasChildren = v && typeof v === 'object';
        html += `<div class="manifest-tree-node">
          <div class="manifest-row ${manifestSelectedPath.length && JSON.stringify(manifestSelectedPath)===pk ? 'selected' : ''}" data-path='${JSON.stringify(curPath)}'>
            <span class="tree-toggle" style="cursor:pointer;width:16px;">${hasChildren ? (isExpanded ? '▼' : '▶') : '•'}</span>
            <span><strong>${k}</strong></span>
            <span style="color:#888;margin-left:8px;">${hasChildren ? `{${Object.keys(v).length}}` : (typeof v === 'string' ? v.slice(0,20) : JSON.stringify(v).slice(0,20))}</span>
          </div>`;
        if (hasChildren && isExpanded) html += `<div style="margin-left:20px;">${buildTree(v, curPath)}</div>`;
        html += `</div>`;
      }
      return html;
    }
    containerDiv.innerHTML = buildTree(manifestJson);
    // attach events
    containerDiv.querySelectorAll('.manifest-row').forEach(row => {
      row.addEventListener('click', (e) => {
        e.stopPropagation();
        const path = JSON.parse(row.dataset.path);
        manifestSelectedPath = path;
        renderTree();
        renderEditor();
      });
      const toggleSpan = row.querySelector('.tree-toggle');
      if (toggleSpan) toggleSpan.addEventListener('click', (e) => {
        e.stopPropagation();
        const path = JSON.parse(row.parentElement.querySelector('.manifest-row').dataset.path);
        const pk = JSON.stringify(path);
        if (manifestExpanded.has(pk)) manifestExpanded.delete(pk);
        else manifestExpanded.add(pk);
        renderTree();
      });
    });
  }
  function renderEditor() {
    const area = document.getElementById('manifest-editor-area');
    if (!area) return;
    let node = manifestJson;
    for (let seg of manifestSelectedPath) node = node?.[seg];
    if (!node || typeof node !== 'object') {
      area.innerHTML = `<div>Primitive value: <input type="text" id="primitiveEdit" value="${String(node??'')}"></div>`;
      const inp = document.getElementById('primitiveEdit');
      if (inp) inp.addEventListener('change', () => {
        let val = inp.value;
        try { val = JSON.parse(val); } catch(e) {}
        let cur = manifestJson;
        for(let i=0;i<manifestSelectedPath.length-1;i++) cur = cur[manifestSelectedPath[i]];
        cur[manifestSelectedPath[manifestSelectedPath.length-1]] = val;
        renderTree(); renderEditor();
      });
      return;
    }
    let html = '';
    for (let [k, v] of Object.entries(node)) {
      const isComplex = v && typeof v === 'object';
      html += `<div class="collapsible-card" data-key="${k}">
        <div class="collapsible-header"><span>${k}</span>
        ${!isComplex ? `<input type="text" value='${String(v).replace(/'/g,"&apos;")}' data-key="${k}" class="inline-edit">` : `<span class="value-badge">${Array.isArray(v)?'array':'object'} (${Object.keys(v).length})</span>`}
        </div>
        <div class="collapsible-content">${isComplex ? 'Complex value – use artifact viewer' : ''}</div>
      </div>`;
    }
    area.innerHTML = html;
    area.querySelectorAll('.collapsible-header').forEach(h => h.addEventListener('click', (e) => {
      if (e.target.tagName === 'INPUT') return;
      h.parentElement.classList.toggle('open');
    }));
    area.querySelectorAll('.inline-edit').forEach(inp => inp.addEventListener('change', (e) => {
      let parent = manifestJson;
      for(let i=0;i<manifestSelectedPath.length;i++) parent = parent[manifestSelectedPath[i]];
      let val = inp.value;
      try { val = JSON.parse(val); } catch(e) {}
      parent[inp.dataset.key] = val;
      renderTree(); renderEditor();
    }));
  }
  renderTree();
  renderEditor();
  document.getElementById('manifest-import')?.addEventListener('click', () => document.getElementById('manifest-file-input').click());
  document.getElementById('manifest-file-input')?.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try { manifestJson = JSON.parse(ev.target.result); manifestSelectedPath = []; manifestExpanded.clear(); renderTree(); renderEditor(); toast('Manifest imported'); }
      catch(e){ toast('Invalid JSON'); }
    };
    reader.readAsText(file);
    e.target.value = '';
  });
}
function destroyManifestEditor() {}

// ============================================================
// BEHAVIOUR TREE (full port from sprint7.html)
// ============================================================
let btTree = null;
let btSelectedId = null;
let btNodes = [];
let btNextId = 1;
class BTNode {
  constructor(name, type) { this.id = btNextId++; this.name=name; this.type=type; this.state='IDLE'; this.children=[]; this.parent=null; }
  addChild(c) { c.parent=this; this.children.push(c); return c; }
}
function btTick(node) {
  if (node.type === 'Action') { node.state = 'SUCCESS'; return 'SUCCESS'; }
  if (node.type === 'Sequence') {
    for(let c of node.children) { let r = btTick(c); if(r==='FAILURE') { node.state='FAILURE'; return 'FAILURE'; } if(r==='RUNNING') { node.state='RUNNING'; return 'RUNNING'; } }
    node.state='SUCCESS'; return 'SUCCESS';
  }
  return 'SUCCESS';
}
function btReset(node) { node.state='IDLE'; node.children.forEach(btReset); }
function renderBT() {
  const container = document.getElementById('bt-container');
  if(!container) return;
  function renderNode(node, depth) {
    let html = `<div class="bt-tree-node" data-id="${node.id}" style="padding-left:${12+depth*20}px">
      <span class="bt-status-dot bt-status-${node.state}"></span>
      <span><strong>${node.name}</strong> (${node.type})</span>
    </div>`;
    if(node.children.length){
      html += `<div class="bt-children">${node.children.map(c=>renderNode(c,depth+1)).join('')}</div>`;
    }
    return html;
  }
  container.innerHTML = renderNode(btTree,0);
  container.querySelectorAll('.bt-tree-node').forEach(el=>{
    el.addEventListener('click',()=>{ btSelectedId = parseInt(el.dataset.id); renderBT(); renderBTDetail(); });
    if(btSelectedId === parseInt(el.dataset.id)) el.style.background='#2a3f6e';
  });
}
function renderBTDetail() {
  const div = document.getElementById('bt-detail');
  if(!div) return;
  function findNode(id, node=btTree) {
    if(node.id===id) return node;
    for(let c of node.children) { let f=findNode(id,c); if(f) return f; }
    return null;
  }
  const node = findNode(btSelectedId);
  if(!node) { div.innerHTML='<div>Select a node</div>'; return; }
  div.innerHTML = `
    <div><strong>${node.name}</strong> (${node.type})</div>
    <div>Status: ${node.state}</div>
    <div>Children: ${node.children.length}</div>
    <button id="bt-set-success">Set Success</button>
    <button id="bt-set-failure">Set Failure</button>
    <button id="bt-delete">Delete</button>
  `;
  document.getElementById('bt-set-success')?.addEventListener('click',()=>{ node.state='SUCCESS'; renderBT(); renderBTDetail(); });
  document.getElementById('bt-set-failure')?.addEventListener('click',()=>{ node.state='FAILURE'; renderBT(); renderBTDetail(); });
  document.getElementById('bt-delete')?.addEventListener('click',()=>{
    if(node.parent) { node.parent.children = node.parent.children.filter(c=>c!==node); if(btSelectedId===node.id) btSelectedId=btTree.id; renderBT(); renderBTDetail(); }
  });
}
function initBehaviourTree() {
  const container = document.getElementById('tool-container');
  container.innerHTML = `
    <div style="display:flex; height:100%; gap:12px; padding:12px;">
      <div style="width:60%; background:#0f172a; border-radius:12px; padding:12px; overflow:auto;">
        <h4>🌳 Behaviour Tree</h4>
        <div id="bt-container"></div>
        <div style="margin-top:12px;">
          <input id="bt-name" placeholder="Task name"><select id="bt-type"><option>Action</option><option>Sequence</option></select>
          <button id="bt-add">Add under selected</button>
          <button id="bt-tick">▶ Tick</button>
          <button id="bt-reset">⟲ Reset</button>
        </div>
      </div>
      <div style="flex:1; background:#0f172a; border-radius:12px; padding:12px;">
        <h4>Detail</h4>
        <div id="bt-detail"></div>
      </div>
    </div>`;
  btTree = new BTNode('ROOT', 'Sequence');
  btSelectedId = btTree.id;
  renderBT(); renderBTDetail();
  document.getElementById('bt-add')?.addEventListener('click',()=>{
    const name = document.getElementById('bt-name').value.trim() || 'task';
    const type = document.getElementById('bt-type').value;
    const newNode = new BTNode(name, type);
    let parent = btTree;
    if(btSelectedId) {
      function find(id,n){ if(n.id===id) return n; for(let c of n.children) { let f=find(id,c); if(f) return f; } return null; }
      let p = find(btSelectedId, btTree);
      if(p && p.type !== 'Action') parent = p;
    }
    parent.addChild(newNode);
    renderBT();
  });
  document.getElementById('bt-tick')?.addEventListener('click',()=>{ btTick(btTree); renderBT(); renderBTDetail(); });
  document.getElementById('bt-reset')?.addEventListener('click',()=>{ btReset(btTree); renderBT(); renderBTDetail(); });
}
function destroyBehaviourTree() {}

document.querySelectorAll('.nav-btn[data-tool]').forEach(btn => {
  btn.addEventListener('click', () => switchTool(btn.dataset.tool));
});
document.getElementById('export-btn').addEventListener('click', () => {
  const mockToken = 'tok_1ff_test_' + Date.now();
  ExportGuard.issue(mockToken);
  const state = { tool: activeTool, timestamp: Date.now(), manifest: manifestJson, bt: btTree ? JSON.parse(JSON.stringify(btTree)) : null };
  ExportGuard.trigger(state, mockToken).catch(e => toast(e.message));
});
// Default tool
switchTool('manifest');
// Intent parser for file drops (global)
const parser = new SovereignIntentParser(() => activeTool);
parser.register('*:image', (file) => toast(`Image drop to ${activeTool} – would load here`));
parser.register('*:audio', (file) => toast(`Audio drop to ${activeTool} – would stream`));
parser.register('*:json', async (file) => { const text = await file.text(); toast(`JSON dropped, would merge`); });
window.addEventListener('dragover', e => e.preventDefault());
window.addEventListener('drop', e => {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if (file) parser.parseAndRoute(file);
});
toast('VAN ENGINE V2 · Ready');
