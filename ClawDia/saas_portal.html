<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SAAS Hooks Portal</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d1117;color:#e6edf3;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;max-width:960px;margin:0 auto;padding:2rem 1.5rem}
h1{font-size:1.8rem;font-weight:700;margin-bottom:.25rem;color:#f0f6fc}
.subtitle{color:#8b949e;margin-bottom:1.5rem;font-size:.95rem}
.search{width:100%;padding:.6rem .75rem;background:#0d1117;color:#e6edf3;border:1px solid #30363d;border-radius:8px;font-size:.95rem;margin-bottom:1.5rem}
.search:focus{outline:none;border-color:#58a6ff}
.cat-group{margin-bottom:1.5rem;border:1px solid #21262d;border-radius:10px;overflow:hidden}
.cat-header{display:flex;align-items:center;gap:.5rem;padding:.7rem 1rem;background:#161b22;cursor:pointer;user-select:none;transition:.15s}
.cat-header:hover{background:#1c2128}
.cat-header .arrow{transition:transform .2s;font-size:.7rem;color:#58a6ff}
.cat-header .arrow.open{transform:rotate(90deg)}
.cat-title{font-size:.85rem;text-transform:uppercase;letter-spacing:.06em;color:#58a6ff;font-weight:600}
.cat-count{font-size:.7rem;color:#8b949e;background:#21262d;padding:0 6px;border-radius:6px;margin-left:auto}
.cat-body{display:none}
.cat-body.open{display:block}
.hook-link{display:block;padding:.6rem 1rem;border-top:1px solid #21262d;text-decoration:none;color:#e6edf3;transition:.15s}
.hook-link:hover{background:#1c2128}
.hook-link .name{font-weight:600;color:#58a6ff;font-size:.9rem}
.hook-link .desc{font-size:.82rem;color:#8b949e;margin-top:2px}
.badge{display:inline-block;font-size:.68rem;padding:1px 6px;border-radius:4px;background:#1f2937;color:#8b949e;margin-left:6px;vertical-align:middle}
.status-bar{display:flex;align-items:center;gap:.5rem;padding:.5rem 1rem;border-radius:8px;margin-bottom:1rem;font-size:.85rem}
.status-bar.online{background:#1a3a2a;color:#3fb950}
.status-bar.offline{background:#3d1114;color:#f85149}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.dot.online{background:#3fb950}
.dot.offline{background:#f85149}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid #30363d;border-top-color:#58a6ff;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{text-align:center;padding:3rem;color:#8b949e}
.error-msg{padding:1rem;border-radius:8px;background:#3d1114;border:1px solid #da3633;color:#ffa198;margin-bottom:1rem}
#endpoint-input{width:100%;padding:.5rem .75rem;background:#0d1117;color:#e6edf3;border:1px solid #30363d;border-radius:6px;font-size:.82rem;font-family:monospace;margin-bottom:.75rem}
#endpoint-input:focus{outline:none;border-color:#58a6ff}
@media(max-width:600px){body{padding:1rem}.hook-link{padding:.5rem .75rem}}
</style>
</head>
<body>

<h1>SAAS Hooks API</h1>
<p class="subtitle">Click a hook to open its UI — no signup, no API key</p>

<div id="statusBar"></div>

<input type="text" id="endpoint-input" placeholder="Server URL (e.g. http://127.0.0.1:8001)" spellcheck="false">

<input type="text" id="search" class="search" placeholder="Filter hooks by name or description…" oninput="filterHooks()">

<div id="menu"></div>

<script>
var DEFAULT_SERVER = 'http://127.0.0.1:8001';
// If the HTML is served via http/https, dynamically default to that host origin instead of forcing port 8001
if (window.location.protocol.startsWith('http')) {
  DEFAULT_SERVER = window.location.origin;
}
var SERVER = localStorage.getItem('saas_endpoint') || DEFAULT_SERVER;
document.getElementById('endpoint-input').placeholder = 'Server URL (default: ' + DEFAULT_SERVER + ')';
document.getElementById('endpoint-input').value = SERVER;

document.getElementById('endpoint-input').addEventListener('change', function() {
  SERVER = this.value.replace(/\/+$/, '');
  localStorage.setItem('saas_endpoint', SERVER);
  loadMenu();
});

async function loadMenu() {
  var menu = document.getElementById('menu');
  var status = document.getElementById('statusBar');
  menu.innerHTML = '<div class="loading"><div class="spinner"></div><br>Connecting to ' + SERVER + '…</div>';
  status.innerHTML = '<div class="status-bar"><span class="dot"></span> Connecting…</div>';

  try {
    var resp = await fetch(SERVER + '/hooks/', { signal: AbortSignal.timeout(5000) });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    var data = await resp.json();

    // Normalise: data might be {hooks:[...]} or [...]
    var hooks = Array.isArray(data) ? data : (data.hooks || []);
    // Each hook: {hook:name, manifest:{...}} or {name:..., ...}
    var byCat = {};
    hooks.forEach(function(h) {
      var m = h.manifest || h;
      var name = h.hook || m.name || '?';
      var cat = m.category || 'general';
      var desc = (m.description || '').substring(0, 90);
      var tags = m.tags || [];
      if (!byCat[cat]) byCat[cat] = [];
      byCat[cat].push({ name: name, desc: desc, tags: tags });
    });

    var cats = Object.keys(byCat).sort();
    status.innerHTML = '<div class="status-bar online"><span class="dot online"></span> ' + SERVER + ' — ' + hooks.length + ' hooks online</div>';

    var html = '';
    cats.forEach(function(cat) {
      var items = byCat[cat].sort(function(a,b) { return a.name.localeCompare(b.name); });
      html += '<div class="cat-group" data-cat="' + cat + '">';
      html += '<div class="cat-header" onclick="toggleCat(this)">';
      html += '<span class="arrow open">▶</span>';
      html += '<span class="cat-title">' + cat + '</span>';
      html += '<span class="cat-count">' + items.length + '</span>';
      html += '</div>';
      html += '<div class="cat-body open">';
      items.forEach(function(item) {
        var badges = item.tags.slice(0,3).map(function(t) { return '<span class="badge">' + t + '</span>'; }).join('');
        html += '<a href="' + SERVER + '/hooks/ui/' + encodeURIComponent(item.name) + '" class="hook-link" target="_blank">';
        html += '<div><span class="name">' + item.name + '</span>' + badges + '</div>';
        html += '<div class="desc">' + item.desc + '</div>';
        html += '</a>';
      });
      html += '</div></div>';
    });
    menu.innerHTML = html;
  } catch(e) {
    status.innerHTML = '<div class="status-bar offline"><span class="dot offline"></span> Cannot reach ' + SERVER + ' — ' + e.message + '</div>';
    menu.innerHTML = '<div class="error-msg">Could not connect. Make sure the server is running.<br><br><b>Tip:</b> If you are running the server on a different port or machine, update the URL above.</div>';
  }
}

function toggleCat(header) {
  var body = header.nextElementSibling;
  var arrow = header.querySelector('.arrow');
  body.classList.toggle('open');
  arrow.classList.toggle('open');
}

function filterHooks() {
  var q = document.getElementById('search').value.toLowerCase();
  document.querySelectorAll('.hook-link').forEach(function(el) {
    el.style.display = el.textContent.toLowerCase().includes(q) ? 'block' : 'none';
  });
  document.querySelectorAll('.cat-group').forEach(function(g) {
    var visible = Array.from(g.querySelectorAll('.hook-link')).some(function(l) { return l.style.display !== 'none'; });
    g.style.display = visible ? 'block' : 'none';
  });
}

loadMenu();
</script>
</body>
</html>
