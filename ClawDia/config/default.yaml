clawdia:
  name: "ClawDia"
  version: "0.1.0"
  debug: false
  log_level: "INFO"

memory:
  episodic:
    database_path: "memory/episodic/conversations.db"
    vector_dim: 384
    faiss_index_path: "memory/episodic/embeddings.faiss"
  semantic:
    graph_path: "memory/semantic/graph.jsonl"
    schema_path: "memory/semantic/schema.yaml"

models:
  embedding:
    name: "all-MiniLM-L6-v2"
    cache_dir: "models/embeddings/"
  whisper:
    model_size: "base"
    device: "cpu"
  piper:
    model_path: "models/piper/"
    voice: "female_base"

data:
  cache_dir: "data/cache/"
  voice_samples: "data/voice_samples/"
  knowledge: "data/knowledge/"

ui:
  theme: "dark"
  enable_voice: false
  language: "en-US"
