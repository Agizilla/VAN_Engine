<!DOCTYPE html>
<html>
<head>
<style>
  body { background: #1e1e2f; display: flex; justify-content: center; align-items: center; height: 100vh; }
  svg { background: #2a2a3b; border-radius: 20px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
  .control-panel { margin-top: 20px; text-align: center; color: white; font-family: monospace; }
  button { margin: 5px; padding: 8px 16px; font-size: 16px; cursor: pointer; }
</style>
</head>
<body>
<div>
  <svg id="canvas" width="600" height="400" viewBox="0 0 600 400">
    <!-- Floor -->
    <line x1="20" y1="350" x2="580" y2="350" stroke="#888" stroke-width="2" stroke-dasharray="5,5"/>
    
    <!-- Stick Figure Group -->
    <g id="figure" transform="translate(300, 200)">
      <!-- Head -->
      <circle cx="0" cy="-50" r="20" fill="none" stroke="white" stroke-width="3"/>
      <!-- Spine -->
      <line id="spine" x1="0" y1="-30" x2="0" y2="30" stroke="white" stroke-width="3"/>
      <!-- Left arm (animated) -->
      <line id="leftArm" x1="0" y1="-15" x2="-25" y2="5" stroke="white" stroke-width="3" stroke-linecap="round"/>
      <!-- Right arm (animated) -->
      <line id="rightArm" x1="0" y1="-15" x2="25" y2="5" stroke="white" stroke-width="3" stroke-linecap="round"/>
      <!-- Left leg (animated) -->
      <line id="leftLeg" x1="0" y1="30" x2="-20" y2="60" stroke="white" stroke-width="3" stroke-linecap="round"/>
      <!-- Right leg (animated) -->
      <line id="rightLeg" x1="0" y1="30" x2="20" y2="60" stroke="white" stroke-width="3" stroke-linecap="round"/>
    </g>
  </svg>
  <div class="control-panel">
    <button id="leftBtn">← Left</button>
    <button id="rightBtn">Right →</button>
    <button id="upBtn">↑ Up</button>
    <button id="downBtn">↓ Down</button>
    <button id="stopBtn">Stop</button>
    <p>Or use Arrow Keys. Walking cycle auto‑plays while moving.</p>
  </div>
</div>

<script>
  const figure = document.getElementById('figure');
  let x = 300, y = 200;
  let moving = false;
  let direction = { x: 0, y: 0 };
  let walkCycle = 0;
  let animFrame;

  // Limb angle ranges (degrees from vertical/horizontal)
  const armSwing = 25;    // max offset from neutral
  const legSwing = 20;
  
  function updatePose() {
    // Neutral positions (arms slightly out, legs vertical)
    let leftArmAngle = -20;
    let rightArmAngle = 20;
    let leftLegAngle = 20;
    let rightLegAngle = -20;
    
    if (moving) {
      // Walking cycle: sin wave between -swing and +swing
      const t = Date.now() / 150;  // speed of walk
      const swing = Math.sin(t);
      leftArmAngle = -20 + swing * armSwing;
      rightArmAngle = 20 - swing * armSwing;
      leftLegAngle = 20 - swing * legSwing;
      rightLegAngle = -20 + swing * legSwing;
    }
    
    // Apply rotations (limb endpoints relative to shoulder/hip)
    const leftArm = document.getElementById('leftArm');
    const rightArm = document.getElementById('rightArm');
    const leftLeg = document.getElementById('leftLeg');
    const rightLeg = document.getElementById('rightLeg');
    
    // Arm length 25, start at shoulder (0,-15)
    const shoulderY = -15;
    const leftArmX = -25 * Math.cos(leftArmAngle * Math.PI/180);
    const leftArmY = shoulderY + 25 * Math.sin(leftArmAngle * Math.PI/180);
    leftArm.setAttribute('x2', leftArmX);
    leftArm.setAttribute('y2', leftArmY);
    
    const rightArmX = 25 * Math.cos(rightArmAngle * Math.PI/180);
    const rightArmY = shoulderY + 25 * Math.sin(rightArmAngle * Math.PI/180);
    rightArm.setAttribute('x2', rightArmX);
    rightArm.setAttribute('y2', rightArmY);
    
    // Leg length 30, start at hip (0,30)
    const hipY = 30;
    const leftLegX = -20 * Math.cos(leftLegAngle * Math.PI/180);
    const leftLegY = hipY + 20 * Math.sin(leftLegAngle * Math.PI/180);
    leftLeg.setAttribute('x2', leftLegX);
    leftLeg.setAttribute('y2', leftLegY);
    
    const rightLegX = 20 * Math.cos(rightLegAngle * Math.PI/180);
    const rightLegY = hipY + 20 * Math.sin(rightLegAngle * Math.PI/180);
    rightLeg.setAttribute('x2', rightLegX);
    rightLeg.setAttribute('y2', rightLegY);
  }
  
  function move() {
    if (!moving) return;
    x += direction.x * 3;
    y += direction.y * 3;
    // Boundaries
    x = Math.min(550, Math.max(50, x));
    y = Math.min(300, Math.max(100, y));
    figure.setAttribute('transform', `translate(${x}, ${y})`);
    updatePose();
    animFrame = requestAnimationFrame(move);
  }
  
  function startMove(dx, dy) {
    if (moving && direction.x === dx && direction.y === dy) return;
    direction = { x: dx, y: dy };
    moving = true;
    if (animFrame) cancelAnimationFrame(animFrame);
    animFrame = requestAnimationFrame(move);
  }
  
  function stopMove() {
    moving = false;
    if (animFrame) cancelAnimationFrame(animFrame);
    // Reset limbs to neutral static pose
    updatePose(); // with moving=false, uses neutral angles
  }
  
  // Keyboard control
  window.addEventListener('keydown', (e) => {
    switch(e.key) {
      case 'ArrowLeft': startMove(-1, 0); break;
      case 'ArrowRight': startMove(1, 0); break;
      case 'ArrowUp': startMove(0, -1); break;
      case 'ArrowDown': startMove(0, 1); break;
      default: return;
    }
    e.preventDefault();
  });
  window.addEventListener('keyup', (e) => {
    if (e.key.startsWith('Arrow')) {
      stopMove();
    }
  });
  
  // Button controls
  document.getElementById('leftBtn').onclick = () => startMove(-1,0);
  document.getElementById('rightBtn').onclick = () => startMove(1,0);
  document.getElementById('upBtn').onclick = () => startMove(0,-1);
  document.getElementById('downBtn').onclick = () => startMove(0,1);
  document.getElementById('stopBtn').onclick = () => stopMove();
  
  // Initial pose
  updatePose();
</script>
</body>
</html>
