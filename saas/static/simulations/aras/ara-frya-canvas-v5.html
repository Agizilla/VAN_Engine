// ─── FRACTAL FIELD ──────────────────────────────────────────────────
function genFractalField(count, seed) {
  const pts = [];
  const side = Math.ceil(Math.sqrt(count));
  const sp = 400 / side;
  for(let i=0;i<side;i++) for(let j=0;j<side;j++){
    if(pts.length>=count) break;
    const x = -200+sp/2+i*sp+(Math.random()-.5)*sp*.6;
    const y = -200+sp/2+j*sp+(Math.random()-.5)*sp*.6;
    // Fractal displacement: layered noise using seed
    const n1 = Math.sin(x*0.05+seed)*Math.cos(y*0.05+seed*0.7);
    const n2 = Math.sin(x*0.1+seed*1.3)*Math.cos(y*0.1+seed*0.9);
    const n3 = Math.sin(x*0.02-seed*2.1)*Math.cos(y*0.02+seed*1.7);
    const disp = (n1+n2+n3)/3;
    pts.push({
      x:x+disp*20, y:y+disp*20,
      sp:.1+Math.random()*.4, ph:Math.random()*Math.PI*2,
      seed:seed, baseX:x, baseY:y,
    });
  }
  return pts;
}

// ─── AMBIENT FIELD (fallback) ──────────────────────────────────────
function genField(count) {
  const side = Math.ceil(Math.sqrt(count));
  const sp = 400 / side;
  const pts = [];
  for(let i=0;i<side;i++) for(let j=0;j<side;j++){
    if(pts.length>=count) break;
    pts.push({x:-200+sp/2+i*sp+(Math.random()-.5)*sp*.6,y:-200+sp/2+j*sp+(Math.random()-.5)*sp*.6,sp:.2+Math.random()*.5,ph:Math.random()*Math.PI*2});
  }
  return pts;
}

// ─── APPLY EMOTION + MOUTH TRANSFORMS ──────────────────────────────
function buildFace(transform, amp) {
  const f = DLIB.map(p => [...p]);
  for(let i=17;i<=26;i++) f[i][1] += transform.bY;
  const eyeCenters = {l:{cx:-38,cy:-50},r:{cx:38,cy:-50}};
  for(let i=36;i<=41;i++){
    const dy = f[i][1] - eyeCenters.l.cy;
    f[i][1] = eyeCenters.l.cy + dy * (1 + (1-transform.eO)*0.5);
    const dx = f[i][0] - eyeCenters.l.cx;
    f[i][0] = eyeCenters.l.cx + dx * (1 + (1-transform.eO)*0.2);
  }
  for(let i=42;i<=47;i++){
    const dy = f[i][1] - eyeCenters.r.cy;
    f[i][1] = eyeCenters.r.cy + dy * (1 + (1-transform.eO)*0.5);
    const dx = f[i][0] - eyeCenters.r.cx;
    f[i][0] = eyeCenters.r.cx + dx * (1 + (1-transform.eO)*0.2);
  }
  const smileOff = transform.mS;
  f[48][1] -= smileOff*0.5; f[48][0] -= smileOff*0.3;
  f[59][1] -= smileOff*0.5; f[59][0] += smileOff*0.3;
  f[49][1] -= smileOff*0.4; f[58][1] -= smileOff*0.4;
  f[50][1] -= smileOff*0.3; f[57][1] -= smileOff*0.3;
  f[51][1] -= smileOff*0.2; f[56][1] -= smileOff*0.2;
  const mo = transform.mO + amp * 0.8;
  for(let i=48;i<=53;i++) f[i][1] -= mo * 6;
  for(let i=55;i<=59;i++) f[i][1] += mo * 6;
  for(let i=60;i<=63;i++) f[i][1] -= mo * 7;
  for(let i=65;i<=67;i++) f[i][1] += mo * 7;
  f[64][1] += mo * 3;
  for(let i=48;i<=59;i++) f[i][0] *= (1 + mo * 0.15);
  for(let i=60;i<=67;i++) f[i][0] *= (1 + mo * 0.2);
  for(let i=4;i<=12;i++) f[i][1] += transform.jD + amp*3;
  return f;
}

function speakText(text) {
  if(!text) return;
  const enriched = `[${S.targetEmotion}] ${text}`;

  $('hAudio').textContent = 'kokoro';
  // Try SAAS TTS first

    body:JSON.stringify({
      text: enriched,
      speaker_id: S.gender==='female'?0:1,
      speed:1.0, pitch_shift: S.gender==='female'?1.0:-0.5,
    })
  }).then(r=>{
    if(r.ok) return r.arrayBuffer();
    throw new Error('SAAS TTS failed');
  }).then(buf=>{
    const actx = new (window.AudioContext||window.webkitAudioContext)();
    actx.decodeAudioData(buf, ab=>{
      S.speaking=true; S.targetAmp=0;
      const src = actx.createBufferSource();
      src.buffer = ab; src.connect(actx.destination);
      src.start(0);
      const interval = setInterval(()=>{S.targetAmp=0.3+Math.random()*0.7;},150);
      src.onended = ()=>{clearInterval(interval);S.speaking=false;S.targetAmp=0;S.mouthAmp=0;$('hAudio').textContent='kokoro';};
    });
  }).catch(() => {
    // Fallback to WebSpeech
    $('hAudio').textContent = 'webspeech';
    if(!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    S.speaking = true; S.targetAmp = 0;
    utterance = new SpeechSynthesisUtterance(text);
    utterance.rate = 1.05; utterance.pitch = S.gender==='female'?1.2:0.8;
    const voices = speechSynthesis.getVoices();
    const prefer = voices.find(v=>v.name.toLowerCase().includes(S.gender==='female'?'female':'male'));
    if(prefer) utterance.voice = prefer;
    utterance.onboundary = e => { if(e.name==='word') S.targetAmp = 0.3+Math.random()*0.7; };
    utterance.onend = () => { S.speaking=false; S.targetAmp=0; S.mouthAmp=0; };
    utterance.onerror = () => { S.speaking=false; S.targetAmp=0; };
    speechSynthesis.speak(utterance);
  });
  setEmotion(S.targetEmotion);
}

// ─── JOKES ──────────────────────────────────────────────────────────
function splitJoke(text) {
  const m = text.match(/^(.+?[?])\s*(.*)$/) || text.match(/^(.+?[!])\s*(.*)$/) || text.match(/^(.+?\.\.\.)\s*(.*)$/);
  return m ? [m[1], m[2]||''] : [text, ''];
}

function speakJoke(jokeText) {
  const [setup, punchline] = splitJoke(jokeText);
  if (!punchline || !window.speechSynthesis) {
    speakText(jokeText);
    return;
  }
  S.speaking = true;
  S.targetAmp = 0;
  window.speechSynthesis.cancel();
  const voices = speechSynthesis.getVoices();
  const prefer = voices.find(v => v.name.toLowerCase().includes(S.gender==='female'?'female':'male'));
  const setupUtter = new SpeechSynthesisUtterance(setup);
  setupUtter.rate = 0.5; setupUtter.pitch = S.gender==='female'?1.2:0.8;
  if (prefer) setupUtter.voice = prefer;
  setupUtter.onboundary = e => { if (e.name==='word') S.targetAmp = 0.2+Math.random()*0.5; };
  setupUtter.onend = () => {
    setTimeout(() => {
      const punchUtter = new SpeechSynthesisUtterance(punchline);
      punchUtter.rate = 0.85; punchUtter.pitch = S.gender==='female'?1.2:0.8;
      if (prefer) punchUtter.voice = prefer;
      punchUtter.onboundary = e => { if (e.name==='word') S.targetAmp = 0.3+Math.random()*0.7; };
      punchUtter.onend = () => { S.speaking=false; S.targetAmp=0; S.mouthAmp=0; };
      punchUtter.onerror = () => { S.speaking=false; S.targetAmp=0; };
      speechSynthesis.speak(punchUtter);
    }, 1600);
  };
  setupUtter.onerror = () => {
    S.speaking = false;
    speakText(jokeText);
  };
  speechSynthesis.speak(setupUtter);
}

  setTimeout(() => el.classList.remove('show'), 8000);
  S.phrase = j;
  $('statusPhrase').textContent = j.slice(0,80);
  speakJoke(j);
}

// ─── RENDER ──────────────────────────────────────────────────────────
function render() {
  S.t += 0.05;
  S.breath = Math.sin(S.t * 0.2) * 5;
  S.jitter = (Math.random() - 0.5) * 1.5;
  S.mouthAmp = S.mouthAmp * 0.85 + S.targetAmp * 0.15;
  if(S.speaking) S.mouthAmp += Math.sin(S.t * 25) * 0.08;
  S.mouthAmp = Math.max(0, Math.min(1, S.mouthAmp));
  S.emLerp = Math.min(1, S.emLerp + 0.04);
  const tc = EMO_COLORS[S.targetEmotion]||EMO_COLORS.neutral;
  S.color = lerpColor(S.color, tc, 0.06);
  et = lerpET(et, target_et, 0.06);
  const f = buildFace(et, S.mouthAmp);
  S.activeFace = f;

  // Auto-joke timer (when not speaking)
  if (!S.speaking) {
    jokeTimer += 16;
    if (jokeTimer > JOKE_INTERVAL) { showJoke(); jokeTimer = 0; }
  } else { jokeTimer = 0; }

  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.save();
  const sc = Math.min(canvas.width,canvas.height)/400*S.zoom;
  ctx.translate(canvas.width/2 + S.pan.x, canvas.height/2 + S.pan.y);
  ctx.scale(sc, sc);

  const col = `rgb(${S.color.r|0},${S.color.g|0},${S.color.b|0})`;
  const colDim = `rgba(${S.color.r|0},${S.color.g|0},${S.color.b|0},0.15)`;

  // ── Fractal Ambient Field ──
  ctx.globalAlpha = 0.5;
  for(const p of animPoints){
    const wave = Math.sin(S.t*p.sp+p.ph+S.fractalSeed);
    const dx = p.x + wave*4 + Math.sin(p.baseX*0.1+S.t*0.5)*3;
    const dy = p.y + Math.cos(S.t*p.sp*0.7+p.ph)*3 + Math.cos(p.baseY*0.1+S.t*0.3)*3;
    const sz = 1 + wave*0.5;
    ctx.fillStyle = col;
    ctx.beginPath(); ctx.arc(dx,dy,sz,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // ── Ghosting ──
  ctx.globalAlpha = 0.15;
  drawFace(f, col, S.breath+2, S.jitter*0.5);
  ctx.globalAlpha = 1;
  drawFace(f, col, S.breath, 0);

  // ── Blueprint Sweep ──
  const sweepY = Math.sin(S.t*0.5)*200;
  ctx.strokeStyle = col; ctx.globalAlpha = 0.08; ctx.lineWidth = 0.5;
  ctx.beginPath(); ctx.moveTo(-220, sweepY); ctx.lineTo(220, sweepY); ctx.stroke();
  ctx.globalAlpha = 1;

  ctx.restore();
  requestAnimationFrame(render);
}

function drawFace(f, col, bo, jt) {
  ctx.save();
  ctx.translate(0, bo + jt);
  ctx.strokeStyle = col; ctx.lineWidth = 1.2;
  if(S.landmarksOn){
    ctx.globalAlpha = 0.3;
    for(const [a,b] of MESH){ ctx.beginPath(); ctx.moveTo(f[a][0],f[a][1]); ctx.lineTo(f[b][0],f[b][1]); ctx.stroke(); }
    ctx.globalAlpha = 0.7;
    for(let i=0;i<68;i++){
      ctx.fillStyle = (i>=48&&i<=67)||(i>=4&&i<=12) ? `rgb(255,80,120)` : col;
      ctx.beginPath(); ctx.arc(f[i][0],f[i][1],(i>=48&&i<=67)||(i>=4&&i<=12)?2.5:1.5,0,Math.PI*2); ctx.fill();
    }
  }
  if(!S.landmarksOn){
    ctx.fillStyle = col; ctx.globalAlpha = 0.9;
    const gx = S.mouse.x/30, gy = S.mouse.y/30;
    ctx.beginPath(); ctx.arc(-38+gx,-48+gy,4,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(38+gx,-48+gy,4,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.restore();
}

// ─── RESIZE ─────────────────────────────────────────────────────────
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// ─── MOUSE / ZOOM / DRAG ──────────────────────────────────────────
canvas.addEventListener('mousemove', e => {
  S.mouse.x = (e.clientX - canvas.width/2);
  S.mouse.y = (e.clientY - canvas.height/2);
  if(S.dragging){
    S.pan.x += e.clientX - S.dragStart.x;
    S.pan.y += e.clientY - S.dragStart.y;
    S.dragStart = {x:e.clientX, y:e.clientY};
  }
});
canvas.addEventListener('mousedown', e => { S.dragging=true; S.dragStart={x:e.clientX,y:e.clientY}; });
canvas.addEventListener('mouseup', () => S.dragging=false);
canvas.addEventListener('mouseleave', () => S.dragging=false);
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  S.zoom = Math.max(0.3, Math.min(5, S.zoom - e.deltaY*0.001));
}, {passive:false});

// ─── UI WIRING ─────────────────────────────────────────────────────
// Zoom
$('zoomInBtn').onclick = () => S.zoom = Math.min(5, S.zoom + 0.2);
$('zoomOutBtn').onclick = () => S.zoom = Math.max(0.3, S.zoom - 0.2);
$('zoomResetBtn').onclick = () => { S.zoom=1; S.pan={x:0,y:0}; };

// Landmarks
$('landmarkBtn').onclick = function() {
  S.landmarksOn = !S.landmarksOn;
  this.textContent = S.landmarksOn?'🔲 LANDMARKS: ON':'🔲 LANDMARKS: OFF';
  this.classList.toggle('active');
};

// Density
$('densityBtn').onclick = () => $('density-popup').classList.toggle('show');
$('densityClose').onclick = () => $('density-popup').classList.remove('show');
$('densitySlider').oninput = function() {
  S.density = parseInt(this.value);
  $('densityVal').textContent = this.value;
  $('hParticles').textContent = this.value;
  animPoints = genFractalField(S.density, S.fractalSeed);
};

// Fractal regen
$('regenBtn').onclick = () => {
  S.fractalSeed = Math.random()*9999;
  animPoints = genFractalField(S.density, S.fractalSeed);
  showJoke();
};

// Joke button — manual trigger resets auto-timer
$('jokeBtn').onclick = () => { jokeTimer = 0; showJoke(); };

// Gender toggle
$('genderBtn').onclick = function() {
  S.gender = S.gender==='female'?'male':'female';
  this.textContent = S.gender==='female'?'♀ FEMALE':'♂ MALE';
};

// Emotion panel
function buildEmotionPanel() {
  const p = $('emotionPanel');
  EMO_LIST.forEach(e => {
    const b = document.createElement('button');
    b.dataset.em = e.id;
    b.textContent = e.icon;
    b.title = e.id;
    if(e.id==='neutral') b.classList.add('active');
    b.onclick = () => setEmotion(e.id);
    p.appendChild(b);
  });
}
buildEmotionPanel();

// Text input + send
$('sendBtn').onclick = () => {
  const val = $('textInput').value.trim();
  if(!val) return;
  speakText(val);
  $('textInput').value = '';
};
$('textInput').addEventListener('keypress', e => { if(e.key==='Enter') $('sendBtn').click(); });

// Speak button
$('speakBtn').onclick = () => {
  const phrases = ['Hello.','I see you.','Keep watching.','Fractal patterns never lie.','You are being observed.'];
  speakText(phrases[Math.floor(Math.random()*phrases.length)]);
};

// ─── POSTMESSAGE ──────────────────────────────────────────────────
window.addEventListener('message', e => {
  const d = e.data||{};
  if(d.type==='setEmotion'||d.type==='setBoth') {
    if(d.id && d.id!==S.targetEmotion) { setEmotion(d.id); }
  }
  if(d.type==='setText'||d.type==='setBoth') {
    if(d.text) { speakText(d.text); }
  }
  if(d.type==='toggleLandmarks') { $('landmarkBtn').click(); }
  if(d.type==='setMouthAmp') { S.targetAmp = Math.min(1, Math.max(0, d.value||0)); if(d.value>0) S.speaking=true; }
  if(d.type==='setAudioSource') { S.audioSource = d.source||'webspeech'; $('hAudio').textContent=S.audioSource; }
  if(d.type==='speak') { if(d.text) speakText(d.text); }
  if(d.type==='setDensity') { $('densitySlider').value=d.value; $('densitySlider').oninput(); }
});

// ─── INIT ──────────────────────────────────────────────────────────
animPoints = genFractalField(S.density, S.fractalSeed);
$('hParticles').textContent = S.density;
render();
</script>
</body>
</html>
