<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clawdia — Living Entity</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0a0e1a;
  --surface: #12172e;
  --surface2: #1a2040;
  --border: #2a3152;
  --text: #e0e4f0;
  --text-dim: #8890b0;
  --accent: #6c5ce7;
  --accent-glow: rgba(108, 92, 231, 0.3);
  --green: #3fb950;
  --yellow: #d29922;
  --red: #f85149;
  --purple: #bc8cff;
}
body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Header ────────────────────────────────── */
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 10px 20px;
  display: flex;
  align-items: center;
  gap: 14px;
  flex-shrink: 0;
}
header h1 { font-size: 16px; font-weight: 700; letter-spacing: 1px; }
header h1 .accent { color: var(--accent); }
.connection-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--green);
  transition: background 0.3s;
}
.connection-dot.disconnected { background: var(--red); }
#presence-text { font-size: 12px; color: var(--text-dim); }
#event-count { margin-left: auto; font-size: 11px; color: var(--text-dim); }

/* ── Main ──────────────────────────────────── */
.main { display: flex; flex: 1; overflow: hidden; }

/* ── Timeline ──────────────────────────────── */
#timeline {
  flex: 1;
  overflow-y: auto;
  padding: 10px 16px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.event {
  display: flex; gap: 8px;
  padding: 5px 10px; border-radius: 6px;
  font-size: 13px; line-height: 1.4;
  border-left: 3px solid var(--border);
  animation: fadeIn 0.25s ease;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; transform: translateY(0); } }
.event .time { color: var(--text-dim); font-size: 10px; white-space: nowrap; padding-top: 2px; min-width: 58px; opacity: 0.6; }
.event .body { flex: 1; min-width: 0; }
.event .msg { color: var(--text); }
.event .summary { color: var(--text-dim); font-size: 12px; margin-top: 1px; }
.event .tags { display: flex; gap: 3px; flex-wrap: wrap; margin-top: 3px; }
.tag { font-size: 9px; padding: 1px 5px; border-radius: 6px; background: var(--surface2); color: var(--text-dim); border: 1px solid var(--border); }
.tag.learning { background: #1a3a1a; color: var(--green); border-color: var(--green); }
.tag.meta { background: #1a2a3a; color: var(--accent); border-color: var(--accent); }

.event.thinking { border-left-color: var(--accent); }
.event.tool_call { border-left-color: var(--yellow); }
.event.tool_result { border-left-color: var(--green); }
.event.decision { border-left-color: var(--purple); }
.event.learning { border-left-color: var(--green); }
.event.learning .msg::before { content: "🧠 "; }
.event.error { border-left-color: var(--red); }

/* ── Sidebar ──────────────────────────────── */
#sidebar {
  width: 320px;
  background: var(--surface);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}
#sidebar-tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
}
.sidebar-tab {
  flex: 1; padding: 8px; text-align: center;
  font-size: 11px; font-weight: 600; cursor: pointer;
  color: var(--text-dim); background: transparent; border: none;
  border-bottom: 2px solid transparent; transition: 0.2s;
}
.sidebar-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.sidebar-tab:hover { color: var(--text); }
.sidebar-panel { display: none; flex: 1; overflow-y: auto; padding: 10px; }
.sidebar-panel.active { display: block; }

/* Commands panel */
#command-list { display: flex; flex-direction: column; gap: 4px; }
.cmd-entry {
  font-size: 12px; padding: 6px 8px; border-radius: 4px;
  background: var(--surface2); border: 1px solid var(--border);
  cursor: pointer; transition: 0.15s;
}
.cmd-entry:hover { border-color: var(--accent); }
.cmd-entry .cmd-name { font-weight: 600; color: var(--accent); }
.cmd-entry .cmd-desc { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

/* Learnings panel */
#learning-list { display: flex; flex-direction: column; gap: 6px; }
.ln-entry { font-size: 12px; padding: 6px 8px; border-radius: 4px; background: var(--surface2); border-left: 2px solid var(--green); }

/* ── Input area ────────────────────────────── */
#input-area {
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 10px 16px;
  display: flex;
  gap: 8px;
  flex-shrink: 0;
}
#command-input {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  color: var(--text);
  font-family: 'Segoe UI', sans-serif;
  font-size: 13px;
  outline: none;
  transition: border-color 0.2s;
}
#command-input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-glow); }
#command-input::placeholder { color: var(--text-dim); opacity: 0.5; }
#send-btn {
  background: var(--accent); color: white; border: none;
  border-radius: 8px; padding: 0 20px; font-weight: 600;
  cursor: pointer; font-size: 13px; transition: 0.15s;
}
#send-btn:hover { background: #7c6cf7; }
#send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* Voice indicator */
#voice-indicator {
  position: fixed; bottom: 70px; right: 20px;
  display: none; align-items: center; gap: 6px;
  background: var(--surface2); padding: 6px 12px;
  border-radius: 20px; font-size: 12px; color: var(--accent);
  border: 1px solid var(--accent); z-index: 100;
}
#voice-indicator.speaking { display: flex; animation: pulse 0.8s infinite; }
@keyframes pulse { 50% { opacity: 0.6; } }

/* ── Face ──────────────────────────────────── */
#face-container {
  position: fixed; bottom: 120px; right: 20px;
  width: 120px; height: 140px;
  z-index: 99; cursor: pointer;
  filter: drop-shadow(0 0 20px rgba(108,92,231,0.2));
  transition: filter 0.3s;
}
#face-container:hover { filter: drop-shadow(0 0 30px rgba(108,92,231,0.5)); }
#face-container svg { width: 100%; height: 100%; overflow: visible; }
#glow-ring {
  animation: breathe 3s ease-in-out infinite;
  transform-origin: center;
}
@keyframes breathe {
  0%, 100% { opacity: 0.3; r: 52; }
  50% { opacity: 0.6; r: 56; }
}
#glow-ring.active { animation: breathe-fast 0.8s ease-in-out infinite; }
@keyframes breathe-fast {
  0%, 100% { opacity: 0.4; r: 52; }
  50% { opacity: 0.8; r: 58; }
}
.eye { transition: transform 0.1s; }
#mouth { transition: d 0.1s ease; }
#head-group { animation: float 4s ease-in-out infinite; transform-origin: center; }
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-3px); }
}
#face-speech-bubble {
  position: absolute; top: -30px; right: 130px;
  background: var(--surface2); border: 1px solid var(--accent);
  border-radius: 12px; padding: 8px 14px;
  font-size: 11px; color: var(--text);
  white-space: nowrap; max-width: 250px; overflow: hidden;
  text-overflow: ellipsis; display: none;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}

@media (max-width: 768px) {
  #sidebar { display: none; }
}
</style>
</head>
<body>

<header>
  <span class="connection-dot" id="connection-dot"></span>
  <h1><span class="accent">Clawdia</span> — Living Entity</h1>
  <span id="presence-text">listening</span>
  <span id="event-count">0 events</span>
</header>

<div class="main">
  <div id="timeline"></div>

  <div id="sidebar">
    <div id="sidebar-tabs">
      <button class="sidebar-tab active" data-panel="commands">Commands</button>
      <button class="sidebar-tab" data-panel="learnings">Learnings</button>
      <button class="sidebar-tab" data-panel="voice">Voice</button>
    </div>

    <div class="sidebar-panel active" id="panel-commands">
      <div style="font-size:11px;color:var(--text-dim);margin-bottom:8px;">Click a command to run it</div>
      <div id="command-list"></div>
    </div>

    <div class="sidebar-panel" id="panel-learnings">
      <div id="learning-list"></div>
    </div>

    <div class="sidebar-panel" id="panel-voice">
      <div style="font-size:12px;margin-bottom:8px;">Voice Settings</div>
      <label style="font-size:11px;color:var(--text-dim);">Voice</label>
      <select id="voice-select" style="width:100%;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:4px;margin-bottom:8px;"></select>
      <label style="font-size:11px;color:var(--text-dim);">Rate</label>
      <input type="range" id="voice-rate" min="0.5" max="2" step="0.1" value="1.0" style="width:100%;margin-bottom:4px;">
      <label style="font-size:11px;color:var(--text-dim);">Pitch</label>
      <input type="range" id="voice-pitch" min="0.5" max="2" step="0.1" value="1.0" style="width:100%;margin-bottom:8px;">
      <label style="font-size:11px;color:var(--text-dim);display:flex;align-items:center;gap:6px;">
        <input type="checkbox" id="speak-learnings" checked> Speak Learnings aloud
      </label>
      <label style="font-size:11px;color:var(--text-dim);display:flex;align-items:center;gap:6px;margin-top:4px;">
        <input type="checkbox" id="speak-all" checked> Speak all events
      </label>
    </div>
  </div>
</div>

<div id="input-area">
  <input id="command-input" type="text" placeholder="Type a command or question for Clawdia..." autofocus>
  <button id="send-btn">Send</button>
</div>

<div id="voice-indicator"><span>🔊</span> Speaking...</div>

<div id="face-container" onclick="toggleFaceMood()">
  <svg viewBox="0 0 120 140" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="head-grad" cx="50%" cy="40%" r="50%">
        <stop offset="0%" stop-color="#2a2050"/>
        <stop offset="70%" stop-color="#1a1040"/>
        <stop offset="100%" stop-color="#0f0828"/>
      </radialGradient>
      <radialGradient id="glow-grad" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#6c5ce7" stop-opacity="0.4"/>
        <stop offset="100%" stop-color="#6c5ce7" stop-opacity="0"/>
      </radialGradient>
    </defs>

    <!-- Glow ring -->
    <circle id="glow-ring" cx="60" cy="55" r="52" fill="url(#glow-grad)" class="active"/>

    <g id="head-group">
      <!-- Head -->
      <circle cx="60" cy="55" r="38" fill="url(#head-grad)" stroke="#3a3070" stroke-width="1.5"/>

      <!-- Eyes -->
      <g class="eye" id="left-eye">
        <circle cx="45" cy="48" r="6" fill="#e0e4f0"/>
        <circle cx="47" cy="48" r="3" fill="#0a0e1a"/>
        <circle cx="48" cy="47" r="1" fill="white"/>
      </g>
      <g class="eye" id="right-eye">
        <circle cx="75" cy="48" r="6" fill="#e0e4f0"/>
        <circle cx="77" cy="48" r="3" fill="#0a0e1a"/>
        <circle cx="78" cy="47" r="1" fill="white"/>
      </g>

      <!-- Eyebrows -->
      <line id="brow-left" x1="37" y1="38" x2="53" y2="36" stroke="#6c5ce7" stroke-width="2" stroke-linecap="round"/>
      <line id="brow-right" x1="67" y1="36" x2="83" y2="38" stroke="#6c5ce7" stroke-width="2" stroke-linecap="round"/>

      <!-- Mouth -->
      <path id="mouth" d="M 48 68 Q 60 74 72 68" fill="none" stroke="#6c5ce7" stroke-width="2" stroke-linecap="round"/>
    </g>
  </svg>
  <div id="face-speech-bubble"></div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
const STATE_KEY = 'clawdia_state';
let state = loadState() || { events: [], learnings: [], conversations: [] };
let lastId = 0;
let synth = window.speechSynthesis;
let currentUtterance = null;

function defaultState() { return { events: [], learnings: [], conversations: [] }; }
function loadState() { try { return JSON.parse(localStorage.getItem(STATE_KEY)); } catch(e) { return null; } }
function saveState() { try { localStorage.setItem(STATE_KEY, JSON.stringify(state)); } catch(e) {} }

// ── Tab sync ───────────────────────────────────────────────────────────────
window.addEventListener('storage', function(e) {
  if (e.key === STATE_KEY && e.newValue) {
    const incoming = JSON.parse(e.newValue);
    // Merge: add events we don't have
    const ourIds = new Set(state.events.map(ev => ev.id));
    for (const ev of incoming.events) {
      if (!ourIds.has(ev.id)) {
        state.events.push(ev);
        renderEvent(ev);
      }
    }
    state.learnings = incoming.learnings;
    renderLearnings();
    updateCounts();
  }
});

// ── SSE ────────────────────────────────────────────────────────────────────
function connectSSE() {
  const es = new EventSource('/api/cognition/stream?after=' + lastId);
  const dot = document.getElementById('connection-dot');

  es.onmessage = function(e) {
    try {
      const ev = JSON.parse(e.data);
      lastId = ev.id || lastId;
      state.events.push(ev);
      if (ev.tags && ev.tags.includes('learning')) {
        state.learnings.push(ev);
        renderLearnings();
      }
      renderEvent(ev);
      saveState();
      updateCounts();

      // Voice
      const isLearning = ev.type === 'learning' || (ev.tags && ev.tags.includes('learning'));
      if (document.getElementById('speak-all').checked || (isLearning && document.getElementById('speak-learnings').checked)) {
        speakLine(ev.message);
      }
    } catch(err) {}
  };

  es.onopen = function() {
    dot.classList.remove('disconnected');
    document.getElementById('presence-text').textContent = 'connected';
  };

  es.onerror = function() {
    dot.classList.add('disconnected');
    document.getElementById('presence-text').textContent = 'reconnecting...';
  };
}

// ── Render ─────────────────────────────────────────────────────────────────
function renderEvent(ev) {
  const tl = document.getElementById('timeline');
  const el = document.createElement('div');
  el.className = 'event ' + (ev.type || 'thinking');

  const ts = new Date(ev.ts || Date.now());
  const timeStr = ts.toLocaleTimeString();

  let bodyHtml = `<div class="msg">${esc(ev.message || '')}</div>`;
  if (ev.summary) bodyHtml += `<div class="summary">${esc(ev.summary)}</div>`;
  if (ev.tags && ev.tags.length) {
    bodyHtml += '<div class="tags">' + ev.tags.map(t => `<span class="tag ${t === 'learning' ? 'learning' : ''}">${esc(t)}</span>`).join('') + '</div>';
  }
  el.innerHTML = `<div class="time">${timeStr}</div><div class="body">${bodyHtml}</div>`;
  tl.appendChild(el);
  tl.scrollTop = tl.scrollHeight;
}

function renderLearnings() {
  const list = document.getElementById('learning-list');
  list.innerHTML = state.learnings.slice(-20).reverse().map(l =>
    `<div class="ln-entry">🧠 ${esc(l.message || '')}</div>`
  ).join('');
}

function updateCounts() {
  document.getElementById('event-count').textContent = state.events.length + ' events';
}

function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ── Voice & Face ───────────────────────────────────────────────────────────
let faceMood = 'neutral';
let mouthAnimInterval = null;
let blinkInterval = null;

const MOUTH_PATHS = {
  neutral: 'M 48 68 Q 60 74 72 68',
  open: 'M 48 68 Q 60 82 72 68',
  wide: 'M 46 68 Q 60 86 74 68',
  smile: 'M 46 66 Q 60 76 74 66',
};
const BROW_PATHS = {
  neutral: { l: 'M 37 38 L 53 36', r: 'M 67 36 L 83 38' },
  happy: { l: 'M 37 36 L 53 34', r: 'M 67 34 L 83 36' },
  concerned: { l: 'M 37 36 L 53 38', r: 'M 67 38 L 83 36' },
};

function setFaceMood(mood) {
  faceMood = mood;
  const mouth = document.getElementById('mouth');
  if (mouth && MOUTH_PATHS[mood]) mouth.setAttribute('d', MOUTH_PATHS[mood]);
  const brows = BROW_PATHS[mood] || BROW_PATHS.neutral;
  const bl = document.getElementById('brow-left');
  const br = document.getElementById('brow-right');
  if (bl) bl.setAttribute('d', brows.l);
  if (br) br.setAttribute('d', brows.r);
}

function startMouthAnim() {
  stopMouthAnim();
  let open = false;
  mouthAnimInterval = setInterval(() => {
    const mouth = document.getElementById('mouth');
    if (!mouth) return;
    open = !open;
    mouth.setAttribute('d', open ? MOUTH_PATHS.open : MOUTH_PATHS.neutral);
  }, 180);
  setFaceMood('happy');
}

function stopMouthAnim() {
  if (mouthAnimInterval) { clearInterval(mouthAnimInterval); mouthAnimInterval = null; }
  setFaceMood('neutral');
}

function startBlink() {
  stopBlink();
  blinkInterval = setInterval(() => {
    ['left-eye', 'right-eye'].forEach(id => {
      const g = document.getElementById(id);
      if (g) g.style.transform = 'scaleY(0.1)';
      setTimeout(() => { if (g) g.style.transform = 'scaleY(1)'; }, 120);
    });
  }, 3500);
}

function stopBlink() {
  if (blinkInterval) { clearInterval(blinkInterval); blinkInterval = null; }
}

function showSpeechBubble(text) {
  const bubble = document.getElementById('face-speech-bubble');
  if (!bubble) return;
  bubble.textContent = text.slice(0, 80) + (text.length > 80 ? '...' : '');
  bubble.style.display = 'block';
  setTimeout(() => { bubble.style.display = 'none'; }, text.length * 50 + 1000);
}

let faceMoodCycle = 0;
function toggleFaceMood() {
  const moods = ['neutral', 'happy', 'concerned'];
  faceMoodCycle = (faceMoodCycle + 1) % moods.length;
  setFaceMood(moods[faceMoodCycle]);
}

function populateVoices() {
  const sel = document.getElementById('voice-select');
  const voices = synth.getVoices();
  sel.innerHTML = voices.map(v => `<option value="${v.name}" ${v.default ? 'selected' : ''}>${v.name} (${v.lang})</option>`).join('');
}
synth.onvoiceschanged = populateVoices;
setTimeout(populateVoices, 500);

function speakLine(text) {
  if (!text || !synth) return;
  const match = text.match(/<Learning:\s*(.+?)>/);
  if (match) text = match[1];

  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.rate = parseFloat(document.getElementById('voice-rate').value);
  utter.pitch = parseFloat(document.getElementById('voice-pitch').value);
  const selected = document.getElementById('voice-select').value;
  const voices = synth.getVoices();
  const voice = voices.find(v => v.name === selected);
  if (voice) utter.voice = voice;

  const ind = document.getElementById('voice-indicator');
  ind.classList.add('speaking');
  startMouthAnim();
  showSpeechBubble(text);
  const glow = document.getElementById('glow-ring');
  if (glow) glow.classList.add('active');

  utter.onend = () => {
    ind.classList.remove('speaking');
    stopMouthAnim();
  };
  utter.onerror = () => {
    ind.classList.remove('speaking');
    stopMouthAnim();
  };
  synth.speak(utter);
}

// ── Commands panel ─────────────────────────────────────────────────────────
const QUICK_COMMANDS = [
  { name: 'Folder Stats', desc: 'Show stats for current folder', cmd: 'algo stats .', skill: '' },
  { name: 'Generate .pyp', desc: 'Package folder as .pyp', cmd: 'algo pyp . --copy', skill: '' },
  { name: 'Send to SAAS', desc: 'Send folder to SAAS project ingest', cmd: 'algo pyp-send .', skill: '' },
  { name: 'List Projects', desc: 'List all ingested projects', cmd: '', skill: 'GET /api/projects' },
  { name: 'Today\'s Learnings', desc: 'Show recent learnings', cmd: '', skill: 'GET /hooks/learnings' },
  { name: 'GitHub Status', desc: 'Check GitHub bridge', cmd: '', skill: 'GET /hooks/github_bridge' },
];

function renderCommands() {
  const list = document.getElementById('command-list');
  list.innerHTML = QUICK_COMMANDS.map(c =>
    `<div class="cmd-entry" data-cmd="${esc(c.cmd)}" data-skill="${esc(c.skill)}">
      <div class="cmd-name">${esc(c.name)}</div>
      <div class="cmd-desc">${esc(c.desc)}</div>
    </div>`
  ).join('');
  list.querySelectorAll('.cmd-entry').forEach(el => {
    el.addEventListener('click', function() {
      const cmd = this.dataset.cmd;
      const skill = this.dataset.skill;
      if (cmd) document.getElementById('command-input').value = cmd;
      else if (skill) document.getElementById('command-input').value = '/' + skill;
      document.getElementById('send-btn').click();
    });
  });
}

// ── Sidebar tabs ────────────────────────────────────────────────────────────
document.querySelectorAll('.sidebar-tab').forEach(tab => {
  tab.addEventListener('click', function() {
    document.querySelectorAll('.sidebar-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.sidebar-panel').forEach(p => p.classList.remove('active'));
    this.classList.add('active');
    document.getElementById('panel-' + this.dataset.panel).classList.add('active');
  });
});

// ── Send command ───────────────────────────────────────────────────────────
document.getElementById('send-btn').addEventListener('click', sendCommand);
document.getElementById('command-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') sendCommand();
});

async function sendCommand() {
  const input = document.getElementById('command-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  document.getElementById('send-btn').disabled = true;

  // Add as user event
  renderEvent({ type: 'thinking', message: 'You: ' + text, ts: new Date().toISOString(), tags: [] });

  // If starts with /, treat as API call
  if (text.startsWith('/')) {
    const parts = text.slice(1).split(' ');
    const method = parts[0];
    const path = parts.slice(1).join(' ');
    try {
      const resp = await fetch(path.startsWith('http') ? path : (window.location.origin + path));
      const data = await resp.text();
      renderEvent({ type: 'tool_result', message: 'API Response', summary: data.slice(0, 500), ts: new Date().toISOString(), tags: [] });
    } catch(e) {
      renderEvent({ type: 'error', message: 'API call failed: ' + e.message, ts: new Date().toISOString(), tags: [] });
    }
  } else if (text.startsWith('algo ')) {
    // Try to call algo.exe via SAAS or direct
    renderEvent({ type: 'tool_call', message: 'Running: ' + text, ts: new Date().toISOString(), tags: [] });
    try {
      const resp = await fetch('/api/agent/execute', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ command: text })
      });
      const data = await resp.json();
      renderEvent({ type: 'tool_result', message: 'Result', summary: JSON.stringify(data).slice(0, 500), ts: new Date().toISOString(), tags: [] });
    } catch(e) {
      renderEvent({ type: 'tool_result', message: 'Command sent (SAAS will process)', summary: text, ts: new Date().toISOString(), tags: [] });
    }
  } else {
    // Send as a prompt to the prompt optimiser or forge
    renderEvent({ type: 'thinking', message: 'Processing: "' + text + '"', ts: new Date().toISOString(), tags: [] });
    try {
      const resp = await fetch('/api/optimise', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt: text })
      });
      const data = await resp.json();
      renderEvent({ type: 'tool_result', message: 'Optimised prompt ready', summary: (data.enhanced || JSON.stringify(data)).slice(0, 500), ts: new Date().toISOString(), tags: ['learning'] });
    } catch(e) {
      renderEvent({ type: 'thinking', message: 'Question noted: ' + text, ts: new Date().toISOString(), tags: [] });
    }
  }

  document.getElementById('send-btn').disabled = false;
}

// ── Init ───────────────────────────────────────────────────────────────────
renderCommands();
renderLearnings();
updateCounts();

// Replay existing events
state.events.forEach(ev => renderEvent(ev));

connectSSE();
startBlink();

// ── Keep-alive ping ────────────────────────────────────────────────────────
setInterval(() => {
  fetch('/api/cognition/event', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ type: 'status', message: '♥', tool: '', description: '', status: '', summary: '', options: [], tags: [] })
  }).catch(() => {});
}, 60000);
</script>
</body>
