<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VAN Cockpit — Living Mirror + DirtyTalker + Emotion</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#06080f;--panel:#0a0d18;--border:#1a2540;--accent:#7c5cfc;--text:#c8d0e0;--dim:#5a728a;--em:#ff6699}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,monospace;overflow:hidden}

#app{display:flex;flex-direction:column;height:100vh}

/* HEADER */
#header{display:flex;align-items:center;gap:8px;padding:6px 16px;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
#header h1{font-size:0.8rem;font-weight:400;color:var(--em);letter-spacing:0.05em;white-space:nowrap}
#header h1 span{color:var(--accent)}
.header-status{margin-left:auto;font-size:0.6rem;color:var(--dim);font-family:monospace;display:flex;gap:12px;align-items:center}

/* EMOTION BAR */
#emotionBar{display:flex;gap:3px;padding:4px 12px;background:#080b16;border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto;align-items:center}
#emotionBar button{font-size:0.6rem;padding:2px 8px;border-radius:14px;border:1px solid var(--border);background:#0c1220;color:var(--text);cursor:pointer;white-space:nowrap;transition:all 0.15s}
#emotionBar button:hover{background:#1a2540}
#emotionBar button.active{background:#1a1030;border-color:var(--accent);color:var(--accent);box-shadow:0 0 8px rgba(124,92,252,0.3)}
#emotionBar .em-label{font-size:0.55rem;color:var(--dim);margin-right:4px}

/* MAIN */
#main{display:flex;flex:1;overflow:hidden}

/* LEFT: Living Mirror */
#leftPane{flex:1;display:flex;flex-direction:column;border-right:1px solid var(--border);position:relative}
#leftPane iframe{flex:1;border:none;background:#05070f}
#leftPane .controls{display:flex;gap:4px;padding:4px 8px;background:var(--panel);border-top:1px solid var(--border);flex-shrink:0;overflow-x:auto}
#leftPane .controls button{font-size:0.55rem;padding:2px 8px;border-radius:10px;border:1px solid var(--border);background:#0c1220;color:var(--dim);cursor:pointer;white-space:nowrap}
#leftPane .controls button:hover{color:var(--text);border-color:var(--accent)}

/* RIGHT: Chat + Settings */
#rightPane{width:380px;display:flex;flex-direction:column;flex-shrink:0}
#rightPane .tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
#rightPane .tabs button{flex:1;padding:6px;font-size:0.65rem;background:var(--panel);border:none;border-right:1px solid var(--border);color:var(--dim);cursor:pointer}
#rightPane .tabs button:last-child{border-right:none}
#rightPane .tabs button.active{background:var(--bg);color:var(--text);border-bottom:2px solid var(--accent)}

/* CHAT */
#chatPanel{display:flex;flex-direction:column;flex:1;overflow:hidden}
#chatMessages{flex:1;overflow-y:auto;padding:8px 12px;display:flex;flex-direction:column;gap:8px}
.msg{max-width:88%;padding:6px 10px;border-radius:8px;font-size:0.72rem;line-height:1.4}
.msg.user{background:#12182a;border:1px solid #1a2540;align-self:flex-end}
.msg.system{background:#0a0d18;border:1px solid #1a2040;align-self:flex-start}
.msg .voice-tag{font-size:0.55rem;color:#4a6;display:inline-block;margin-top:3px}
.msg .em-tag{font-size:0.55rem;color:#a78bfa;margin-left:4px}
.msg .actions{display:flex;gap:4px;margin-top:4px}
.msg .actions button{font-size:0.55rem;padding:1px 6px;border-radius:4px;border:1px solid #1a2540;background:#0c1220;color:#8af;cursor:pointer}
.msg .actions button:hover{background:#1a2540}

#chatInputArea{display:flex;gap:6px;padding:8px 12px;border-top:1px solid var(--border);background:var(--panel)}
#chatInput{flex:1;background:#0c1220;border:1px solid var(--border);border-radius:6px;padding:6px 10px;color:var(--text);font-family:inherit;font-size:0.72rem;outline:none}
#chatInput:focus{border-color:var(--accent)}
#chatSendBtn{padding:6px 12px;border-radius:6px;border:1px solid var(--accent);background:var(--accent);color:#fff;cursor:pointer;font-size:0.7rem}
#chatSendBtn:disabled{opacity:0.4;cursor:not-allowed}

/* SETTINGS */
#settingsPanel{display:none;flex-direction:column;padding:12px;overflow-y:auto;flex:1}
#settingsPanel.active{display:flex}
#settingsPanel label{font-size:0.65rem;color:var(--dim);margin-top:8px;display:block}
#settingsPanel select,#settingsPanel input[type=range]{width:100%;background:#0c1220;border:1px solid var(--border);border-radius:4px;padding:3px 6px;color:var(--text);font-family:inherit;font-size:0.7rem;margin-top:2px}
#settingsPanel .val{font-size:0.6rem;color:var(--accent);float:right}
#settingsPanel .photo-zone{margin-top:8px;border:1px dashed var(--border);border-radius:6px;padding:12px;text-align:center;cursor:pointer;font-size:0.65rem;color:var(--dim)}
#settingsPanel .photo-zone:hover{border-color:var(--accent);background:#0c1420}
#settingsPanel .photo-zone img{max-width:100%;max-height:80px;border-radius:4px}
#settingsPanel .status-row{display:flex;justify-content:space-between;font-size:0.6rem;color:var(--dim);padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.03);margin-top:4px}
#settingsPanel .status-row .n{color:var(--text)}

/* VIDEO MODAL */
.video-modal{display:none;position:fixed;z-index:100;left:0;top:0;width:100%;height:100%;background:rgba(0,0,0,0.85);align-items:center;justify-content:center}
.video-modal.active{display:flex}
.video-modal video{max-width:90vw;max-height:85vh;border-radius:12px;border:1px solid var(--border)}
.video-modal .close{position:absolute;top:16px;right:24px;color:var(--text);font-size:1.5rem;cursor:pointer}

#stateLog{font-size:0.55rem;color:var(--dim);padding:6px 12px;border-top:1px solid var(--border);max-height:60px;overflow-y:auto;background:var(--panel);flex-shrink:0;font-family:monospace;line-height:1.5}
#fryaPane{width:520px;display:flex;flex-direction:column;flex-shrink:0;background:#080b16;border-right:1px solid var(--border);overflow:hidden}
#fryaPane .frya-split{flex:1;display:flex;min-height:0}
#fryaPane .frya-half{flex:1;display:flex;min-height:0;position:relative}
#fryaPane .frya-half iframe{width:100%;height:100%;border:none;background:#05050a;position:absolute;inset:0}
#fryaPane .frya-half:first-child::after{content:'';position:absolute;right:0;top:0;bottom:0;width:1px;background:var(--border);z-index:1}
#fryaPane .frya-label-bar{flex-shrink:0;display:flex;font-size:0.52rem;color:var(--dim);background:var(--panel);border-top:1px solid var(--border)}
#fryaPane .frya-label-item{flex:1;padding:2px 8px;text-align:center;letter-spacing:0.06em}
#fryaPane .frya-label-item:first-child{border-right:1px solid var(--border)}
#fryaPane .frya-label-item .dot{display:inline-block;width:5px;height:5px;border-radius:50%;margin-right:3px;vertical-align:middle}
</style>
</head>
<body>
<div class="video-modal" id="videoModal">
  <span class="close" onclick="closeVideoModal()">&times;</span>
  <div style="display:flex;flex-direction:column;align-items:center;gap:12px;">
    <video id="videoPlayer" controls autoplay></video>
    <div style="display:flex;gap:8px;">
      <button onclick="saveVideo()" style="background:#1a2540;border:1px solid var(--accent);color:#fff;padding:8px 24px;border-radius:8px;cursor:pointer;font-size:0.8rem;">💾 Save</button>
      <button onclick="closeVideoModal()" style="background:#1a2540;border:1px solid #555;color:#aaa;padding:8px 24px;border-radius:8px;cursor:pointer;font-size:0.8rem;">✕ Close</button>
    </div>
  </div>
</div>

<div id="app">
  <div id="header">
    <h1>🔥 <span>VAN</span> Cockpit</h1>
    <div id="emotionBar"><span class="em-label">🎭</span></div>
    <div class="header-status">
      <span id="sessionStatus">⛔ disconnected</span>
      <span id="faceStatus">📷 off</span>
      <span id="cockpitStep">⟳ 0</span>
    </div>
  </div>

  <div id="main">
    <!-- LEFT: Living Mirror -->
    <div id="leftPane">
      <iframe id="mirrorFrame" src="/hooks/ui/simulations/ara-living-mirror" sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
      <div class="controls">
        <button onclick="postToMirror({type:'seedSpiral'})">🌀 Spiral</button>
        <button onclick="postToMirror({type:'toggleFace'})">📷 Face</button>
        <button onclick="postToMirror({type:'setZoneOverlay',value:true})">🔲 Zones</button>
        <button onclick="postToMirror({type:'setZoneOverlay',value:false})">🔲 Off</button>
        <button onclick="postToMirror({type:'setFaceInfluence',value:Math.min(1,faceInfluence+0.1)});faceInfluence=Math.min(1,faceInfluence+0.1)">🎭 +</button>
        <button onclick="postToMirror({type:'setFaceInfluence',value:Math.max(0,faceInfluence-0.1)});faceInfluence=Math.max(0,faceInfluence-0.1)">🎭 −</button>
        <span style="font-size:0.55rem;color:var(--dim);margin-left:auto">⏺ Ara Living Mirror</span>
      </div>
    </div>

    <!-- FRYA HOLOGRAM — SVG v2.194 + CANVAS v5.0 side by side -->
    <div id="fryaPane">
      <div class="frya-split">
        <div class="frya-half">
          <iframe id="fryaSvgFrame" src="/hooks/ui/simulations/ara-frya-hologram" onload="initFrya('svg')"></iframe>
        </div>
        <div class="frya-half">
          <iframe id="fryaCanvasFrame" src="/hooks/ui/simulations/ara-frya-canvas-v5" onload="initFrya('canvas')"></iframe>
        </div>
      </div>
      <div class="frya-label-bar">
        <span class="frya-label-item"><span class="dot" style="background:#00f2fe"></span> SVG v2.194</span>
        <span class="frya-label-item"><span class="dot" style="background:#7c5cfc"></span> CANVAS v5.0</span>
      </div>
    </div>

    <!-- RIGHT: Chat + Settings -->
    <div id="rightPane">
      <div class="tabs">
        <button id="tabChat" class="active" onclick="switchTab('chat')">💬 Chat</button>
        <button id="tabSettings" onclick="switchTab('settings')">⚙️ Settings</button>
      </div>

      <!-- CHAT -->
      <div id="chatPanel">
        <div id="chatMessages"><div style="text-align:center;color:var(--dim);font-size:0.65rem;padding:20px">💬 Connect to start speaking with DirtyTalker</div></div>
        <div id="chatInputArea">
          <input id="chatInput" placeholder="Type a message..." onkeydown="if(event.key==='Enter')sendChat()" disabled>
          <button id="chatSendBtn" onclick="sendChat()" disabled>Send</button>
        </div>
      </div>

      <!-- SETTINGS -->
      <div id="settingsPanel">
        <label>Voice Model</label>
        <select id="voiceSelect"><option value="af_bella">Bella</option><option value="af_nicole">Nicole</option><option value="af_sky">Sky</option><option value="en_US-amy-medium" selected>Amy</option></select>
        <label>Category</label>
        <select id="categorySelect"><option value="neutral">Neutral</option><option value="sensual">Sensual</option><option value="playful" selected>Playful</option><option value="filthy">Filthy</option><option value="intense">Intense</option></select>
        <label>Stutter <span class="val" id="stutterVal">0.20</span></label>
        <input type="range" id="stutterSlider" min="0" max="0.5" step="0.01" value="0.20" oninput="document.getElementById('stutterVal').textContent=parseFloat(this.value).toFixed(2)">
        <label>Sanitize</label>
        <select id="sanitizeSelect"><option value="true">On</option><option value="false">Off</option></select>
        <div class="photo-zone" id="photoZone" onclick="document.getElementById('photoInput').click()">
          <input type="file" id="photoInput" accept="image/*" style="display:none">
          <span id="photoLabel">📸 Upload session photo</span>
        </div>
        <button class="save" onclick="connectSession()" id="connectBtn">🔌 Connect Session</button>
        <div style="margin-top:12px;border-top:1px solid var(--border);padding-top:8px">
          <div class="status-row">Session: <span class="n" id="stSession">—</span></div>
          <div class="status-row">Emotion: <span class="n" id="stEmotion">neutral</span></div>
          <div class="status-row">Voice: <span class="n" id="stVoice">—</span></div>
          <div class="status-row">Steps: <span class="n" id="stSteps">0</span></div>
        </div>
      </div>
    </div>
  </div>

  <div id="stateLog">⟡ VAN Cockpit ready. Select an emotion tag or connect a session to begin.</div>
</div>

<script>
// ─── EMOTION TAGS (mirrors the living mirror's tags) ───
const EMOTION_TAGS = [
  {id:'neutral',  label:'Neutral',  emoji:'😐', color:'#888899'},
  {id:'joy',      label:'Joy',      emoji:'😊', color:'#66ff99'},
  {id:'laugh',    label:'Laugh',    emoji:'😂', color:'#88ffbb'},
  {id:'sad',      label:'Sad',      emoji:'😢', color:'#aa88ff'},
  {id:'surprise', label:'Surprise', emoji:'😮', color:'#66aaff'},
  {id:'anger',    label:'Anger',    emoji:'😠', color:'#ff6666'},
  {id:'fear',     label:'Fear',     emoji:'😨', color:'#cc66ff'},
  {id:'disgust',  label:'Disgust',  emoji:'🤢', color:'#88cc44'},
  {id:'contempt', label:'Contempt', emoji:'😏', color:'#dd8844'},
  {id:'tension',  label:'Tension',  emoji:'😬', color:'#ffaa44'},
  {id:'love',     label:'Love',     emoji:'💕', color:'#ff88aa'},
  {id:'mischief', label:'Mischief', emoji:'😈', color:'#ff66aa'},
];

// ─── STATE ───
let sessionToken = null;
let activeEmotion = 'neutral';
let faceInfluence = 0.5;
let stepCount = 0;
let settings = { voice:'en_US-amy-medium', category:'playful', stutter:0.20, sanitize:true };
let photoData = null;
const responsePhrases = {}; // response_id → phrase text

// ─── EMOTION BAR ───
const emBar = document.getElementById('emotionBar');
for (const em of EMOTION_TAGS) {
  const btn = document.createElement('button');
  btn.textContent = `${em.emoji} ${em.label}`;
  btn.dataset.id = em.id;
  btn.style.borderColor = em.color;
  btn.onclick = () => setEmotion(em.id);
  if (em.id === 'neutral') btn.classList.add('active');
  emBar.appendChild(btn);
}

function setEmotion(id) {
  activeEmotion = id;
  const em = EMOTION_TAGS.find(e => e.id === id);
  for (const b of emBar.children) b.classList.toggle('active', b.dataset.id === id);
  document.getElementById('stEmotion').textContent = id;
  postToMirror({type:'setEmotion', id});
  log(`${em.emoji} ${em.label}`);
}

function postToMirror(msg) {
  const iframe = document.getElementById('mirrorFrame');
  if (iframe && iframe.contentWindow) {
    iframe.contentWindow.postMessage(msg, '*');
  }
}

// ─── TAB SWITCHING ───
function switchTab(tab) {
  document.getElementById('tabChat').classList.toggle('active', tab === 'chat');
  document.getElementById('tabSettings').classList.toggle('active', tab === 'settings');
  document.getElementById('chatPanel').style.display = tab === 'chat' ? 'flex' : 'none';
  document.getElementById('settingsPanel').classList.toggle('active', tab === 'settings');
}

// ─── SESSION ───
async function connectSession() {
  try {
    const r = await fetch('/api/dirty-talker/session', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({})});
    const d = await r.json();
    sessionToken = d.session_token;
    document.getElementById('sessionStatus').textContent = `🔗 session active`;
    document.getElementById('stSession').textContent = sessionToken.substring(0,12)+'...';
    document.getElementById('chatInput').disabled = false;
    document.getElementById('chatSendBtn').disabled = false;
    document.getElementById('connectBtn').textContent = '✅ Connected';
    document.getElementById('connectBtn').disabled = true;
    log(`Session connected: ${sessionToken.substring(0,12)}...`);
    loadSettings();
  } catch (e) {
    log(`Session error: ${e.message}`);
  }
}

async function loadSettings() {
  if (!sessionToken) return;
  try {
    const r = await fetch(`/api/dirty-talker/settings?session_token=${sessionToken}`);
    if (!r.ok) return;
    const d = await r.json();
    if (d.voice) settings.voice = d.voice;
    if (d.category) settings.category = d.category;
    if (d.stutter !== undefined) settings.stutter = d.stutter;
    if (d.sanitize !== undefined) settings.sanitize = d.sanitize;
    document.getElementById('voiceSelect').value = settings.voice;
    document.getElementById('categorySelect').value = settings.category;
    document.getElementById('stutterSlider').value = settings.stutter;
    document.getElementById('stutterVal').textContent = settings.stutter.toFixed(2);
    document.getElementById('sanitizeSelect').value = settings.sanitize ? 'true' : 'false';
  } catch(e) {}
}

async function saveSettings() {
  if (!sessionToken) return;
  settings.voice = document.getElementById('voiceSelect').value;
  settings.category = document.getElementById('categorySelect').value;
  settings.stutter = parseFloat(document.getElementById('stutterSlider').value);
  settings.sanitize = document.getElementById('sanitizeSelect').value === 'true';
  try {
    await fetch('/api/dirty-talker/settings', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({session_token:sessionToken, ...settings})});
  } catch(e) {}
}
document.getElementById('voiceSelect').onchange = saveSettings;
document.getElementById('categorySelect').onchange = saveSettings;
document.getElementById('stutterSlider').oninput = function() { document.getElementById('stutterVal').textContent = parseFloat(this.value).toFixed(2); };
document.getElementById('stutterSlider').onchange = saveSettings;
document.getElementById('sanitizeSelect').onchange = saveSettings;

document.getElementById('photoInput').onchange = async function(e) {
  const file = e.target.files[0];
  if (!file || !sessionToken) return;
  const fd = new FormData();
  fd.append('photo', file);
  fd.append('session_token', sessionToken);
  try {
    const r = await fetch('/api/dirty-talker/photo', {method:'POST', body:fd});
    if (r.ok) {
      photoData = URL.createObjectURL(file);
      document.getElementById('photoLabel').innerHTML = `<img src="${photoData}"><br>✅ Photo uploaded`;
      document.getElementById('photoZone').classList.add('has-photo');
    }
  } catch(e) {}
};

// ─── CHAT ───
async function sendChat() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text || !sessionToken) return;
  input.value = '';
  addMessage(text, 'user');
  document.getElementById('chatSendBtn').disabled = true;
  try {
    const r = await fetch('/api/dirty-talker/chat', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({session_token:sessionToken, message:text, category:settings.category})});
    const d = await r.json();
    const phrase = d.phrase || d.response || '(no response)';
    const voiceTag = d.voice_tag || '';
    const voiceTagText = d.voice_tag_text || '';
    addMessage(phrase, 'system', voiceTag, voiceTagText, d.response_id);
    document.getElementById('stVoice').textContent = voiceTag || '—';
    stepCount++;
    document.getElementById('stSteps').textContent = stepCount;
  } catch(e) {
    addMessage(`Error: ${e.message}`, 'system');
  }
  document.getElementById('chatSendBtn').disabled = false;
}

function addMessage(text, role, voiceTag, voiceTagText, responseId) {
  if (responseId) responsePhrases[responseId] = text;
  const panel = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.dataset.phrase = text;
  let html = `<div>${text}</div>`;
  if (voiceTag) html += `<div class="voice-tag">🎤 ${voiceTag}${voiceTagText ? ' · '+voiceTagText : ''}</div>`;
  if (role === 'system') {
    html += `<div class="actions">`;
    html += `<button onclick="speakMessage(this, '${responseId || ''}')">🔊 Speak</button>`;
    if (responseId) html += `<button onclick="speakVisual('${responseId}')">✨ Speak Visually</button>`;
    html += `</div>`;
  }
  div.innerHTML = html;
  panel.appendChild(div);
  panel.scrollTop = panel.scrollHeight;
}

async function speakMessage(btn, responseId) {
  if (!sessionToken) return;
  const phrase = responsePhrases[responseId];
  if (!phrase) { log('No phrase to speak'); return; }
  btn.disabled = true; btn.textContent = '🔊 ...';
  try {
    const r = await fetch('/api/dirty-talker/speak', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({session_token:sessionToken, phrase, voice:settings.voice})});
    if (!r.ok) { const err = await r.text(); throw new Error(err); }
    const blob = await r.blob();
    const url = URL.createObjectURL(blob);
    const audio = new Audio(url);
    audio.onended = () => { btn.disabled = false; btn.textContent = '🔊 Speak'; };
    audio.play();
  } catch(e) {
    btn.disabled = false; btn.textContent = '🔊 Speak';
    log(`Speak error: ${e.message}`);
  }
}

async function speakVisual(responseId) {
  if (!sessionToken) return;
  const phrase = responsePhrases[responseId];
  if (!phrase) { log('No phrase for visual'); return; }
  try {
    const r = await fetch('/api/dirty-talker/speak-visual', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({session_token:sessionToken, phrase})});
    if (!r.ok) { const err = await r.text(); throw new Error(err); }
    const blob = await r.blob();
    const url = URL.createObjectURL(blob);
    const modal = document.getElementById('videoModal');
    const player = document.getElementById('videoPlayer');
    currentVideoUrl = url;
    modal.classList.add('active');
    player.src = url;
    player.play();
  } catch(e) {
    log(`Speak-visual error: ${e.message}`);
  }
}

// ─── VIDEO MODAL ───
let currentVideoUrl = null;
function closeVideoModal() {
  const modal = document.getElementById('videoModal');
  const player = document.getElementById('videoPlayer');
  player.pause();
  modal.classList.remove('active');
}
function saveVideo() {
  const player = document.getElementById('videoPlayer');
  if (!player.src) return;
  const a = document.createElement('a');
  a.href = player.src;
  a.download = `speak-visual-${Date.now()}.mp4`;
  a.click();
  log('💾 Video saved');
}

// ─── LOG ───
function log(msg) {
  const el = document.getElementById('stateLog');
  const t = new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  el.innerHTML += `<div>[${t}] ${msg}</div>`;
  el.scrollTop = el.scrollHeight;
  if (el.children.length > 50) el.removeChild(el.firstChild);
}

// ─── STEP COUNTER ───
setInterval(() => {
  document.getElementById('cockpitStep').textContent = `⟳ ${++stepCount}`;
  if (stepCount % 60 === 0) {
    // Periodic emotion refresh
    postToMirror({type:'setEmotion', id:activeEmotion});
  }
}, 1000);

// ─── KEYBOARD SHORTCUTS ───
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  // Ctrl+number → emotion
  if (e.ctrlKey && e.key >= '1' && e.key <= '9') {
    const idx = parseInt(e.key) - 1;
    if (idx < EMOTION_TAGS.length) setEmotion(EMOTION_TAGS[idx].id);
  }
  if (e.ctrlKey && e.key === '0') setEmotion(EMOTION_TAGS[9]?.id);
  if (e.ctrlKey && e.key === '-') setEmotion(EMOTION_TAGS[10]?.id);
  if (e.ctrlKey && e.key === '=') setEmotion(EMOTION_TAGS[11]?.id);
  if (e.key === 'Enter' && e.ctrlKey) sendChat();
});

// ─── FRYA HOLOGRAM BRIDGE (SVG + CANVAS) ───
function postToFryaAll(msg) {
  ['fryaSvgFrame','fryaCanvasFrame'].forEach(id => {
    const f = document.getElementById(id);
    if (f && f.contentWindow) f.contentWindow.postMessage(msg, '*');
  });
}
function initFrya(type) { postToFryaAll({type:'setEmotion', id:activeEmotion}); }
const _origSetEmotion = setEmotion;
setEmotion = function(id) { _origSetEmotion(id); postToFryaAll({type:'setEmotion', id}); };
const _origAddMessage = addMessage;
addMessage = function(t, r, vt, vtt, rid) {
  _origAddMessage(t, r, vt, vtt, rid);
  if (r === 'system') postToFryaAll({type:'setBoth', id:activeEmotion, text:t});
};

log('⟡ VAN Cockpit initialized. Select emotion tags or connect a session.');
setTimeout(() => postToFryaAll({type:'setEmotion', id:activeEmotion}), 500);
</script>
