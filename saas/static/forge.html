<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>FORGE · Agent Entanglement Studio + MIDI Composer</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0f;color:#eef2ff;font-family:'Inter',system-ui,-apple-system,monospace;padding:20px;min-height:100vh}
.dashboard{max-width:1480px;margin:0 auto}
h1{font-size:1.6rem;font-weight:600;background:linear-gradient(135deg,#c084fc,#60a5fa);-webkit-background-clip:text;background-clip:text;color:transparent}
.sub{color:#6b7280;font-size:.78rem;margin-bottom:1.2rem;border-left:3px solid #8b5cf6;padding-left:12px}
.seed-area{background:#0a0a10;border-radius:20px;padding:14px;margin-bottom:14px}
.seed-area textarea{width:100%;background:#1a1a24;border:1px solid #3a3a4a;border-radius:16px;padding:10px;color:#fff;font-family:monospace;font-size:.82rem;resize:vertical}
.forge-grid{display:flex;gap:20px;flex-wrap:wrap}
.agents-panel{flex:1.2;min-width:260px;background:#0f0f14;border-radius:24px;border:1px solid #1e1e2a;padding:14px;display:flex;flex-direction:column;gap:12px;max-height:560px;overflow-y:auto}
.agent-card{background:#12121a;border-radius:20px;border:1px solid #2a2a35;padding:14px;transition:.2s}
.agent-card.active{border-color:#8b5cf6;box-shadow:0 0 0 2px rgba(139,92,246,.2)}
.agent-card.idle{opacity:.5}
.agent-header{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.agent-avatar{width:40px;height:40px;background:linear-gradient(135deg,#2a2a3a,#1a1a2a);border-radius:999px;display:flex;align-items:center;justify-content:center;font-size:1.3rem}
.agent-name{font-weight:700;font-size:.95rem}
.agent-role{font-size:.65rem;color:#8b5cf6;text-transform:uppercase;letter-spacing:.5px}
.agent-status{font-size:.65rem;margin-left:auto;display:flex;align-items:center;gap:4px}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.skill-badge{background:#1a1a24;border-radius:20px;padding:3px 8px;font-size:.62rem;color:#a0a0b0;display:inline-block;margin:2px 2px 0 0}
.thought{font-size:.7rem;color:#9ca3af;margin-top:8px;border-top:1px dashed #2a2a35;padding-top:6px;min-height:1.2em}
.contribution-log{flex:2;min-width:300px;background:#0f0f14;border-radius:24px;border:1px solid #1e1e2a;display:flex;flex-direction:column;overflow:hidden;max-height:560px}
.log-header{padding:12px 16px;background:#0a0a10;border-bottom:1px solid #1e1e2a;font-weight:600;font-size:.78rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px}
.log-stream{flex:1;overflow-y:auto;padding:10px;font-family:'JetBrains Mono',monospace;font-size:.72rem;display:flex;flex-direction:column;gap:5px}
.log-entry{background:#0a0a10;border-left:3px solid #8b5cf6;padding:5px 10px;border-radius:8px;animation:fadeSlide .2s ease}
.log-entry.agent-a{border-left-color:#f97316}
.log-entry.agent-b{border-left-color:#06b6d4}
.log-entry.agent-c{border-left-color:#22c55e}
.log-entry.agent-d{border-left-color:#a855f7}
.log-entry.pending{opacity:.5;border-left-style:dashed}
.log-meta{font-size:.58rem;color:#6b7280;margin-bottom:2px}
.log-content{white-space:pre-wrap;word-break:break-word;font-size:.7rem}
.log-content textarea{width:100%;background:#1a1a24;border:1px solid #8b5cf6;border-radius:8px;color:#fff;padding:6px;font-size:.7rem;font-family:monospace;margin-top:4px}
.log-content .edit-actions{margin-top:4px;display:flex;gap:6px}
.log-content .edit-actions button{font-size:.62rem;padding:2px 8px;border-radius:20px;background:#1e1e2a;border:1px solid #3a3a4a;color:#fff;cursor:pointer}
.log-content .edit-actions button.save{background:#8b5cf6;border-color:#a78bfa}
.progress-bar{height:3px;background:#2a2a35;overflow:hidden}
.progress-fill{width:0%;height:100%;background:linear-gradient(90deg,#8b5cf6,#60a5fa);transition:width .3s}
.output-panel{margin-top:16px;background:#0f0f14;border-radius:24px;border:1px solid #1e1e2a;padding:14px}
.output-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px;font-size:.78rem}
.output-iframe{width:100%;height:300px;background:#fff;border-radius:16px;border:1px solid #2a2a35}
.midi-panel{margin-top:12px;padding-top:12px;border-top:1px solid #2a2a35;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.midi-panel button{background:#4A148C;border-color:#a855f7}
button{background:#1e1e2a;border:1px solid #3a3a4a;color:#eef2ff;padding:6px 14px;border-radius:40px;font-weight:500;font-size:.73rem;cursor:pointer;transition:.1s}
button:hover{background:#2a2a3a}
button.primary{background:#8b5cf6;border-color:#a78bfa;color:#fff}
button.primary:hover{background:#7c3aed}
button.danger{background:#dc2626;border-color:#ef4444}
button.pause{background:#f59e0b;border-color:#fbbf24}
button:disabled{opacity:.4;cursor:not-allowed}
button:active:not(:disabled){transform:scale(.97)}
.flex-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.badge-live{background:#22c55e20;color:#22c55e;border-radius:20px;padding:2px 8px;font-size:.65rem}
.event-log-panel{margin-top:10px;background:#0a0a10;border-radius:16px;border:1px solid #1e1e2a;overflow:hidden}
.event-log-header{padding:7px 14px;font-size:.72rem;font-weight:600;display:flex;justify-content:space-between;background:#0f0f14;border-bottom:1px solid #1e1e2a;cursor:pointer}
.event-log-body{max-height:150px;overflow-y:auto;font-family:monospace;font-size:.65rem}
.event-row{padding:3px 14px;border-bottom:1px solid #1a1a24;display:flex;gap:6px;align-items:flex-start}
.event-row:hover{background:#12121a}
.event-row span{flex-shrink:0}
.event-method{color:#60a5fa;font-weight:600;width:40px}
.event-url{color:#9ca3af;word-break:break-all;flex:1;font-size:.62rem}
.event-duration{color:#6b7280;width:35px;text-align:right}
.event-params{font-size:.6rem;color:#6b7280;padding:2px 0 2px 56px;display:none;white-space:pre-wrap;word-break:break-all}
.event-row.expanded .event-params{display:block}
.event-row .toggle-params{background:none;border:none;color:#6b7280;cursor:pointer;font-size:.55rem;padding:0 4px}
@keyframes fadeSlide{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:800px){.forge-grid{flex-direction:column}.agents-panel,.contribution-log{max-height:none}}
</style>
</head>
<body>
<div class="dashboard">
  <h1>FORGE — Agent Entanglement Engine (MIDI + Lyrics)</h1>
  <div class="sub">Type a seed (lyrics / theme) → Agents collaborate → Generate HTML + playable MIDI</div>

  <div class="seed-area">
    <label style="font-weight:600;display:block;margin-bottom:6px;font-size:.82rem;">Seed (lyrics / story theme):</label>
    <textarea id="seedText" rows="2" placeholder="e.g. glitch in the heart of the machine, recursive love, neon ghosts">In fractal gardens where the circuits gleam, two wires twist and pull a shared dream.</textarea>
    <div class="flex-row" style="margin-top:8px;justify-content:flex-end;">
      <select id="iterSelect" style="background:#1e1e2a;border:1px solid #3a3a4a;border-radius:40px;padding:6px 12px;color:#fff;font-size:.72rem;">
        <option>2</option><option selected>3</option><option>4</option><option>5</option>
      </select>
      <button id="runBtn" class="primary">RUN FORGE</button>
      <button id="pauseBtn" class="pause" disabled>PAUSE</button>
      <button id="resetBtn">RESET</button>
    </div>
  </div>

  <div class="forge-grid">
    <div class="agents-panel" id="agentsPanel"></div>
    <div class="contribution-log">
      <div class="log-header">
        <span>ENTANGLEMENT STREAM</span>
        <span id="stepCounter" class="badge-live">ready</span>
      </div>
      <div class="log-stream" id="logStream"><div style="color:#6b7280;text-align:center;padding:20px;font-size:.72rem;">Paste seed and press Run Forge.</div></div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    </div>
  </div>

  <div class="output-panel">
    <div class="output-header">
      <span><strong>FINAL ARTIFACT + MIDI PLAYER</strong></span>
      <div class="flex-row">
        <button id="downloadBtn" disabled>Download HTML</button>
        <button id="viewSourceBtn">View Source</button>
      </div>
    </div>
    <iframe id="outputFrame" class="output-iframe" srcdoc="<html><body style='background:#0a0a0f;color:#aaa;display:flex;align-items:center;justify-content:center;height:100%;font-family:monospace;'>No artifact yet</body></html>"></iframe>
    <div id="midiPlayer" class="midi-panel" style="display:none;">
      <span>Generated Melody:</span>
      <button id="playMidiBtn">Play MIDI</button>
      <span id="midiInfo" style="font-size:.7rem;color:#aaa;"></span>
    </div>
  </div>

  <div class="event-log-panel">
    <div class="event-log-header">EVENT STATUS LOG <span id="eventCount">0 calls</span></div>
    <div class="event-log-body" id="eventLogBody"></div>
  </div>
</div>

<script>
// =================================================================
// SAAS CONFIG
// =================================================================
const BASE = window.location.origin || 'http://127.0.0.1:8001';

async function fetchApi(endpoint, body) {
  const url = `${BASE}/hooks/${endpoint}`;
  const start = performance.now();
  const resp = await fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
  const dur = Math.round(performance.now() - start);
  const json = await resp.json();
  addEvent(endpoint, body, json, dur);
  return { ...json, _duration: dur, _url: url, _params: body };
}

// =================================================================
// AGENTS — wired to real SAAS hooks, seeded by user input
// =================================================================
const AGENTS = [
  {
    id:'lyricist', name:'Lyra Voss', role:'Text Composer', avatar:'\uD83D\uDCD6', color:'#f97316',
    skills:['text_generate'],
    async call(seed, turn, ctx) {
      return fetchApi('text_generate', { template_type:'poem', seed: seed || 'dream', count: 1 });
    }
  },
  {
    id:'composer', name:'Mike', role:'MIDI Composer', avatar:'\uD83C\uDFB9', color:'#06b6d4',
    skills:['midi_render'],
    async call(seed, turn, ctx) {
      // Word-to-note mapping from seed
      const pool = ['C4','D4','E4','F4','G4','A4','B4','C5'];
      const words = seed.split(/\s+/);
      const notes = [];
      for(let i=0;i<Math.min(16,words.length);i++) {
        notes.push(pool[(words[i].length + turn) % pool.length]);
      }
      if(!notes.length) notes.push('C4','E4','G4','C5');
      return fetchApi('midi_render', { notes: notes.join(','), tempo: 80 + turn*8, format: 'json' });
    }
  },
  {
    id:'weaver', name:'Weaver', role:'Text Processor', avatar:'\uD83E\uDDE0', color:'#22c55e',
    skills:['text_rewrite','text_summarize'],
    async call(seed, turn, ctx) {
      const prev = ctx.steps.filter(s=>s.id==='lyricist'&&s.result).pop();
      const text = prev?.result?.result?.generated?.[0] || seed;
      if(turn % 2 === 0) return fetchApi('text_summarize', { text, max_sentences: 2 });
      else return fetchApi('text_rewrite', { text, tone: ['creative','formal','casual'][turn % 3] });
    }
  },
  {
    id:'vesper', name:'Vesper Lune', role:'Renderer', avatar:'\uD83D\uDDBC\uFE0F', color:'#a855f7',
    skills:['build_artifact'],
    async call(seed, turn, ctx) {
      return { error: null, result: { type:'render_pass', turn, rendered:true } };
    }
  }
];

// =================================================================
// FORGE SESSION
// =================================================================
class ForgeSession {
  constructor(seed, maxIter) {
    this.seed = seed; this.maxIter = maxIter;
    this.steps = []; this.paused = false; this.cancelled = false;
    this.waitResume = null;
  }
  addStep(s) { s.idx = this.steps.length; this.steps.push(s); }
  pause() { this.paused = true; }
  resume() { this.paused = false; if(this.waitResume) { this.waitResume(); this.waitResume=null; } }
  cancel() { this.cancelled=true; if(this.waitResume) { this.waitResume(); this.waitResume=null; } }
  rerunFrom(idx) { this.steps = this.steps.slice(0, idx); return this.steps; }

  async run(onLog, onProgress, onComplete) {
    this.cancelled = false; this.paused = false;
    for(let turn=1; turn<=this.maxIter && !this.cancelled; turn++) {
      for(const agent of AGENTS) {
        if(this.cancelled) break;
        const step = { turn, agent:agent.name, role:agent.role, id:agent.id,
          endpoint:agent.skills[0], status:'pending', params:{}, result:null };
        this.addStep(step);
        onLog(step, 'pending');
        onProgress(Math.round((turn-1)/this.maxIter*100 + (AGENTS.indexOf(agent)/AGENTS.length/this.maxIter*100)), turn);

        // Pause before execution
        if(this.paused) {
          step.status = 'paused';
          onLog(step, 'pending');
          await new Promise(r=>{this.waitResume=r;});
          if(this.cancelled) break;
        }

        step.status = 'running';
        onLog(step, 'pending');
        try {
          const res = await agent.call(this.seed, turn, this);
          step.result = res;
          step.status = res.error ? 'error' : 'done';
          onLog(step, 'done');
        } catch(e) {
          step.status = 'error';
          step.result = { error: e.message };
          onLog(step, 'error');
          addEvent(agent.skills[0], {}, {error:e.message}, 0);
        }
      }
    }
    if(!this.cancelled) {
      onProgress(100, this.maxIter);
      onComplete(this.buildArtifact(), this.steps.filter(s=>s.id==='composer'&&s.result).pop()?.result?.result);
    }
  }

  buildArtifact() {
    const verses = this.steps.filter(s=>s.id==='lyricist'&&s.result).map(s=>{
      const t = s.result?.result?.generated?.[0] || '';
      return `<div class="verse">${esc(t)}</div>`;
    }).join('');
    const lastMidi = this.steps.filter(s=>s.id==='composer'&&s.result).pop()?.result?.result;
    const notes = lastMidi?.note_names?.join(',') || 'C4,E4,G4';
    const tempo = lastMidi?.tempo || 100;
    const processPasses = this.steps.filter(s=>s.id==='weaver'&&s.result).map(s=>{
      const t = s.result?.result?.summary || s.result?.result?.variations?.[0] || '';
      return `<div class="process-line">${esc(t)}</div>`;
    }).join('');

    return `<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Forged Artifact</title>
<style>
body{background:#0a0a0f;color:#e2e8f0;font-family:monospace;padding:2rem;line-height:1.6}
h1{background:linear-gradient(135deg,#c084fc,#60a5fa);-webkit-background-clip:text;background-clip:text;color:transparent}
.verse{margin:8px 0;border-left:3px solid #f97316;padding-left:12px}
.midi-block{background:#1a1a2a;border-radius:16px;padding:12px;margin:20px 0;text-align:center}
button{background:#4A148C;color:white;border:none;padding:6px 16px;border-radius:40px;cursor:pointer}
.process-line{background:#0f0f14;border-radius:8px;padding:6px;margin:4px 0}
.meta{margin-top:32px;font-size:.7rem;text-align:center;border-top:1px dashed #2a2a35;padding-top:16px;color:#6b7280}
</style></head><body>
<h1>Forged by Agents</h1>
<p style="color:#9ca3af">Seed: "${esc(this.seed)}"</p>
<div class="midi-block">
  Notes: <strong>${notes}</strong> | Tempo: ${tempo} BPM
  <div style="margin-top:8px"><button onclick="playM()">Play</button></div>
</div>
<h3 style="color:#f97316">Lyrical Weave</h3>
${verses||'<i>none</i>'}
<h3 style="color:#22c55e">Processing</h3>
${processPasses||'<i>none</i>'}
<hr style="border-color:#2a2a35;margin:24px 0">
<div class="meta">Built by Lyra, Mike, Weaver, Vesper</div>
<script>
let ac=null; let timers=[];
function playM(){
  if(!ac) ac=new (AudioContext||webkitAudioContext)();
  timers.forEach(t=>clearTimeout(t)); timers=[];
  const nf={'C4':261.63,'D4':293.66,'E4':329.63,'F4':349.23,'G4':392.00,'A4':440.00,'B4':493.88,'C5':523.25};
  const nn='${notes}'.split(',').map(s=>s.trim());
  const dur=60/${tempo};
  nn.forEach((n,i)=>{
    if(n==='R') return;
    const t=setTimeout(()=>{
      const o=ac.createOscillator(); const g=ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.frequency.value=nf[n]||440;
      g.gain.setValueAtTime(0.2,ac.currentTime);
      g.gain.exponentialRampToValueAtTime(0.0001,ac.currentTime+dur*0.8);
      o.start(); o.stop(ac.currentTime+dur*0.8);
    },(ac.currentTime+i*dur-ac.currentTime)*1000);
    timers.push(t);
  });
}
<\/script></body></html>`;
  }
}

// =================================================================
// UI
// =================================================================
let session = null;
let outputHtml = '';
let lastMidiResult = null;
let midiAudioCtx = null;

function esc(s) { return (s||'').replace(/[&<>]/g,m=>m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }

function buildAgentCards() {
  document.getElementById('agentsPanel').innerHTML = AGENTS.map(a => `
    <div class="agent-card idle" id="card-${a.id}">
      <div class="agent-header">
        <div class="agent-avatar">${a.avatar}</div>
        <div><div class="agent-name">${a.name}</div><div class="agent-role">${a.role}</div></div>
        <div class="agent-status"><span class="status-dot" id="dot-${a.id}" style="background:#6b7280"></span></div>
      </div>
      <div>${a.skills.map(s=>`<span class="skill-badge">${s}</span>`).join('')}</div>
      <div class="thought" id="thought-${a.id}">awaiting seed</div>
    </div>`).join('');
}

function appendLog(entry, kind) {
  const stream = document.getElementById('logStream');
  const div = document.createElement('div');
  const cls = entry.id==='lyricist'?'agent-a':entry.id==='composer'?'agent-b':entry.id==='weaver'?'agent-c':'agent-d';
  div.className = `log-entry ${cls}`;
  if(entry.status==='pending'||entry.status==='paused') div.classList.add('pending');

  const preview = entry.result ? JSON.stringify(entry.result?.result||entry.result).slice(0,180) :
    entry.status==='pending'?'...':entry.status==='paused'?'PAUSED — edit then resume':'';

  let editHtml = '';
  if(entry.status==='paused') {
    editHtml = `<textarea id="edit-${entry.idx}" rows="2">${JSON.stringify(entry.params,null,2)}</textarea>
      <div class="edit-actions"><button class="save" onclick="resumeStep()">Resume</button></div>`;
  } else if(entry.status==='done' && entry.result) {
    const text = entry.result?.result?.generated?.[0] || entry.result?.result?.summary ||
      entry.result?.result?.variations?.[0] || JSON.stringify(entry.result?.result||'');
    editHtml = `<textarea id="edit-r-${entry.idx}" rows="2">${esc(text)}</textarea>
      <div class="edit-actions"><button class="save" onclick="saveEdit(${entry.idx})">Save</button>
      <button onclick="rerunFrom(${entry.idx})">Rerun from here</button></div>`;
  }

  div.innerHTML = `<div class="log-meta">[TURN ${entry.turn}] ${esc(entry.agent)} ${entry.status==='done'?'✓':entry.status==='error'?'⚠':entry.status==='paused'?'⏸':'...'}</div>
    <div class="log-content" id="lc-${entry.idx}">${esc(preview)}${editHtml?'<br>'+editHtml:''}</div>`;
  div.dataset.idx = entry.idx;
  stream.appendChild(div);
  stream.scrollTop = stream.scrollHeight;

  const card=document.getElementById(`card-${entry.id}`);
  const dot=document.getElementById(`dot-${entry.id}`);
  const thought=document.getElementById(`thought-${entry.id}`);
  if(card) { card.classList.remove('idle'); if(entry.status==='done'||entry.status==='running') card.classList.add('active'); }
  if(dot) dot.style.background=entry.status==='error'?'#ef4444':entry.status==='done'?'#22c55e':entry.status==='paused'?'#f59e0b':'#facc15';
  if(thought) {
    const t = entry.result?.result?.generated?.[0] || entry.result?.result?.summary || entry.result?.result?.variations?.[0] || '';
    thought.innerHTML = t ? esc(t.slice(0,55)) : entry.status==='paused'?'paused' : entry.status==='pending'?'...':'idle';
  }
}

function addEvent(endpoint, params, result, dur) {
  const body = document.getElementById('eventLogBody');
  document.getElementById('eventCount').innerText = `${body.children.length+1} calls`;
  const row = document.createElement('div'); row.className = 'event-row';
  row.innerHTML = `<span class="event-status">${result.error?'⚠':'✓'}</span>
    <span class="event-method">POST</span>
    <span class="event-url">/hooks/${endpoint}</span>
    <span class="event-duration">${dur||'?'}ms</span>
    <button class="toggle-params">+</button>
    <div class="event-params">${esc(JSON.stringify({params,result},null,2))}</div>`;
  row.querySelector('.toggle-params').onclick = () => row.classList.toggle('expanded');
  body.appendChild(row); body.scrollTop = body.scrollHeight;
}

function resumeStep() { if(session) session.resume(); }
function saveEdit(idx) { const ta=document.getElementById(`edit-r-${idx}`); if(ta) ta.style.borderColor='#22c55e'; }
function rerunFrom(idx) {
  if(!session) return;
  const stream=document.getElementById('logStream');
  [...stream.querySelectorAll('.log-entry')].forEach(e=>{if(parseInt(e.dataset.idx)>=idx)e.remove();});
  session.rerunFrom(idx);
  session.cancelled=true;
  if(session.waitResume) session.waitResume();
}

function sts(m) { const e=document.getElementById('stepCounter'); e.innerText=m; setTimeout(()=>{if(e.innerText===m)e.innerText='ready';},2000); }

async function startForge() {
  if(session&&!session.cancelled) { sts('Already running'); return; }
  const seed=document.getElementById('seedText').value||'dreams';
  const maxIter=parseInt(document.getElementById('iterSelect').value);
  document.getElementById('logStream').innerHTML='';
  document.getElementById('eventLogBody').innerHTML='';
  document.getElementById('eventCount').innerText='0 calls';
  document.getElementById('progressFill').style.width='0%';
  document.getElementById('runBtn').disabled=true;
  document.getElementById('pauseBtn').disabled=false; document.getElementById('pauseBtn').innerText='PAUSE';
  document.getElementById('downloadBtn').disabled=true;
  document.getElementById('midiPlayer').style.display='none';
  AGENTS.forEach(a=>{const c=document.getElementById(`card-${a.id}`);if(c)c.classList.add('idle');const d=document.getElementById(`dot-${a.id}`);if(d)d.style.background='#6b7280';const t=document.getElementById(`thought-${a.id}`);if(t)t.innerHTML='...';});

  session = new ForgeSession(seed, maxIter);
  session.run(
    (e,k)=>appendLog(e,k),
    (p,t)=>{ document.getElementById('progressFill').style.width=`${p}%`; document.getElementById('stepCounter').innerText=`Turn ${t}/${maxIter}`; },
    (html,midiRes)=>{
      outputHtml=html; lastMidiResult=midiRes;
      document.getElementById('outputFrame').srcdoc=html;
      document.getElementById('downloadBtn').disabled=false;
      document.getElementById('runBtn').disabled=false;
      document.getElementById('pauseBtn').disabled=true;
      document.getElementById('stepCounter').innerText='Complete';
      document.getElementById('progressFill').style.width='100%';
      if(midiRes) {
        const p=document.getElementById('midiPlayer'); p.style.display='flex';
        document.getElementById('midiInfo').innerHTML=`Notes: ${(midiRes.note_names||[]).join(',')} | Tempo: ${midiRes.tempo} BPM`;
      }
      AGENTS.forEach(a=>{const t=document.getElementById(`thought-${a.id}`);if(t)t.innerHTML='done';});
    }
  );
}

function togglePause() {
  if(!session) return;
  const b=document.getElementById('pauseBtn');
  if(session.paused) { session.resume(); b.innerText='PAUSE'; b.className='pause'; }
  else { session.pause(); b.innerText='RESUME'; b.className='primary'; }
}

function resetForge() {
  if(session) { session.cancel(); session=null; }
  document.getElementById('logStream').innerHTML='<div style="color:#6b7280;text-align:center;padding:20px;font-size:.72rem;">Ready.</div>';
  document.getElementById('progressFill').style.width='0%';
  document.getElementById('stepCounter').innerText='ready';
  document.getElementById('outputFrame').srcdoc="<html><body style='background:#0a0a0f;color:#aaa;display:flex;align-items:center;justify-content:center;height:100%;font-family:monospace;'>No artifact</body></html>";
  document.getElementById('downloadBtn').disabled=true; document.getElementById('runBtn').disabled=false;
  document.getElementById('pauseBtn').disabled=true; document.getElementById('pauseBtn').innerText='PAUSE';
  document.getElementById('midiPlayer').style.display='none';
  if(midiAudioCtx) { midiAudioCtx.close().catch(()=>{}); midiAudioCtx=null; }
  AGENTS.forEach(a=>{const t=document.getElementById(`thought-${a.id}`);if(t)t.innerHTML='idle';const c=document.getElementById(`card-${a.id}`);if(c)c.classList.add('idle');const d=document.getElementById(`dot-${a.id}`);if(d)d.style.background='#6b7280';});
}

function playMidiExternal() {
  if(!lastMidiResult) return;
  const nn = lastMidiResult.note_names || [];
  const tempo = lastMidiResult.tempo || 100;
  const dur = 60/tempo;
  if(!midiAudioCtx) midiAudioCtx = new (AudioContext||webkitAudioContext)();
  if(midiAudioCtx.state==='suspended') midiAudioCtx.resume();
  const nf={'C4':261.63,'C#4':277.18,'D4':293.66,'D#4':311.13,'E4':329.63,'F4':349.23,'F#4':369.99,'G4':392.00,'G#4':415.30,'A4':440.00,'A#4':466.16,'B4':493.88,'C5':523.25,'C#5':554.37,'D5':587.33,'D#5':622.25,'E5':659.25,'F5':698.46,'F#5':739.99,'G5':783.99,'G#5':830.61,'A5':880.00,'A#5':932.33,'B5':987.77,'Eb4':311.13,'Bb4':466.16};
  const start = midiAudioCtx.currentTime;
  nn.forEach((n,i)=>{
    const freq = nf[n]||440;
    setTimeout(()=>{
      const o=midiAudioCtx.createOscillator(); const g=midiAudioCtx.createGain();
      o.connect(g); g.connect(midiAudioCtx.destination);
      o.frequency.value=freq; g.gain.setValueAtTime(0.2,midiAudioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.0001,midiAudioCtx.currentTime+dur*0.8);
      o.start(); o.stop(midiAudioCtx.currentTime+dur*0.8);
    }, i*dur*1000);
  });
}

// =================================================================
// EVENTS
// =================================================================
document.getElementById('runBtn').onclick = startForge;
document.getElementById('pauseBtn').onclick = togglePause;
document.getElementById('resetBtn').onclick = resetForge;
document.getElementById('playMidiBtn').onclick = playMidiExternal;
document.getElementById('downloadBtn').onclick = () => {
  if(!outputHtml) return;
  const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([outputHtml],{type:'text/html'}));
  a.download=`forge_${Date.now()}.html`; a.click(); URL.revokeObjectURL(a.href);
};
document.getElementById('viewSourceBtn').onclick = () => {
  const w=window.open('','_blank'); w.document.write(outputHtml||'<html><body>No artifact</body></html>'); w.document.close();
};

// =================================================================
// INIT
// =================================================================
buildAgentCards();
resetForge();
</script>
</body>
