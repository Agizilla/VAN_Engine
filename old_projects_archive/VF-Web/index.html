<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Persistence Filter</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" xintegrity="sha384-QWTKZyjpPEjD8k+g9g+N/1g6F5R1/tYI3i+hD1wWbOqA4V5u7yA8bK5S5v4f8C7t" crossorigin="anonymous">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" xintegrity="sha512-SnH5WK+bZxgPHs44uWIX+LLMDJdZslpUjeKxKkMvY+K5h1hG9tD6k/s4h/k34N5/2E5D5U/P5u5wP5p5wP5w==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        /* Custom styles for canvas and video container */
        .video-container {
            max-width: 100%;
            height: auto;
            margin: auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #video-canvas {
            border: 2px solid #343a40;
            display: block;
            width: 100%;
            max-width: 800px;
            aspect-ratio: 16 / 9; /* Maintain aspect ratio */
        }
        #video-source {
            display: none; /* The source video element is hidden */
        }
        .control-button {
            padding: 0.75rem 1rem;
            font-size: 1rem;
        }
    </style>
</head>
<body class="bg-light p-3">

    <div class="container my-4">
        <h1 class="text-center mb-4 text-primary">Video Persistence Filter</h1>

        <!-- Controls Card -->
        <div class="card shadow-sm mb-4">
            <div class="card-body">

                <!-- ROW 1: File Selection and Filter Toggle -->
                <div class="row g-3 align-items-center mb-4 border-bottom pb-3">
                    <!-- Button 1: Video File Selection -->
                    <div class="col-md-6">
                        <label for="videoFile" class="form-label fw-bold">1. Select Video File</label>
                        <input type="file" class="form-control" id="videoFile" accept="video/*">
                    </div>

                    <!-- Button 2: Toggle Filter -->
                    <div class="col-md-6 d-flex align-items-end">
                        <button id="toggleFilterBtn" class="btn btn-lg btn-danger w-100" disabled>
                            <span id="filterStatus">Filter OFF</span>
                        </button>
                    </div>
                </div>

                <!-- ROW 2: Playback Controls and Screenshot -->
                <h5 class="fw-bold mb-3">Playback Controls</h5>
                <div class="row g-3 align-items-center mb-4">

                    <!-- Play/Pause Button -->
                    <div class="col-6 col-md-3">
                        <button id="playPauseBtn" class="btn btn-primary w-100 control-button" disabled>
                            <i class="fa-solid fa-play" id="playPauseIcon"></i>
                            <span id="playPauseText">Play</span>
                        </button>
                    </div>

                    <!-- Step Backward -->
                    <div class="col-6 col-md-2">
                        <button id="stepBackBtn" class="btn btn-secondary w-100 control-button" disabled>
                            <i class="fa-solid fa-backward"></i> Prev
                        </button>
                    </div>

                    <!-- Step Forward -->
                    <div class="col-6 col-md-2">
                        <button id="stepForwardBtn" class="btn btn-secondary w-100 control-button" disabled>
                            Next <i class="fa-solid fa-forward"></i>
                        </button>
                    </div>

                    <!-- Screenshot Button -->
                    <div class="col-6 col-md-5">
                        <button id="screenshotBtn" class="btn btn-info w-100 control-button text-white" disabled>
                            <i class="fa-solid fa-camera"></i> Take Screenshot
                        </button>
                    </div>
                </div>

                <!-- ROW 3: Configuration -->
                <h5 class="fw-bold mb-3 border-top pt-3">Filter Configuration</h5>
                <div class="row g-3 align-items-center">
                    <div class="col-md-6">
                        <label for="thresholdInput" class="form-label fw-bold">
                            Persistence Threshold (Frames)
                        </label>
                        <input type="number" class="form-control" id="thresholdInput" value="30" min="5" max="255">
                        <div class="form-text">
                            A pixel must be static for this many frames to turn black.
                        </div>
                    </div>
                    <div class="col-md-6">
                        <label for="toleranceInput" class="form-label fw-bold">
                            Color Tolerance
                        </label>
                        <input type="range" class="form-range" id="toleranceInput" value="10" min="0" max="100">
                        <div class="form-text">
                            How much color change is ignored (0 = exact match). Current: <span id="toleranceValue">10</span>.
                        </div>
                    </div>
                </div>

                <!-- ROW 4: Visualization Toggle -->
                <div class="row g-3 mt-3">
                    <div class="col-12">
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" role="switch" id="toggleVisualization">
                            <label class="form-check-label fw-bold" for="toggleVisualization">
                                Visualize Persistence Map (Debug Mode)
                            </label>
                            <div class="form-text">
                                Pixels turn from blue (low persistence) to red (high persistence) instead of black.
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <!-- Video Display Area -->
        <div class="video-container bg-dark rounded shadow-lg p-2">
            <!-- Hidden Video Element (Source) -->
            <video id="video-source" preload="auto" crossorigin="anonymous" loop muted playsinline></video>

            <!-- Canvas Element (Output) -->
            <canvas id="video-canvas" width="800" height="450"></canvas>
        </div>

        <div id="messageBox" class="mt-3 text-center d-none">
            <div class="alert alert-info"></div>
        </div>
    </div>

    <!-- Dependency: jQuery (MUST be loaded before video_filter.js) -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawR8W9Z6tK+qQJb6pW4+MvS8Y/P5s9N0F9U=" crossorigin="anonymous"></script>

    <!-- Main Application Logic -->
    <script src="video_filter.js"></script>
</body>
</html>
