<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { width: 340px; padding: 10px; font-family: sans-serif; }
    button { width: 100%; padding: 8px; margin: 5px 0; cursor: pointer; }
    #status { margin-top: 10px; font-size: 12px; color: #666; }
    #assetStatus { margin-top: 10px; font-size: 12px; color: #444; }
    #assetList { margin-top: 8px; padding-left: 18px; font-size: 12px; line-height: 1.4; }
    .ok { color: #1f8f4d; }
    .bad { color: #b42318; }
    .muted { color: #666; }
  </style>
</head>
<body>
  <button id="activate">Activate Screen Selection</button>
  <button id="validateAssets">Validate Local OCR Assets</button>
  <div id="status">Ready</div>
  <div id="assetStatus" class="muted">OCR asset check has not run yet.</div>
  <ul id="assetList"></ul>
  <script src="popup.js"></script>
</body>
</html>
