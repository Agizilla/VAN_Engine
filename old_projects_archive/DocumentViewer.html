<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Document Viewer · Clawdia</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0a0c; --surface: #121214; --surface2: #1a1a1e; --border: #2a2a2e;
  --text: #e4e4e7; --text2: #a1a1aa; --text3: #6b7280;
  --accent: #60a5fa; --accent2: #a78bfa; --green: #4ade80; --yellow: #fbbf24; --red: #f87171;
  --font: 'SF Mono', 'JetBrains Mono', monospace;
  --font-ui: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --radius: 8px; --radius-sm: 4px;
}
body { font-family: var(--font-ui); background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }
.layout { display: grid; grid-template-columns: 300px 1fr; grid-template-rows: auto 1fr; height: 100vh; gap: 1px; background: var(--border); }
.toolbar { grid-column: 1 / -1; background: var(--surface2); display: flex; align-items: center; gap: 8px; padding: 10px 16px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
.toolbar h1 { font-size: 13px; font-weight: 600; color: var(--accent); font-family: var(--font); margin-right: 12px; }
.toolbar button { padding: 6px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text2); font-size: 11px; cursor: pointer; transition: all .12s; }
.toolbar button:hover { background: var(--surface); color: var(--text); border-color: var(--accent); }
.toolbar button.primary { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 500; }
.toolbar .spacer { flex: 1; }
.toolbar .badge { font-size: 10px; color: var(--text3); font-family: var(--font); }
.format-select { display: flex; gap: 4px; align-items: center; }
.format-select label { font-size: 11px; color: var(--text2); cursor: pointer; padding: 3px 8px; border-radius: 3px; border: 1px solid var(--border); }
.format-select input[type="radio"] { display: none; }
.format-select input[type="radio"]:checked + label { background: var(--accent); color: #000; border-color: var(--accent); }
.panel-left { background: var(--surface); overflow: hidden; display: flex; flex-direction: column; }
.panel-left .header { padding: 10px 12px; border-bottom: 1px solid var(--border); font-size: 11px; font-weight: 600; color: var(--accent); text-transform: uppercase; letter-spacing: .05em; display: flex; justify-content: space-between; }
.file-tree { flex: 1; overflow-y: auto; padding: 4px 0; }
.file-tree::-webkit-scrollbar { width: 4px; }
.file-tree::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.tree-item { padding: 5px 8px 5px 16px; cursor: pointer; font-size: 11px; color: var(--text2); font-family: var(--font); transition: all .1s; border-left: 2px solid transparent; display: flex; align-items: center; gap: 4px; }
.tree-item:hover { background: var(--surface2); }
.tree-item.active { background: rgba(96,165,250,.1); border-left-color: var(--accent); color: var(--accent); }
.tree-item .ext { font-size: 9px; color: var(--text3); background: var(--border); padding: 1px 4px; border-radius: 2px; margin-left: auto; }
.tree-item .icon { width: 16px; text-align: center; flex-shrink: 0; }
.panel-center { background: var(--surface); overflow: hidden; display: flex; flex-direction: column; }
.panel-center .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text3); gap: 8px; font-size: 13px; padding: 20px; text-align: center; }
.content-area { flex: 1; overflow-y: auto; padding: 20px 24px; }
.content-area::-webkit-scrollbar { width: 6px; }
.content-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
.content-area pre { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin: 10px 0; overflow-x: auto; font-size: 11px; line-height: 1.5; color: var(--text); white-space: pre-wrap; word-break: break-word; }
.content-area h2 { font-size: 14px; color: var(--accent); margin-bottom: 8px; }
.content-area .json-view { font-family: var(--font); font-size: 11px; line-height: 1.6; }
.content-area .json-key { color: var(--accent); }
.content-area .json-string { color: var(--green); }
.content-area .json-number { color: var(--yellow); }
.content-area .json-bool { color: var(--accent2); }
.content-area .json-null { color: var(--text3); }
#dropZone { position: fixed; inset: 0; background: rgba(0,0,0,.7); display: none; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px); }
#dropZone.active { display: flex; }
#dropZone .box { border: 2px dashed var(--accent); border-radius: 16px; padding: 48px; text-align: center; background: var(--surface); }
#dropZone .box .icon { font-size: 48px; margin-bottom: 12px; }
#dropZone .box p { color: var(--text2); font-size: 13px; }
#fileInput, #dirInput { display: none; }
</style>
</head>
<body>
<div id="dropZone"><div class="box"><div class="icon">📄</div><p>Drop files or folders here</p></div></div>
<div class="layout">
  <div class="toolbar">
    <h1>📄 Doc Viewer</h1>
    <button id="openBtn">📂 Open Files</button>
    <button id="dirBtn" class="primary">📁 Open Folder</button>
    <div class="format-select">
      <input type="radio" name="format" value="html" id="fmtHtml"><label for="fmtHtml">HTML</label>
      <input type="radio" name="format" value="pdf" id="fmtPdf"><label for="fmtPdf">PDF</label>
      <input type="radio" name="format" value="catalog" id="fmtCatalog" checked><label for="fmtCatalog">Catalog</label>
    </div>
    <button id="consolidateBtn" style="display:none">🔄 Consolidate to JSON</button>
    <div class="spacer"></div>
    <span class="badge" id="statusBadge">Drop files to begin</span>
  </div>
  <div class="panel-left">
    <div class="header"><span>Files</span><span id="fileCount"></span></div>
    <div class="file-tree" id="fileTree"></div>
  </div>
  <div class="panel-center">
    <div class="content-area" id="contentArea">
      <div class="empty-state"><div style="font-size:40px;opacity:.3">📄</div><p>Drop files or open a folder</p><p style="font-size:11px">Files are parsed and displayed as HTML, loaded as PDF, or consolidated into a catalog JSON</p></div>
    </div>
  </div>
</div>
<script>
let allFiles = [];
let allText = '';
let consolidatedJson = null;

// ── Drop zone ──
document.addEventListener('dragover', e => { e.preventDefault(); document.getElementById('dropZone').classList.add('active'); });
document.addEventListener('dragleave', e => { e.preventDefault(); document.getElementById('dropZone').classList.remove('active'); });
document.addEventListener('drop', async e => {
  e.preventDefault(); document.getElementById('dropZone').classList.remove('active');
  const items = Array.from(e.dataTransfer.items);
  const files = [];
  for (const item of items) {
    if (item.webkitGetAsEntry) {
      const entry = item.webkitGetAsEntry();
      if (entry) await traverseEntry(entry, '', files);
    } else if (item.getAsFile) {
      const f = item.getAsFile(); if (f) files.push({ file: f, relPath: f.name });
    }
  }
  loadFiles(files);
});

async function traverseEntry(entry, path, files) {
  if (entry.isFile) {
    const f = await new Promise(res => entry.file(res));
    files.push({ file: f, relPath: path + f.name });
  } else if (entry.isDirectory) {
    const reader = entry.createReader();
    const entries = await new Promise(res => reader.readEntries(res));
    for (const e of entries) await traverseEntry(e, path + entry.name + '/', files);
  }
}

// ── File pickers ──
document.getElementById('openBtn').onclick = () => {
  const input = document.getElementById('fileInput');
  input.accept = '.txt,.md,.html,.json,.py,.ts,.js,.css,.yaml,.yml,.xml,.csv,.log,.ini,.cfg,.toml';
  input.click();
};
document.getElementById('fileInput').onchange = async e => {
  const files = Array.from(e.target.files).map(f => ({ file: f, relPath: f.name }));
  loadFiles(files); e.target.value = '';
};
document.getElementById('dirBtn').onclick = () => document.getElementById('dirInput').click();
document.getElementById('dirInput').onchange = async e => {
  const files = Array.from(e.target.files).map(f => ({ file: f, relPath: f.webkitRelativePath }));
  loadFiles(files); e.target.value = '';
};

// ── Format toggle ──
document.querySelectorAll('input[name="format"]').forEach(r => r.addEventListener('change', () => {
  if (allFiles.length) renderCurrentFormat();
  document.getElementById('consolidateBtn').style.display = document.querySelector('input[name="format"]:checked').value === 'html' ? 'inline-block' : 'none';
}));
document.getElementById('consolidateBtn').onclick = consolidateToJSON;

// ── Load files ──
async function loadFiles(files) {
  allFiles = files.filter(f => {
    const ext = f.file.name.split('.').pop().toLowerCase();
    return ['txt','md','html','json','py','ts','js','css','yaml','yml','xml','csv','log','ini','cfg','toml','htm'].includes(ext);
  });
  document.getElementById('fileCount').textContent = `(${allFiles.length})`;
  renderTree();
  const fmt = document.querySelector('input[name="format"]:checked').value;
  if (fmt === 'html') {
    for (const f of allFiles) f.text = await readFile(f.file);
    allText = allFiles.map(f => f.text).join('\n\n');
    renderCurrentFormat();
    document.getElementById('consolidateBtn').style.display = 'inline-block';
  } else if (fmt === 'catalog') {
    for (const f of allFiles) f.text = await readFile(f.file);
    buildCatalog();
    document.getElementById('consolidateBtn').style.display = 'none';
  } else {
    document.getElementById('contentArea').innerHTML = '<div class="empty-state">PDF mode: select a PDF file to view</div>';
    document.getElementById('consolidateBtn').style.display = 'none';
  }
  document.getElementById('statusBadge').textContent = `${allFiles.length} files loaded`;
}

function readFile(file) { return new Promise((res, rej) => { const r = new FileReader(); r.onload = () => res(r.result); r.onerror = rej; r.readAsText(file); }); }

// ── Render tree ──
function renderTree() {
  const tree = document.getElementById('fileTree');
  tree.innerHTML = allFiles.map((f, i) => {
    const ext = f.file.name.split('.').pop().toLowerCase();
    const icons = { html:'🌐', md:'📝', py:'🐍', ts:'🟦', js:'🟨', json:'📋',css:'🎨',xml:'📄',yml:'⚙️',yaml:'⚙️',txt:'📄',csv:'📊',log:'📋' };
    return `<div class="tree-item" onclick="selectFile(${i})" data-idx="${i}"><span class="icon">${icons[ext]||'📄'}</span> ${f.relPath}<span class="ext">.${ext}</span></div>`;
  }).join('');
}

// ── Select file ──
function selectFile(idx) {
  document.querySelectorAll('.tree-item').forEach(el => el.classList.remove('active'));
  event.target.closest('.tree-item')?.classList.add('active');
  const f = allFiles[idx];
  const fmt = document.querySelector('input[name="format"]:checked').value;
  if (fmt === 'catalog') {
    showCatalogEntry(f);
  } else if (f.text !== undefined) {
    showContent(f);
  } else {
    readFile(f.file).then(t => { f.text = t; showContent(f); });
  }
}

function showContent(f) {
  const ext = f.file.name.split('.').pop().toLowerCase();
  const area = document.getElementById('contentArea');
  if (ext === 'html' || ext === 'htm') {
    area.innerHTML = `<iframe srcdoc="${esc(f.text)}" style="width:100%;height:calc(100vh - 120px);border:none;background:#fff;border-radius:8px;"></iframe>`;
  } else {
    area.innerHTML = `<h2>${esc(f.relPath)}</h2><pre>${esc(f.text)}</pre>`;
  }
}

// ── Render current format ──
function renderCurrentFormat() {
  const area = document.getElementById('contentArea');
  const fmt = document.querySelector('input[name="format"]:checked').value;
  if (fmt === 'html') {
    const merged = allFiles.map(f => {
      const ext = f.file.name.split('.').pop().toLowerCase();
      if (ext === 'html') return f.text;
      return `<pre>${esc(f.text)}</pre>`;
    }).join('\n<hr style="margin:20px 0;border-color:var(--border)">\n');
    area.innerHTML = merged;
  } else if (fmt === 'catalog') {
    buildCatalog();
  } else {
    area.innerHTML = '<div class="empty-state">Select a file to preview</div>';
  }
}

// ── Build catalog JSON ──
function buildCatalog() {
  const catalog = {
    catalogVersion: "1.0.0",
    generatedAt: new Date().toISOString(),
    totalFiles: allFiles.length,
    totalSizeKB: Math.round(allFiles.reduce((a, f) => a + f.file.size, 0) / 1024),
    fileTypes: {},
    files: allFiles.map(f => {
      const ext = f.file.name.split('.').pop().toLowerCase();
      if (!catalog.fileTypes[ext]) catalog.fileTypes[ext] = 0;
      catalog.fileTypes[ext]++;
      return {
        name: f.relPath,
        ext,
        sizeKB: Math.round(f.file.size / 1024 * 10) / 10,
        chars: f.text ? f.text.length : 0,
        lines: f.text ? f.text.split('\n').length : 0,
        preview: f.text ? f.text.slice(0, 200) : ''
      };
    }),
    consolidated: allText ? {
      totalChars: allText.length,
      totalLines: allText.split('\n').length,
      structure: attemptStructure(allText)
    } : null
  };
  consolidatedJson = catalog;
  const area = document.getElementById('contentArea');
  area.innerHTML = `<h2>Catalog JSON</h2><pre class="json-view">${syntaxHighlight(JSON.stringify(catalog, null, 2))}</pre>`;
}

// ── Consolidate to JSON ──
function consolidateToJSON() {
  buildCatalog();
  const blob = new Blob([JSON.stringify(consolidatedJson, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `consolidated_${Date.now()}.json`;
  a.click();
  document.getElementById('statusBadge').textContent = 'JSON exported';
}

// ── Attempt structure analysis ──
function attemptStructure(text) {
  const lines = text.split('\n').filter(l => l.trim());
  const sections = [];
  let current = { heading: 'root', lines: 0, chars: 0 };
  for (const line of lines) {
    const h = line.match(/^#{1,3}\s+(.+)/);
    if (h) {
      if (current.lines > 0) sections.push(current);
      current = { heading: h[1].trim(), lines: 0, chars: 0 };
    }
    current.lines++;
    current.chars += line.length;
  }
  if (current.lines > 0) sections.push(current);
  return {
    totalLines: lines.length,
    detectedSections: sections.length,
    sections,
    uniqueWords: [...new Set(text.toLowerCase().match(/\b\w{4,}\b/g) || [])].length,
    avgLineLength: Math.round(text.length / lines.length)
  };
}

// ── Catalog entry view ──
function showCatalogEntry(f) {
  const area = document.getElementById('contentArea');
  const ext = f.file.name.split('.').pop().toLowerCase();
  if (ext === 'html') {
    area.innerHTML = `<iframe srcdoc="${esc(f.text)}" style="width:100%;height:calc(100vh - 120px);border:none;background:#fff;border-radius:8px;"></iframe>`;
  } else {
    area.innerHTML = `<h2>${esc(f.relPath)}</h2><p style="font-size:12px;color:var(--text3);margin-bottom:8px">${f.text.length} chars, ${f.text.split('\n').length} lines</p><pre>${esc(f.text)}</pre>`;
  }
}

// ── Syntax highlighter ──
function syntaxHighlight(json) {
  return json.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"([^"]+)":/g,'<span class="json-key">"$1"</span>:')
    .replace(/"([^"]+)"(?=\s*[,}\]])/g,'<span class="json-string">"$1"</span>')
    .replace(/\b(\d+\.?\d*)\b/g,'<span class="json-number">$1</span>')
    .replace(/\b(true|false)\b/g,'<span class="json-bool">$1</span>')
    .replace(/\bnull\b/g,'<span class="json-null">null</span>');
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
</script>
</body>
</html>
