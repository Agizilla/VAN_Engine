<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Face Warper & Analyzer</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    
    <style>
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; display: flex; height: 100vh; }
        .sidebar { width: 350px; background: #fff; border-right: 1px solid #ddd; display: flex; flex-direction: column; }
        .main-content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        
        #canvas-container { position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.2); background: #000; line-height: 0; }
        canvas { max-width: 100%; max-height: 80vh; }

        .controls-header { padding: 15px; border-bottom: 1px solid #eee; background: #fafafa; }
        .scroll-area { flex: 1; overflow-y: auto; padding: 15px; }
        
        textarea { width: 100%; height: 120px; font-family: monospace; font-size: 11px; resize: vertical; }
        .slider-item { margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid #f9f9f9; }
        .slider-item label { display: block; font-size: 12px; color: #555; margin-bottom: 5px; }
        input[type="range"] { width: 100%; }
        
        .btn { background: #007bff; color: white; border: none; padding: 10px; cursor: pointer; border-radius: 4px; width: 100%; margin-top: 10px; }
        .btn:hover { background: #0056b3; }
        #status { font-size: 12px; color: #888; margin-top: 5px; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="controls-header">
        <h3>Face Controls</h3>
        <input type="file" id="imageUpload" accept="image/*">
        <div id="status">Ready. Please upload an image.</div>
    </div>
    
    <div class="scroll-area">
        <label><b>Manual JSON Data:</b></label>
        <textarea id="dataBox" placeholder="Facial coordinates will appear here..."></textarea>
        <button id="updateBtn" class="btn">Apply JSON Changes</button>
        <hr>
        <label><b>Fine-Tune Landmarks (Y-Offset):</b></label>
        <div id="slider-container">
            </div>
    </div>
</div>

<div class="main-content">
    <div id="canvas-container">
        <canvas id="mainCanvas"></canvas>
    </div>
</div>

<script>
$(document).ready(function() {
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    
    let originalPoints = []; // Anchor points
    let currentPoints = [];  // Modified points
    let imgElement = null;
    let triangles = [];      // Mesh indices

    // Initialize Face-API
    async function init() {
        $('#status').text('Loading AI Models...');
        const MODEL_URL = 'https://justadudewhohacks.github.io/face-api.js/models';
        await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
        await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
        $('#status').text('Models Loaded. Upload a face.');
        generateSliders();
    }

    function generateSliders() {
        const container = $('#slider-container');
        for (let i = 0; i < 68; i++) {
            container.append(`
                <div class="slider-item">
                    <label>Point ${i} (Vertical Shift)</label>
                    <input type="range" class="pt-slider" data-index="${i}" min="-100" max="100" value="0">
                </div>
            `);
        }
    }

    $('#imageUpload').on('change', async function(e) {
        const file = e.target.files[0];
        if (!file) return;
        
        $('#status').text('Analyzing face...');
        imgElement = await faceapi.bufferToImage(file);
        
        canvas.width = imgElement.width;
        canvas.height = imgElement.height;

        const useTinyModel = true;
        const detection = await faceapi.detectSingleFace(imgElement, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks();

        if (detection) {
            originalPoints = detection.landmarks.positions.map(p => ({ x: p.x, y: p.y }));
            currentPoints = JSON.parse(JSON.stringify(originalPoints));
            
            // Define basic triangles for warping (Simplification: just using 68 points)
            // In a full app, you'd use a Delaunay algorithm library here.
            
            updateUI();
            $('#status').text('Face detected and mapped.');
        } else {
            $('#status').text('No face found. Try another image.');
        }
    });

    function updateUI() {
        $('#dataBox').val(JSON.stringify(currentPoints, null, 2));
        render();
    }

    function render() {
        if (!imgElement) return;
        
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Step 1: Draw the base image
        ctx.drawImage(imgElement, 0, 0);

        // Step 2: Draw Landmarks (Visual Feedback)
        ctx.fillStyle = "rgba(0, 255, 255, 0.7)";
        currentPoints.forEach((pt, i) => {
            ctx.beginPath();
            ctx.arc(pt.x, pt.y, 2, 0, 2 * Math.PI);
            ctx.fill();
        });
    }

    // Slider Logic
    $(document).on('input', '.pt-slider', function() {
        const idx = $(this).data('index');
        const val = parseInt($(this).val());
        
        // Offset from original position
        currentPoints[idx].y = originalPoints[idx].y + val;
        
        updateUI();
    });

    // Manual Update from JSON
    $('#updateBtn').on('click', function() {
        try {
            currentPoints = JSON.parse($('#dataBox').val());
            render();
            $('#status').text('Updated from JSON.');
        } catch (err) {
            alert('Invalid JSON format');
        }
    });

    init();
});
</script>

</body>
</html>
