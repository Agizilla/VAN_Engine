<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Lip-Sync Lab</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #121212; color: #eee; }
        #canvas-box { background: #000; border-radius: 15px; position: relative; overflow: hidden; height: 500px; }
        canvas { width: 100%; height: 100%; object-fit: contain; }
        .scroll-panel { background: #1a1a1a; padding: 20px; border-radius: 0 0 15px 15px; }
        .word-tag { cursor: pointer; margin: 2px; }
        #progress-wrapper { display: none; margin-top: 10px; }
    </style>
</head>
<body class="p-4">

<div class="container">
    <div class="row g-4">
        <div class="col-md-3">
            <div class="card bg-dark text-white border-secondary p-3">
                <h5>Controls</h5>
                <hr class="border-secondary">
                
                <label class="small">1. Select Training Video</label>
                <input type="file" id="vidInput" class="form-control form-control-sm bg-dark text-white mb-3">
                <button id="trainBtn" class="btn btn-primary w-100 mb-2">Start Training</button>
                
                <div id="progress-wrapper">
                    <div class="progress" style="height: 5px;">
                        <div id="progressBar" class="progress-bar progress-bar-striped progress-bar-animated" style="width: 0%"></div>
                    </div>
                    <small id="statusText" class="text-info" style="font-size: 0.7rem;">Processing...</small>
                </div>

                <hr class="border-secondary">
                <label class="small">2. Replace Reference Face</label>
                <input type="file" id="faceInput" class="form-control form-control-sm bg-dark text-white mb-3">
                <button id="replaceBtn" class="btn btn-outline-info w-100">Update Face</button>

                <hr class="border-secondary">
                <label class="small">Dictionary</label>
                <div id="wordBox" class="d-flex flex-wrap mt-2"></div>
            </div>
        </div>

        <div class="col-md-9">
            <div id="canvas-box">
                <canvas id="lipCanvas"></canvas>
            </div>
            
            <div class="scroll-panel border border-secondary border-top-0">
                <label class="form-label small text-muted">Frame Navigator (Scrub through Training Data)</label>
                <input type="range" id="frameScroll" class="form-range" min="0" max="100" value="0" disabled>
                
                <div class="input-group mt-3">
                    <input type="text" id="talkInput" class="form-control bg-dark text-white" placeholder="Enter custom text...">
                    <button id="talkBtn" class="btn btn-success">Talk</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
    const canvas = document.getElementById('lipCanvas');
    const ctx = canvas.getContext('2d');
    let baseImg = new Image();
    let frameDeltas = [];

    // --- Training Logic ---
    $('#trainBtn').click(function() {
        let file = $('#vidInput')[0].files[0];
        if(!file) return;
        
        let fd = new FormData();
        fd.append('video', file);
        
        $('#progress-wrapper').show();
        $('#progressBar').css('width', '50%'); // Mock progress for initial upload
        
        $.ajax({
            url: '/train', type: 'POST', data: fd, processData: false, contentType: false,
            success: function(res) {
                $('#progressBar').css('width', '100%');
                $('#statusText').text("Training Complete!");
                
                baseImg.src = "data:image/jpeg;base64," + res.base_frame;
                baseImg.onload = () => drawFrame(null);
                
                $('#frameScroll').prop('disabled', false).attr('max', res.total_frames - 1);
                
                $('#wordBox').empty();
                res.words.forEach(w => {
                    $('#wordBox').append(`<span class="badge bg-secondary word-tag">${w}</span>`);
                });
            }
        });
    });

    // --- Frame Drawing with Landmark Delta ---
    function drawFrame(delta) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if(!baseImg.src) return;
        
        canvas.width = baseImg.width;
        canvas.height = baseImg.height;
        ctx.drawImage(baseImg, 0, 0);

        if(delta) {
            ctx.fillStyle = "rgba(0, 255, 200, 0.5)";
            // Simplified visualization: In a full Affine Warp, you'd use these
            // points as the destination vertices for a mesh transform.
            delta.forEach(p => {
                // Here we simulate the landmark update
                // 400/450 are generic center coordinates for demonstration
                ctx.beginPath();
                ctx.arc(400 + p[0], 450 + p[1], 3, 0, Math.PI * 2);
                ctx.fill();
            });
        }
    }

    // --- Navigation ---
    $('#frameScroll').on('input', function() {
        let idx = $(this).val();
        $.get('/get_frame_delta/' + idx, function(res) {
            drawFrame(res.delta);
        });
    });

    $('#replaceBtn').click(function() {
        let file = $('#faceInput')[0].files[0];
        let fd = new FormData();
        fd.append('image', file);
        $.ajax({
            url: '/replace_face', type: 'POST', data: fd, processData: false, contentType: false,
            success: function(res) {
                baseImg.src = "data:image/jpeg;base64," + res.new_frame;
            }
        });
    });

</script>
</body>
</html>
