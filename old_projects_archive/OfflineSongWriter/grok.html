<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE OMNI-GEN: THE VESSEL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');
        
        :root {
            --bg: #0a0a0a;
            --panel: #121212;
            --accent: #00ff9d;
            --accent2: #ff00aa;
            --text: #e0e0e0;
        }
        
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
            height: 100vh;
            display: grid;
            grid-template-columns: 280px 1fr;
        }
        
        .sidebar {
            background: var(--panel);
            border-right: 1px solid #222;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
        }
        
        .logo {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: -2px;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .nav {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .nav-btn {
            padding: 12px 16px;
            background: #1a1a1a;
            border: none;
            color: var(--text);
            text-align: left;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .nav-btn.active, .nav-btn:hover {
            background: var(--accent);
            color: black;
        }
        
        .lexicon-stats {
            background: #1a1a1a;
            padding: 16px;
            border-radius: 12px;
            font-size: 14px;
        }
        
        .main {
            display: flex;
            flex-direction: column;
        }
        
        .header {
            height: 60px;
            background: var(--panel);
            border-bottom: 1px solid #222;
            display: flex;
            align-items: center;
            padding: 0 24px;
            justify-content: space-between;
            z-index: 10;
        }
        
        .tab-bar {
            display: flex;
            background: #1a1a1a;
            border-bottom: 1px solid #222;
        }
        
        .tab {
            padding: 14px 28px;
            cursor: pointer;
            border-bottom: 3px solid transparent;
        }
        
        .tab.active {
            border-bottom: 3px solid var(--accent);
            color: var(--accent);
        }
        
        .content {
            flex: 1;
            overflow: hidden;
            position: relative;
        }
        
        #explorer {
            position: absolute;
            inset: 0;
            display: none;
            flex-direction: column;
        }
        
        #explorer.active { display: flex; }
        
        .canvas-container {
            flex: 1;
            position: relative;
            background: #050505;
        }
        
        #lexicon-canvas {
            width: 100%;
            height: 100%;
        }
        
        .ghostwriter {
            display: none;
            flex-direction: column;
            padding: 24px;
            gap: 20px;
            height: 100%;
        }
        
        .ghostwriter.active { display: flex; }
        
        .source-select {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        
        select, button {
            padding: 10px 16px;
            background: #1f1f1f;
            border: 1px solid #333;
            color: white;
            border-radius: 8px;
        }
        
        button {
            background: var(--accent);
            color: black;
            font-weight: 600;
            cursor: pointer;
        }
        
        .output {
            flex: 1;
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 24px;
            font-family: 'IBM Plex Mono', monospace;
            white-space: pre-wrap;
            overflow-y: auto;
            line-height: 1.6;
        }
        
        .chat {
            display: none;
            flex-direction: column;
            height: 100%;
        }
        
        .chat.active { display: flex; }
        
        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .message {
            max-width: 80%;
            padding: 14px 18px;
            border-radius: 18px;
        }
        
        .user-msg {
            align-self: flex-end;
            background: var(--accent2);
            color: white;
        }
        
        .ai-msg {
            align-self: flex-start;
            background: #1f1f1f;
        }
        
        .chat-input {
            padding: 16px;
            display: flex;
            gap: 12px;
            background: var(--panel);
        }
        
        input {
            flex: 1;
            padding: 14px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 9999px;
            color: white;
        }
        
        .word-card {
            background: #1a1a1a;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 14px;
            cursor: pointer;
        }
        
        .bin {
            position: absolute;
            width: 90px;
            height: 90px;
            border: 2px dashed #333;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            text-align: center;
            pointer-events: none;
        }
        
        .elastic-line {
            position: absolute;
            height: 2px;
            background: linear-gradient(90deg, var(--accent), transparent);
            pointer-events: none;
            opacity: 0.3;
        }
    </style>
</head>
<body>
    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="logo">OMNI-GEN</div>
        <div class="nav">
            <button class="nav-btn active" onclick="switchTab(0)">LEXICON EXPLORER</button>
            <button class="nav-btn" onclick="switchTab(1)">GHOSTWRITER</button>
            <button class="nav-btn" onclick="switchTab(2)">PERSONA CHAT</button>
        </div>
        
        <div class="lexicon-stats">
            <strong>MASTER BRAIN</strong><br>
            <span id="token-count">248</span> tokens • 12 songs<br>
            <button onclick="downloadBrain()" style="margin-top:12px;width:100%">↓ DOWNLOAD BRAIN</button>
            <button onclick="document.getElementById('import-input').click()" style="margin-top:8px;width:100%">↑ IMPORT TEXT</button>
            <input type="file" id="import-input" style="display:none" onchange="importText(event)">
        </div>
        
        <div>
            <h4 style="margin-bottom:8px">QUICK ADD</h4>
            <input id="quick-word" placeholder="New token..." style="width:100%;margin-bottom:8px">
            <button onclick="addQuickWord()" style="width:100%">ADD TO LEXICON</button>
        </div>
    </div>
    
    <!-- MAIN -->
    <div class="main">
        <div class="header">
            <div class="tab-bar">
                <div class="tab active" onclick="switchTab(0)">Phonetic Explorer</div>
                <div class="tab" onclick="switchTab(1)">Ghostwriter</div>
                <div class="tab" onclick="switchTab(2)">Persona Studio</div>
            </div>
            <button onclick="randomizeSort()">RANDOMIZE TOPOLOGY</button>
        </div>
        
        <!-- EXPLORER -->
        <div id="explorer" class="content active">
            <div class="canvas-container">
                <canvas id="lexicon-canvas" width="1200" height="800"></canvas>
            </div>
            <div style="position:absolute;bottom:20px;left:20px;background:rgba(0,0,0,0.8);padding:12px 20px;border-radius:8px;font-size:13px">
                Click bins • Drag words • Draw elastic strings for assonance
            </div>
        </div>
        
        <!-- GHOSTWRITER -->
        <div id="ghostwriter" class="content ghostwriter">
            <div class="source-select">
                <label>Source Template:</label>
                <select id="source-song" onchange="loadTemplate()">
                    <option value="0">Kendrick - DNA.</option>
                    <option value="1">Tyler, The Creator - Yonkers</option>
                    <option value="2">Original Beat</option>
                </select>
                <button onclick="generateGhostVerse()">GENERATE SUBSTITUTION</button>
            </div>
            
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;flex:1">
                <div>
                    <h3>ORIGINAL TEMPLATE</h3>
                    <div id="original-text" class="output"></div>
                </div>
                <div>
                    <h3>GHOST VERSE</h3>
                    <div id="ghost-text" class="output"></div>
                </div>
            </div>
        </div>
        
        <!-- CHAT -->
        <div id="chat" class="content chat">
            <div class="chat-messages" id="chat-messages">
                <!-- messages populated by JS -->
            </div>
            <div class="chat-input">
                <input id="chat-input" placeholder="Speak in the lexicon..." onkeypress="if(event.key==='Enter') sendChat()">
                <button onclick="sendChat()">SEND</button>
            </div>
        </div>
    </div>
    
    <script>
        // ==================== MASTER LEXICON ====================
        let masterLexicon = [
            {
                word: "chaos", pos: "Noun", tags: ["Chaos"], ipa: "/ˈkeɪ.ɒs/", 
                vowel_core: "A-O", stress_pattern: "10", syllables: 2,
                energy_score: 0.92, plosive_count: 1, fricative_count: 1,
                links: {"reign": 3, "storm": 5}
            },
            {
                word: "reign", pos: "Verb", tags: ["Power"], ipa: "/reɪn/", 
                vowel_core: "A", stress_pattern: "1", syllables: 1,
                energy_score: 0.75, plosive_count: 1, fricative_count: 0,
                links: {"supreme": 4}
            },
            {
                word: "supreme", pos: "Adj", tags: ["Order"], ipa: "/suːˈpriːm/", 
                vowel_core: "U-E", stress_pattern: "01", syllables: 2,
                energy_score: 0.65, plosive_count: 1, fricative_count: 1,
                links: {}
            },
            {
                word: "fire", pos: "Noun", tags: ["Chaos"], ipa: "/ˈfaɪər/", 
                vowel_core: "I", stress_pattern: "1", syllables: 1,
                energy_score: 0.88, plosive_count: 1, fricative_count: 1,
                links: {"burn": 6}
            },
            {
                word: "shadow", pos: "Noun", tags: ["Order"], ipa: "/ˈʃæd.oʊ/", 
                vowel_core: "A-O", stress_pattern: "10", syllables: 2,
                energy_score: 0.45, plosive_count: 0, fricative_count: 1,
                links: {}
            },
            // Add more for demo
            {word: "kingdom", pos: "Noun", tags: ["Power"], ipa: "/ˈkɪŋ.dəm/", vowel_core: "I", stress_pattern: "10", syllables: 2, energy_score: 0.7, plosive_count: 1, fricative_count: 0, links:{}},
            {word: "echo", pos: "Noun", tags: ["Chaos"], ipa: "/ˈek.oʊ/", vowel_core: "E-O", stress_pattern: "10", syllables: 2, energy_score: 0.6, plosive_count: 0, fricative_count: 0, links:{}},
        ];
        
        let corpus = [
            {
                title: "DNA.",
                tokens: ["I", "got", "loyalty", "got", "royalty", "inside", "my", "DNA"],
                syllables: [1,1,4,1,4,2,1,3]
            }
        ];
        
        // Phonetic Utility Class
        class PhoneticUtility {
            static countSyllables(word) {
                word = word.toLowerCase();
                const vowels = 'aeiouy';
                let count = 0;
                let prevCharWasVowel = false;
                
                for (let i = 0; i < word.length; i++) {
                    const char = word[i];
                    if (vowels.includes(char)) {
                        if (!prevCharWasVowel) {
                            count++;
                            prevCharWasVowel = true;
                        }
                    } else {
                        prevCharWasVowel = false;
                    }
                }
                // Adjustments
                if (word.endsWith('e')) count = Math.max(1, count - 1);
                return Math.max(1, count);
            }
            
            static getStressPattern(word) {
                // Mock: alternate starting with stress for demo
                const syl = this.countSyllables(word);
                let pattern = '';
                for (let i = 0; i < syl; i++) {
                    pattern += (i % 2 === 0) ? '1' : '0';
                }
                return pattern;
            }
            
            static getVowelCore(word) {
                const vowels = word.toLowerCase().match(/[aeiouy]+/g) || [];
                return vowels.map(v => v[0].toUpperCase()).join('-');
            }
        }
        
        // Canvas setup
        let canvas, ctx;
        let nodes = [];
        let lines = [];
        
        function initCanvas() {
            canvas = document.getElementById('lexicon-canvas');
            ctx = canvas.getContext('2d');
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            
            // Create peripheral bins
            nodes = [];
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = 320;
            
            for (let i = 0; i < 48; i++) {
                const angle = (i / 48) * Math.PI * 2;
                nodes.push({
                    x: centerX + Math.cos(angle) * radius,
                    y: centerY + Math.sin(angle) * radius,
                    word: masterLexicon[i % masterLexicon.length].word,
                    data: masterLexicon[i % masterLexicon.length]
                });
            }
            draw();
        }
        
        function resizeCanvas() {
            canvas.width = document.querySelector('.canvas-container').clientWidth;
            canvas.height = document.querySelector('.canvas-container').clientHeight;
        }
        
        function draw() {
            ctx.fillStyle = '#050505';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw bins
            nodes.forEach((node, i) => {
                ctx.strokeStyle = i % 2 === 0 ? '#00ff9d' : '#ff00aa';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(node.x, node.y, 45, 0, Math.PI * 2);
                ctx.stroke();
                
                ctx.fillStyle = '#eee';
                ctx.font = '12px IBM Plex Mono';
                ctx.textAlign = 'center';
                ctx.fillText(node.word.toUpperCase(), node.x, node.y + 5);
            });
            
            // Draw sample elastic lines
            ctx.strokeStyle = 'rgba(0, 255, 157, 0.4)';
            ctx.lineWidth = 1.5;
            for (let i = 0; i < nodes.length; i += 5) {
                for (let j = i + 3; j < i + 8; j++) {
                    if (j >= nodes.length) break;
                    ctx.beginPath();
                    ctx.moveTo(nodes[i].x, nodes[i].y);
                    ctx.lineTo(nodes[j % nodes.length].x, nodes[j % nodes.length].y);
                    ctx.stroke();
                }
            }
        }
        
        // Ghostwriter
        function loadTemplate() {
            const idx = parseInt(document.getElementById('source-song').value);
            const origDiv = document.getElementById('original-text');
            origDiv.textContent = corpus[0].tokens.join(' ');
        }
        
        function generateGhostVerse() {
            const ghostDiv = document.getElementById('ghost-text');
            let output = [];
            
            corpus[0].tokens.forEach(token => {
                if (['the','and','of','my','got','inside'].includes(token.toLowerCase())) {
                    output.push(token);
                } else {
                    // Find similar syllable match
                    const candidates = masterLexicon.filter(w => 
                        PhoneticUtility.countSyllables(w.word) === PhoneticUtility.countSyllables(token)
                    );
                    const pick = candidates.length ? candidates[Math.floor(Math.random()*candidates.length)].word : token;
                    output.push(pick);
                }
            });
            
            ghostDiv.textContent = output.join(' ');
        }
        
        // Chat
        function sendChat() {
            const input = document.getElementById('chat-input');
            if (!input.value.trim()) return;
            
            const messages = document.getElementById('chat-messages');
            
            // User message
            const userMsg = document.createElement('div');
            userMsg.className = 'message user-msg';
            userMsg.textContent = input.value;
            messages.appendChild(userMsg);
            
            // AI response (lexicon constrained)
            setTimeout(() => {
                const aiMsg = document.createElement('div');
                aiMsg.className = 'message ai-msg';
                const responses = ["Chaos reigns supreme in this fire echo.", "Kingdom of shadow calls your name.", "Loyalty burns like DNA fire."];
                aiMsg.textContent = responses[Math.floor(Math.random()*responses.length)];
                messages.appendChild(aiMsg);
                messages.scrollTop = messages.scrollHeight;
            }, 600);
            
            input.value = '';
            messages.scrollTop = messages.scrollHeight;
        }
        
        function addQuickWord() {
            const input = document.getElementById('quick-word');
            if (!input.value) return;
            
            const newWord = {
                word: input.value.toLowerCase(),
                pos: "Unknown",
                tags: ["Imported"],
                ipa: "N/A",
                vowel_core: PhoneticUtility.getVowelCore(input.value),
                stress_pattern: PhoneticUtility.getStressPattern(input.value),
                syllables: PhoneticUtility.countSyllables(input.value),
                energy_score: Math.random().toFixed(2),
                plosive_count: Math.floor(Math.random()*3),
                fricative_count: Math.floor(Math.random()*3),
                links: {}
            };
            
            masterLexicon.push(newWord);
            document.getElementById('token-count').textContent = masterLexicon.length;
            input.value = '';
            draw(); // refresh canvas
            alert('Token added to Brain');
        }
        
        function downloadBrain() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify({
                lexicon: masterLexicon,
                corpus: corpus
            }, null, 2));
            const downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", "omni_brain.json");
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();
        }
        
        async function importText(e) {
            const file = e.target.files[0];
            if (!file) return;
            const text = await file.text();
            // Simple parse - split words
            const words = text.split(/\s+/).filter(w => w.length > 2);
            words.forEach(w => {
                if (!masterLexicon.find(ex => ex.word === w.toLowerCase())) {
                    masterLexicon.push({
                        word: w.toLowerCase(),
                        pos: "Imported",
                        tags: ["New"],
                        vowel_core: PhoneticUtility.getVowelCore(w),
                        stress_pattern: PhoneticUtility.getStressPattern(w),
                        syllables: PhoneticUtility.countSyllables(w),
                        energy_score: (Math.random()*0.6 + 0.4).toFixed(2),
                        plosive_count: 1,
                        fricative_count: 1,
                        links: {}
                    });
                }
            });
            document.getElementById('token-count').textContent = masterLexicon.length;
            draw();
        }
        
        function switchTab(n) {
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            
            if (n === 0) {
                document.getElementById('explorer').classList.add('active');
            } else if (n === 1) {
                document.getElementById('ghostwriter').classList.add('active');
                loadTemplate();
            } else if (n === 2) {
                document.getElementById('chat').classList.add('active');
            }
        }
        
        function randomizeSort() {
            nodes.sort(() => Math.random() - 0.5);
            draw();
        }
        
        // Init
        window.onload = () => {
            document.getElementById('token-count').textContent = masterLexicon.length;
            initCanvas();
            loadTemplate();
            
            // Demo chat message
            setTimeout(() => {
                const msg = document.createElement('div');
                msg.className = 'message ai-msg';
                msg.textContent = "The Vessel is awake. Speak your cadence.";
                document.getElementById('chat-messages').appendChild(msg);
            }, 800);
        };
    </script>
</body>
</html>
