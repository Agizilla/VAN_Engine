# ============================================================
# LARA config.yaml — Connectome additions (v0.1.1 / Build 002)
# Merge this block into your existing config.yaml
# ============================================================

connectome:
  enabled: true                      # Master toggle for all connectome features
  activation: "sigmoid"              # sigmoid | linear | relu
  auto_save: true                    # Persist after every plasticity trigger
  log_adaptations: true              # Log every weight change to masterlog.txt
  synthesis_cache_ttl_sec: 0         # 0 = always re-synthesise (set >0 for perf)

  # Daily decay fires automatically during housekeeping
  daily_decay:
    enabled: true
    trigger_event: "daily_decay"

  # Mobject node defaults (can be overridden per persona at creation time)
  default_node_params:
    pitch_hz: 180.0                  # Neutral female voice
    tempo: 4.5                       # Syllables per second
    amplitude: 0.70
    valence: 0.40                    # Slightly positive
    arousal: 0.50                    # Moderate energy
    dominance: 0.50
    formality: 0.55
    vocab_richness: 0.65
    syntax_complexity: 0.50
    brightness: 0.60
    warmth: 0.50

  # Global weight seeds for all new connectomes
  default_global_weights:
    voice_family: 1.0
    emotion_family: 0.85
    rhythm_family: 0.80
    speech_family: 0.90
    prosody_family: 0.75
