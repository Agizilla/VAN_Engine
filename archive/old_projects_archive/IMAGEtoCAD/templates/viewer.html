<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DXF Viewer — IMAGEtoCAD</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: #1a1a2e;
            padding: 0.75rem 1.5rem;
            border-bottom: 1px solid #2a2a4a;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .header h1 { font-size: 1.1rem; color: #00ff88; }
        .header .badge { background: #2a2a4a; padding: 0.2rem 0.5rem; border-radius: 8px; font-size: 0.7rem; color: #888; }
        .main { display: flex; flex: 1; overflow: hidden; }
        .sidebar {
            width: 260px;
            background: #1a1a2e;
            border-right: 1px solid #2a2a4a;
            padding: 1rem;
            overflow-y: auto;
            flex-shrink: 0;
        }
        .sidebar h3 { font-size: 0.85rem; color: #888; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.05em; }
        .sidebar h3:not(:first-child) { margin-top: 1rem; }
        .layer-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.4rem 0.5rem;
            border-radius: 4px;
            font-size: 0.8rem;
            cursor: pointer;
        }
        .layer-item:hover { background: #2a2a4a; }
        .layer-item input { accent-color: #00ff88; }
        .layer-item .dot { width: 8px; height: 8px; border-radius: 50%; }
        .layer-item .count { margin-left: auto; color: #666; font-size: 0.7rem; }
        .canvas-area {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: #12121f;
        }
        #viewerSvg {
            width: 100%;
            height: 100%;
            cursor: default;
        }
        #viewerSvg.panning { cursor: grabbing; }
        .toolbar {
            position: absolute;
            top: 1rem;
            right: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .toolbar button {
            width: 36px;
            height: 36px;
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            border-radius: 6px;
            color: #e0e0e0;
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .toolbar button:hover { background: #2a2a4a; }
        .info-panel {
            position: absolute;
            bottom: 1rem;
            left: 1rem;
            background: rgba(26, 26, 46, 0.9);
            border: 1px solid #2a2a4a;
            border-radius: 8px;
            padding: 0.75rem 1rem;
            font-size: 0.8rem;
            max-width: 300px;
            display: none;
        }
        .info-panel.visible { display: block; }
        .info-panel .entity-type { color: #00ff88; font-weight: 600; }
        .info-panel .entity-detail { color: #888; margin-top: 0.25rem; }
        .drop-zone {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1rem;
        }
        .drop-zone.hidden { display: none; }
        .drop-zone svg { width: 64px; height: 64px; fill: #4a4a6a; }
        .drop-zone h2 { color: #888; font-weight: 400; }
        .drop-zone p { color: #555; font-size: 0.85rem; }
        .drop-zone input[type="file"] { display: none; }
        .drop-zone button {
            padding: 0.6rem 1.5rem;
            background: #00ff88;
            color: #1a1a2e;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
        }
        .zoom-level {
            position: absolute;
            bottom: 1rem;
            right: 1rem;
            background: rgba(26, 26, 46, 0.9);
            border: 1px solid #2a2a4a;
            border-radius: 6px;
            padding: 0.4rem 0.75rem;
            font-size: 0.75rem;
            font-family: monospace;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>DXF Viewer</h1>
        <span class="badge">IMAGEtoCAD</span>
        <span id="fileName" style="color:#666;font-size:0.8rem;margin-left:auto;"></span>
    </div>
    <div class="main">
        <div class="sidebar" id="sidebar">
            <h3>Layers</h3>
            <div id="layerList"></div>
            <h3>Entities</h3>
            <div id="entityStats" style="font-size:0.8rem;color:#888;"></div>
        </div>
        <div class="canvas-area" id="canvasArea">
            <div class="drop-zone" id="dropZone">
                <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm-1 2l5 5h-5V4zM6 20V4h5v7h7v9H6z"/></svg>
                <h2>Drop a DXF file here</h2>
                <p>or click to browse</p>
                <button onclick="document.getElementById('fileInput').click()">Choose File</button>
                <input type="file" id="fileInput" accept=".dxf">
            </div>
            <svg id="viewerSvg" style="display:none;" viewBox="0 0 1000 700"></svg>
            <div class="toolbar" id="toolbar" style="display:none;">
                <button onclick="zoomIn()" title="Zoom In">+</button>
                <button onclick="zoomOut()" title="Zoom Out">−</button>
                <button onclick="zoomFit()" title="Fit to View">⊡</button>
                <button onclick="resetView()" title="Reset View">↺</button>
            </div>
            <div style="position:absolute;top:1rem;left:1rem;background:rgba(26,26,46,0.9);border:1px solid #2a2a4a;border-radius:6px;padding:0.4rem 0.75rem;font-size:0.7rem;color:#666;">
                Scroll to zoom · Right-click drag to pan
            </div>
            <div class="info-panel" id="infoPanel">
                <div class="entity-type" id="infoType"></div>
                <div class="entity-detail" id="infoDetail"></div>
            </div>
            <div class="zoom-level" id="zoomLevel">100%</div>
        </div>
    </div>

    <script>
        const viewerSvg = document.getElementById('viewerSvg');
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const layerList = document.getElementById('layerList');
        const entityStats = document.getElementById('entityStats');
        const infoPanel = document.getElementById('infoPanel');
        const infoType = document.getElementById('infoType');
        const infoDetail = document.getElementById('infoDetail');
        const zoomLevel = document.getElementById('zoomLevel');
        const toolbar = document.getElementById('toolbar');
        const fileNameEl = document.getElementById('fileName');

        let svgContent = '';
        let baseViewBox = { x: 0, y: 0, w: 1000, h: 700 };
        let viewBox = { x: 0, y: 0, w: 1000, h: 700 };
        let isPanning = false;
        let panStartX = 0, panStartY = 0;
        let panStartVbX = 0, panStartVbY = 0;

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) loadDxfFile(e.target.files[0]);
        });

        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.style.background = '#1a2a1e'; });
        dropZone.addEventListener('dragleave', () => { dropZone.style.background = ''; });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.style.background = '';
            if (e.dataTransfer.files.length > 0) loadDxfFile(e.dataTransfer.files[0]);
        });

        function loadDxfFile(file) {
            fileNameEl.textContent = file.name;
            const formData = new FormData();
            formData.append('file', file);

            fetch('/dxf-preview', { method: 'POST', body: formData })
                .then(res => {
                    if (!res.ok) {
                        return res.text().then(text => {
                            try {
                                const err = JSON.parse(text);
                                throw new Error(err.detail || 'Unknown error');
                            } catch {
                                throw new Error(text.substring(0, 200));
                            }
                        });
                    }
                    return res.json();
                })
                .then(data => {
                    svgContent = data.svg;
                    baseViewBox = { x: data.viewBox[0], y: data.viewBox[1], w: data.viewBox[2], h: data.viewBox[3] };
                    viewBox = { ...baseViewBox };
                    renderSvg();
                    renderLayers(data.layers);
                    renderEntityStats(data.entityCounts);
                    dropZone.classList.add('hidden');
                    viewerSvg.style.display = 'block';
                    toolbar.style.display = 'flex';
                    zoomFit();
                })
                .catch(err => {
                    alert('Failed to load DXF: ' + err.message);
                });
        }

        function renderSvg() {
            viewerSvg.innerHTML = svgContent;
            viewerSvg.querySelectorAll('line, circle, ellipse, path, polyline, polygon, text').forEach(el => {
                el.style.cursor = 'pointer';
                el.addEventListener('mouseenter', (e) => showEntityInfo(el));
                el.addEventListener('mouseleave', () => { infoPanel.classList.remove('visible'); });
            });
        }

        function renderLayers(layers) {
            layerList.innerHTML = '';
            if (!layers || layers.length === 0) {
                layerList.innerHTML = '<div style="color:#666;font-size:0.8rem;">No layers detected</div>';
                return;
            }
            layers.forEach(layer => {
                const div = document.createElement('div');
                div.className = 'layer-item';
                const color = layer.color || '#777';
                div.innerHTML = `
                    <input type="checkbox" checked data-layer="${layer.name}">
                    <span class="dot" style="background:${color}"></span>
                    <span>${layer.name}</span>
                    <span class="count">${layer.count}</span>
                `;
                div.querySelector('input').addEventListener('change', (e) => {
                    const group = viewerSvg.querySelector(`[data-layer="${layer.name}"]`);
                    if (group) group.style.display = e.target.checked ? '' : 'none';
                });
                layerList.appendChild(div);
            });
        }

        function renderEntityStats(counts) {
            if (!counts) { entityStats.textContent = '0 entities'; return; }
            const total = Object.values(counts).reduce((a, b) => a + b, 0);
            const lines = counts.Line || 0;
            const circles = counts.Circle || 0;
            const polylines = counts.LWPolyline || counts.Polyline || 0;
            const arcs = counts.Arc || 0;
            const texts = counts.Text || counts.MText || 0;
            entityStats.innerHTML = `
                <div>Total: <strong style="color:#00ff88">${total}</strong></div>
                <div style="margin-top:0.25rem;">Lines: ${lines}</div>
                <div>Circles: ${circles}</div>
                <div>Arcs: ${arcs}</div>
                <div>Polylines: ${polylines}</div>
                <div>Text: ${texts}</div>
            `;
        }

        function showEntityInfo(el) {
            const tag = el.tagName.toLowerCase();
            let detail = '';
            if (tag === 'line') {
                detail = `(${el.getAttribute('x1')}, ${el.getAttribute('y1')}) → (${el.getAttribute('x2')}, ${el.getAttribute('y2')})`;
            } else if (tag === 'circle') {
                detail = `Center: (${el.getAttribute('cx')}, ${el.getAttribute('cy')}), R: ${el.getAttribute('r')}`;
            } else if (tag === 'text') {
                detail = `"${el.textContent}"`;
            }
            infoType.textContent = tag.charAt(0).toUpperCase() + tag.slice(1);
            infoDetail.textContent = detail;
            infoPanel.classList.add('visible');
        }

        function updateViewBox() {
            viewerSvg.setAttribute('viewBox', `${viewBox.x} ${viewBox.y} ${viewBox.w} ${viewBox.h}`);
            const zoomPct = Math.round((baseViewBox.w / viewBox.w) * 100);
            zoomLevel.textContent = `${zoomPct}%`;
        }

        function zoomIn() { zoomAt(1.25, viewBox.x + viewBox.w / 2, viewBox.y + viewBox.h / 2); }
        function zoomOut() { zoomAt(0.8, viewBox.x + viewBox.w / 2, viewBox.y + viewBox.h / 2); }

        function zoomAt(factor, cx, cy) {
            const newW = viewBox.w / factor;
            const newH = viewBox.h / factor;
            viewBox.x = cx - newW / 2;
            viewBox.y = cy - newH / 2;
            viewBox.w = newW;
            viewBox.h = newH;
            updateViewBox();
        }

        function zoomFit() {
            if (!svgContent) return;
            viewBox = { ...baseViewBox };
            updateViewBox();
        }

        function resetView() {
            zoomFit();
        }

        viewerSvg.addEventListener('mousedown', (e) => {
            if (e.button !== 2) return;
            e.preventDefault();
            isPanning = true;
            panStartX = e.clientX;
            panStartY = e.clientY;
            panStartVbX = viewBox.x;
            panStartVbY = viewBox.y;
            viewerSvg.classList.add('panning');
        });

        viewerSvg.addEventListener('mousemove', (e) => {
            if (!isPanning) return;
            const dx = (e.clientX - panStartX) * (viewBox.w / viewerSvg.clientWidth);
            const dy = (e.clientY - panStartY) * (viewBox.h / viewerSvg.clientHeight);
            viewBox.x = panStartVbX - dx;
            viewBox.y = panStartVbY - dy;
            updateViewBox();
        });

        window.addEventListener('mouseup', () => {
            isPanning = false;
            viewerSvg.classList.remove('panning');
        });

        viewerSvg.addEventListener('wheel', (e) => {
            e.preventDefault();
            const rect = viewerSvg.getBoundingClientRect();
            const mx = ((e.clientX - rect.left) / rect.width) * viewBox.w + viewBox.x;
            const my = ((e.clientY - rect.top) / rect.height) * viewBox.h + viewBox.y;
            const factor = e.deltaY > 0 ? 0.9 : 1.1;
            const newW = viewBox.w / factor;
            const newH = viewBox.h / factor;
            viewBox.x = mx - (mx - viewBox.x) * (newW / viewBox.w);
            viewBox.y = my - (my - viewBox.y) * (newH / viewBox.h);
            viewBox.w = newW;
            viewBox.h = newH;
            updateViewBox();
        }, { passive: false });

        viewerSvg.addEventListener('contextmenu', (e) => e.preventDefault());
    </script>
</body>
</html>
