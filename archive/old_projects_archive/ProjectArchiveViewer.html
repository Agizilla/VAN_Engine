<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Archive Viewer · Clawdia</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0a0c; --surface: #121214; --surface2: #1a1a1e; --border: #2a2a2e;
  --text: #e4e4e7; --text2: #a1a1aa; --text3: #6b7280;
  --accent: #60a5fa; --accent2: #a78bfa; --green: #4ade80; --yellow: #fbbf24;
  --font: 'SF Mono', 'JetBrains Mono', monospace;
  --font-ui: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --radius: 8px; --radius-sm: 4px;
}
body { font-family: var(--font-ui); background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }
.layout { display: grid; grid-template-columns: 260px 1fr 240px; grid-template-rows: 48px 1fr; height: 100vh; gap: 1px; background: var(--border); }
.toolbar { grid-column: 1 / -1; background: var(--surface2); display: flex; align-items: center; gap: 6px; padding: 0 12px; border-bottom: 1px solid var(--border); }
.toolbar h1 { font-size: 13px; font-weight: 600; color: var(--accent); font-family: var(--font); margin-right: 16px; }
.toolbar button { padding: 5px 10px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text2); font-size: 11px; cursor: pointer; transition: all .12s; white-space: nowrap; }
.toolbar button:hover { background: var(--surface); color: var(--text); border-color: var(--accent); }
.toolbar button.primary { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 500; }
.toolbar .spacer { flex: 1; }
.toolbar .badge { font-size: 10px; color: var(--text3); font-family: var(--font); }

/* LEFT PANEL */
.panel-left { background: var(--surface); overflow: hidden; display: flex; flex-direction: column; }
.panel-left .header { padding: 10px 12px; border-bottom: 1px solid var(--border); font-size: 11px; font-weight: 600; color: var(--accent); text-transform: uppercase; letter-spacing: .05em; }
.search-box { width: 100%; padding: 6px 10px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-size: 11px; outline: none; margin: 6px 8px; width: calc(100% - 16px); }
.search-box:focus { border-color: var(--accent); }
.project-list { flex: 1; overflow-y: auto; padding: 4px 0; }
.project-list::-webkit-scrollbar { width: 4px; }
.project-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.pj-item { padding: 8px 12px; cursor: pointer; font-size: 12px; color: var(--text2); border-left: 2px solid transparent; transition: all .1s; }
.pj-item:hover { background: var(--surface2); }
.pj-item.active { background: rgba(96,165,250,.1); border-left-color: var(--accent); color: var(--text); }
.pj-item .pj-size { font-size: 9px; color: var(--text3); margin-left: 6px; }

/* CENTER PANEL */
.panel-center { background: var(--surface); overflow: hidden; display: flex; flex-direction: column; }
.panel-center .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text3); gap: 8px; font-size: 13px; }
.content-area { flex: 1; overflow-y: auto; padding: 20px 24px; }
.content-area::-webkit-scrollbar { width: 6px; }
.content-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
.content-area h1 { font-size: 20px; margin-bottom: 8px; }
.content-area p { font-size: 13px; line-height: 1.7; color: var(--text2); margin-bottom: 10px; }
.content-area code { font-family: var(--font); font-size: 12px; background: var(--surface2); padding: 1px 5px; border-radius: 3px; color: var(--accent2); }
.content-area pre { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin: 10px 0; overflow-x: auto; font-size: 12px; }
.content-area h2 { font-size: 16px; color: var(--accent); margin: 16px 0 8px; border-bottom: 1px solid var(--border); padding-bottom: 4px; }
.content-area ul { margin: 6px 0 10px 18px; color: var(--text2); font-size: 13px; }
.content-area li { margin-bottom: 3px; }
.content-area strong { color: var(--text); }
.content-area table { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 12px; }
.content-area th, .content-area td { padding: 6px 10px; text-align: left; border-bottom: 1px solid var(--border); }
.content-area th { color: var(--accent); font-size: 10px; text-transform: uppercase; letter-spacing: .05em; }
.content-area td { color: var(--text2); }

/* RIGHT PANEL */
.panel-right { background: var(--surface); overflow: hidden; display: flex; flex-direction: column; }
.panel-right .header { padding: 10px 12px; border-bottom: 1px solid var(--border); font-size: 11px; font-weight: 600; color: var(--accent); text-transform: uppercase; letter-spacing: .05em; display: flex; justify-content: space-between; }
.panel-right .header input { width: 120px; padding: 3px 6px; background: var(--bg); border: 1px solid var(--border); border-radius: 3px; color: var(--text); font-size: 10px; outline: none; }
.file-list { flex: 1; overflow-y: auto; padding: 4px 0; }
.file-list::-webkit-scrollbar { width: 4px; }
.file-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.fl-item { padding: 6px 10px; cursor: pointer; font-size: 11px; color: var(--text2); font-family: var(--font); transition: all .1s; border-radius: 3px; margin: 1px 4px; display: flex; align-items: center; gap: 4px; }
.fl-item:hover { background: var(--surface2); }
.fl-item.active { background: rgba(96,165,250,.1); color: var(--accent); }
.fl-item .ext { font-size: 9px; color: var(--text3); background: var(--border); padding: 1px 4px; border-radius: 2px; }
.fl-empty { padding: 20px; text-align: center; color: var(--text3); font-size: 11px; }

/* CATALOG OVERLAY */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 100; display: none; backdrop-filter: blur(4px); }
.overlay.active { display: flex; align-items: center; justify-content: center; }
.overlay-content { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; width: 80%; max-width: 900px; max-height: 80vh; overflow: auto; padding: 24px; }
.overlay-content h2 { font-size: 16px; color: var(--accent); margin-bottom: 12px; }
.overlay-content .close { float: right; cursor: pointer; color: var(--text3); font-size: 20px; }
.overlay-content .close:hover { color: var(--text); }

/* IFRAME for HTML rendering */
.content-area iframe { width: 100%; height: calc(100vh - 120px); border: none; background: #fff; border-radius: var(--radius); }
</style>
</head>
<body>
<div class="layout">
  <div class="toolbar">
    <h1>📦 Archive Viewer</h1>
    <button class="primary" onclick="showPRDCatalog()">📋 PRD Catalog</button>
    <button onclick="showArchivedCatalog()">🗂️ Archived</button>
    <button onclick="showVANCatalog()">🚀 VAN_Engine</button>
    <button onclick="showMasterDocs()">📄 Master Docs</button>
    <div class="spacer"></div>
    <span class="badge" id="statusBadge">Ready</span>
  </div>

  <div class="panel-left">
    <div class="header">Projects</div>
    <input class="search-box" id="projectSearch" placeholder="Filter..." oninput="filterProjects()">
    <div class="project-list" id="projectList"></div>
  </div>

  <div class="panel-center">
    <div class="content-area" id="contentArea">
      <div class="empty-state">Select a project on the left<br>then pick a file on the right</div>
    </div>
  </div>

  <div class="panel-right">
    <div class="header"><span>Files (.md, .html)</span><input id="fileFilter" placeholder="Filter..." oninput="filterFiles()"></div>
    <div class="file-list" id="fileList"></div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="overlay-content" id="overlayContent">
    <span class="close" onclick="closeOverlay()">&times;</span>
    <div id="overlayBody"></div>
  </div>
</div>

<script>
const PRD_CATALOG_PATH = 'PRD_MasterSkills.md';
let projects = [];
let currentProject = null;
let currentFileType = null;

// ── Scan archive folder ──
async function scanArchived() {
  const dir = document.getElementById('dirInputArchived');
  if (!dir) {
    const input = document.createElement('input');
    input.type = 'file'; input.id = 'dirInputArchived'; input.webkitdirectory = true;
    input.style.display = 'none';
    input.onchange = async () => {
      projects = [];
      const map = {};
      for (const f of input.files) {
        const parts = f.webkitRelativePath.split('/');
        const proj = parts[0];
        if (!map[proj]) map[proj] = { name: proj, files: [], path: f.webkitRelativePath };
        map[proj].files.push({ name: parts.slice(1).join('/'), file: f, ext: f.name.split('.').pop() });
      }
      projects = Object.values(map).sort((a,b) => a.name.localeCompare(b.name));
      renderProjects();
      setStatus(`${projects.length} projects`);
    };
    document.body.appendChild(input);
    input.click();
    return;
  }
  input.click();
}

// ── Master Docs ──
async function showMasterDocs() {
  const dir = document.getElementById('dirInputMaster');
  if (!dir) {
    const input = document.createElement('input');
    input.type = 'file'; input.id = 'dirInputMaster'; input.webkitdirectory = true;
    input.style.display = 'none';
    input.onchange = async () => {
      const docs = [];
      for (const f of input.files) {
        const ext = f.name.split('.').pop().toLowerCase();
        if (['html','md','txt','pdf'].includes(ext)) {
          docs.push({ name: f.name, file: f, ext, path: f.webkitRelativePath });
        }
      }
      showRightPanel(docs, 'Master Docs');
    };
    document.body.appendChild(input);
    input.click();
    return;
  }
  input.click();
}

// ── Show right panel ──
function showRightPanel(files, title) {
  window._rightFiles = files;
  window._rightTitle = title;
  const hdr = document.querySelector('.panel-right .header span');
  hdr.textContent = `${title} (${files.length})`;
  const list = document.getElementById('fileList');
  list.innerHTML = files.map(f => `<div class="fl-item" data-ext="${f.ext}" onclick="openDoc('${f.name.replace(/'/g,"\\'")}')"><span class="ext">.${f.ext}</span> ${f.name}</div>`).join('');
  document.getElementById('fileFilter').value = '';
}

// ── Open doc ──
async function openDoc(name) {
  const files = window._rightFiles;
  const f = files.find(x => x.name === name);
  if (!f) return;
  document.querySelectorAll('.fl-item').forEach(el => el.classList.remove('active'));
  event.target.closest('.fl-item')?.classList.add('active');
  const text = await f.file.text();
  const area = document.getElementById('contentArea');
  if (f.ext === 'html') {
    area.innerHTML = `<iframe srcdoc="${esc(text)}"></iframe>`;
  } else {
    area.innerHTML = marked.parse(text);
  }
}

// ── Render project list ──
function renderProjects(filter) {
  const list = document.getElementById('projectList');
  const q = (filter || '').toLowerCase();
  const filtered = q ? projects.filter(p => p.name.toLowerCase().includes(q)) : projects;
  list.innerHTML = filtered.map(p => {
    const htmlFiles = p.files.filter(f => f.ext === 'html').length;
    const mdFiles = p.files.filter(f => f.ext === 'md').length;
    return `<div class="pj-item" onclick="selectProject('${p.name.replace(/'/g,"\\'")}')">${p.name} <span class="pj-size">${htmlFiles}h ${mdFiles}m</span></div>`;
  }).join('');
}

// ── Select project ──
function selectProject(name) {
  currentProject = projects.find(p => p.name === name);
  if (!currentProject) return;
  document.querySelectorAll('.pj-item').forEach(el => el.classList.remove('active'));
  event.target.classList.add('active');
  const docs = currentProject.files.filter(f => ['md','html'].includes(f.ext));
  showRightPanel(docs, currentProject.name);
  document.getElementById('contentArea').innerHTML = '<div class="empty-state">Select a file from the right panel</div>';
}

// ── PRD Catalog ──
function showPRDCatalog() {
  openOverlay('<p>Opening PRD catalog viewer...</p>');
  const w = window.open('../ClawDia/src/tools/master_skills/prd_viewer.html', '_blank');
  closeOverlay();
}

// ── Show archived catalog (this page) ──
function showArchivedCatalog() {
  const html = `<h2>Archived Project Catalog</h2><table><tr><th>Project</th><th>Files</th><th>HTML</th><th>MD</th></tr>${
    projects.map(p => {
      const h = p.files.filter(f => f.ext === 'html').length;
      const m = p.files.filter(f => f.ext === 'md').length;
      return `<tr><td>${p.name}</td><td>${p.files.length}</td><td>${h}</td><td>${m}</td></tr>`;
    }).join('')
  }</table>`;
  openOverlay(html);
}

// ── Show VAN_Engine catalog ──
async function showVANCatalog() {
  openOverlay('<p>Scanning VAN_Engine...</p>');
  const input = document.createElement('input');
  input.type = 'file'; input.webkitdirectory = true; input.style.display = 'none';
  input.onchange = () => {
    const projs = {};
    for (const f of input.files) {
      const parts = f.webkitRelativePath.split('/');
      const root = parts[0];
      if (!projs[root]) projs[root] = 0;
      projs[root]++;
    }
    const rows = Object.entries(projs).sort((a,b) => a[0].localeCompare(b[0])).map(([n,c]) => `<tr><td>${n}</td><td>${c}</td></tr>`).join('');
    openOverlay(`<h2>VAN_Engine Project Catalog</h2><table><tr><th>Folder</th><th>Files</th></tr>${rows}</table>`);
  };
  document.body.appendChild(input);
  input.click();
}

// ── Overlay ──
function openOverlay(html) {
  document.getElementById('overlayBody').innerHTML = html;
  document.getElementById('overlay').classList.add('active');
}
function closeOverlay() { document.getElementById('overlay').classList.remove('active'); }

// ── Utils ──
function setStatus(s) { document.getElementById('statusBadge').textContent = s; }
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function filterProjects() { renderProjects(document.getElementById('projectSearch').value); }
function filterFiles() {
  const q = (document.getElementById('fileFilter').value || '').toLowerCase();
  document.querySelectorAll('.fl-item').forEach(el => { el.style.display = el.textContent.toLowerCase().includes(q) ? '' : 'none'; });
}

// ── Init ──
scanArchived();
</script>
</body>
</html>
