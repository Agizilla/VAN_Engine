<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Identity Innovator v3.0 - JSON Logic</title>
    <style>
        :root { --primary: #00f2ff; --accent: #ff003c; --bg: #0a0a0a; --panel: #161616; }
        body { font-family: 'Fira Code', monospace; background: var(--bg); color: #ccc; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar for JSON and Controls */
        .sidebar { width: 450px; background: var(--panel); border-right: 1px solid #333; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        
        /* Main Viewport */
        .viewport { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle, #1a1a1a 0%, #0a0a0a 100%); position: relative; }
        
        canvas { border: 1px solid var(--primary); box-shadow: 0 0 20px rgba(0, 242, 255, 0.2); max-width: 90%; max-height: 80vh; background: #000; }

        .json-area { flex: 1; width: 100%; background: #000; color: #00ff41; border: 1px solid #444; padding: 10px; font-size: 12px; margin: 10px 0; border-radius: 4px; resize: none; outline: none; }
        .json-area:focus { border-color: var(--primary); }

        .slider-group { margin-bottom: 10px; }
        label { font-size: 10px; text-transform: uppercase; color: #888; display: block; margin-bottom: 5px; }
        input[type="range"] { width: 100%; accent-color: var(--primary); }
        .val { float: right; color: var(--primary); }

        .upload-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .file-box { background: #222; padding: 8px; border-radius: 4px; font-size: 10px; border: 1px dashed #555; }
        
        .status { font-size: 10px; color: var(--accent); margin-top: 5px; height: 15px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 style="color:var(--primary); margin: 0 0 15px 0; font-size: 18px;">ID_INNOVATOR_v3</h2>
    
    <div class="upload-row">
        <div class="file-box">
            <label>BASE_IMG</label>
            <input type="file" id="baseIn" accept="image/*">
        </div>
        <div class="file-box">
            <label>IDENTITY_FACE</label>
            <input type="file" id="faceIn" accept="image/*">
        </div>
    </div>

    <label>Vector Dictionary (JSON)</label>
    <textarea id="jsonInput" class="json-area" spellcheck="false"></textarea>
    <div id="jsonStatus" class="status"></div>

    <hr style="width:100%; border:0; border-top:1px solid #333; margin: 15px 0;">

    <div class="slider-group">
        <label>Scale <span class="val" id="scaleVal">1.0</span></label>
        <input type="range" id="scaleIn" min="0.1" max="5.0" step="0.01" value="1.0">
    </div>
    <div class="slider-group">
        <label>Rotate <span class="val" id="rotVal">0</span>°</label>
        <input type="range" id="rotIn" min="-180" max="180" value="0">
    </div>
    <div class="slider-group">
        <label>Offset X <span class="val" id="xVal">0</span></label>
        <input type="range" id="xIn" min="-1000" max="1000" value="0">
    </div>
    <div class="slider-group">
        <label>Offset Y <span class="val" id="yVal">0</span></label>
        <input type="range" id="yIn" min="-1000" max="1000" value="0">
    </div>
    <div class="slider-group">
        <label>Feather <span class="val" id="featherVal">20</span></label>
        <input type="range" id="featherIn" min="0" max="150" value="20">
    </div>
</div>

<div class="viewport">
    <canvas id="mainCanvas"></canvas>
</div>

<script>
    // Initial Seed Data
    const defaultData = {
        "landmarks": {
            "jawline": [[0.18, 0.42], [0.20, 0.55], [0.25, 0.68], [0.32, 0.78], [0.40, 0.85], [0.50, 0.88], [0.60, 0.85], [0.68, 0.78], [0.75, 0.68], [0.80, 0.55], [0.82, 0.42]],
            "brow_line": [[0.82, 0.42], [0.75, 0.30], [0.50, 0.28], [0.25, 0.30], [0.18, 0.42]]
        }
    };

    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const jsonInput = document.getElementById('jsonInput');
    const jsonStatus = document.getElementById('jsonStatus');
    
    let baseImg, faceImg;
    let currentVectors = defaultData;

    // Initialize JSON box
    jsonInput.value = JSON.stringify(defaultData, null, 4);

    // Event Listeners
    jsonInput.addEventListener('input', () => {
        try {
            currentVectors = JSON.parse(jsonInput.value);
            jsonStatus.innerText = "✓ JSON VALID";
            jsonStatus.style.color = "#00ff41";
            render();
        } catch(e) {
            jsonStatus.innerText = "✗ INVALID JSON";
            jsonStatus.style.color = "var(--accent)";
        }
    });

    ['scaleIn', 'rotIn', 'xIn', 'yIn', 'featherIn'].forEach(id => {
        document.getElementById(id).oninput = (e) => {
            document.getElementById(id.replace('In', 'Val')).innerText = e.target.value;
            render();
        };
    });

    document.getElementById('baseIn').onchange = async (e) => { baseImg = await loadImage(e.target.files[0]); render(); };
    document.getElementById('faceIn').onchange = async (e) => { faceImg = await loadImage(e.target.files[0]); render(); };

    function loadImage(f) { return new Promise(res => { const img = new Image(); img.onload = () => res(img); img.src = URL.createObjectURL(f); }); }

    function render() {
        if (!baseImg || !faceImg) return;

        canvas.width = baseImg.width;
        canvas.height = baseImg.height;

        const scale = parseFloat(document.getElementById('scaleIn').value);
        const rotation = parseInt(document.getElementById('rotIn').value) * Math.PI / 180;
        const offX = parseInt(document.getElementById('xIn').value);
        const offY = parseInt(document.getElementById('yIn').value);
        const feather = parseInt(document.getElementById('featherIn').value);

        // Draw Base Background
        ctx.drawImage(baseImg, 0, 0);

        // Pathing from JSON Vectors
        ctx.save();
        ctx.beginPath();
        const jaw = currentVectors.landmarks.jawline;
        const brow = currentVectors.landmarks.brow_line;

        ctx.moveTo(jaw[0][0] * canvas.width, jaw[0][1] * canvas.height);
        jaw.forEach(p => ctx.lineTo(p[0] * canvas.width, p[1] * canvas.height));
        brow.forEach(p => ctx.lineTo(p[0] * canvas.width, p[1] * canvas.height));
        ctx.closePath();

        // Clipping & Blending
        if (feather > 0) ctx.filter = `blur(${feather}px)`;
        ctx.clip();

        // Affine Transform
        const cX = 0.5 * canvas.width;
        const cY = 0.5 * canvas.height;
        ctx.translate(cX + offX, cY + offY);
        ctx.rotate(rotation);
        ctx.scale(scale, scale);
        
        ctx.drawImage(faceImg, -cX, -cY, canvas.width, canvas.height);
        ctx.restore();
    }
</script>
</body>
</html>
