<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HOUSE CODEX | LYRICAL ENGINE</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
    
    :root {
      --obsidian: #050505;
      --panel: #0f0f0f;
      --border: #1a1a1a;
      --cyan: #00f3ff;
      --orange: #ffac00;
      --text: #d1d1d1;
    }

    body { 
      background-color: var(--obsidian); 
      color: var(--text); 
      font-family: 'JetBrains Mono', monospace; 
      overflow: hidden;
    }

    .glass-panel {
      background: var(--panel);
      border: 1px solid var(--border);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
    }

    .status-glow {
      box-shadow: 0 0 10px var(--cyan);
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--obsidian); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--cyan); }

    .line-active { border-left: 2px solid var(--cyan); background: rgba(0, 243, 255, 0.05); }
    
    input, select {
      background: var(--obsidian) !important;
      border: 1px solid var(--border) !important;
      color: var(--cyan) !important;
      font-size: 12px !important;
    }
  </style>
</head>
<body class="h-screen flex flex-col p-2 gap-2">

  <!-- TOP COMMAND BAR -->
  <header class="glass-panel p-3 flex items-center justify-between">
    <div class="flex items-center gap-4">
      <div>
        <h1 class="text-sm font-bold tracking-tighter text-cyan-400">HOUSE_CODEX_V3</h1>
        <div class="flex items-center gap-2 text-[10px] text-gray-500">
          <span class="inline-block w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
          ENGINE_STABLE | PORT_7860
        </div>
      </div>
    </div>

    <div class="flex items-center gap-3">
      <div class="flex flex-col items-end">
        <label class="text-[9px] text-gray-500 uppercase">Archetype</label>
        <select id="archetype" class="px-2 py-1 outline-none">
          <option value="Chaos">Chaos</option>
          <option value="Codex">Codex</option>
          <option value="Butler">Butler</option>
        </select>
      </div>
      <div class="flex flex-col items-end">
        <label class="text-[9px] text-gray-500 uppercase">SPB Density</label>
        <input type="number" id="spb" value="16.0" step="0.5" class="w-16 px-2 py-1 outline-none">
      </div>
      <button onclick="generate()" class="bg-cyan-900/30 border border-cyan-500 text-cyan-400 px-4 py-2 text-xs font-bold hover:bg-cyan-500 hover:text-black transition-all">
        EXECUTE_GEN
      </button>
    </div>
  </header>

  <div class="flex-1 flex gap-2 overflow-hidden">
    <!-- LEFT: MONITOR -->
    <aside class="w-64 glass-panel p-4 flex flex-col gap-4 overflow-y-auto">
      <section>
        <h2 class="text-[10px] font-bold text-orange-500 mb-2 underline">PHASE_ANALYSIS</h2>
        <div id="stats" class="text-[11px] leading-relaxed text-gray-400">
          SYSTEM_IDLE...
        </div>
      </section>

      <section class="mt-auto border-t border-gray-800 pt-4">
        <button onclick="copyVerse()" class="w-full mb-2 text-[10px] border border-gray-800 p-2 hover:bg-white/5">COPY_CLEAN_STRING</button>
        <button onclick="toggleCompact()" class="w-full text-[10px] border border-gray-800 p-2 hover:bg-white/5">TOGGLE_FLOAT_HUD</button>
      </section>
    </aside>

    <!-- CENTER: LYRICAL OUTPUT -->
    <main class="flex-1 glass-panel flex flex-col overflow-hidden">
      <div class="p-2 border-b border-gray-800 bg-black/40 flex justify-between items-center">
        <span class="text-[10px] text-gray-500">LYRICAL_STREAM</span>
        <div id="phase_label" class="text-[10px] text-orange-500 font-bold">MODE: STANDBY</div>
      </div>
      
      <div id="verse_output" class="flex-1 overflow-y-auto p-6 space-y-2">
        <p class="text-gray-600 italic">Waiting for intent...</p>
      </div>

      <!-- PROGRESS TRACKER -->
      <div class="h-1 w-full bg-gray-900">
        <div id="phase_indicator" class="h-full bg-cyan-500 transition-all duration-700 w-0"></div>
      </div>
    </main>
  </div>

  <!-- FLOATING HUD -->
  <div id="compact_overlay" class="fixed bottom-6 right-6 w-80 glass-panel p-4 hidden border-cyan-500 z-50">
    <div class="flex justify-between items-center mb-2">
      <span class="text-[10px] text-cyan-400 font-bold">HUD_MONITOR</span>
      <button onclick="toggleCompact()" class="text-red-500 text-xs">X</button>
    </div>
    <div id="compact_verse" class="text-xs text-gray-300 max-h-48 overflow-y-auto leading-relaxed"></div>
  </div>

  <script>
    let apiPort = 7860;
    let lastVerseClean = '';

    async function init() {
      if (window.electronAPI) {
        apiPort = await window.electronAPI.getAPIPort();
      }
      loadStats();
    }

    async function generate() {
      const arch = document.getElementById('archetype').value;
      const spb = document.getElementById('spb').value;
      const out = document.getElementById('verse_output');
      
      out.innerHTML = '<div class="text-cyan-500 animate-pulse text-xs">SYNTHESIZING_LYRICS...</div>';
      
      try {
        const res = await fetch(`http://localhost:${apiPort}/generate`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ archetype: arch, bar_count: 8, spb: parseFloat(spb), use_glue: true })
        });
        const data = await res.json();
        lastVerseClean = data.verse.replace(/#|\||\*\*|##/g, '').trim();
        
        const lines = data.verse.split('\n').filter(l => l.trim().includes('['));
        out.innerHTML = lines.map(line => `
          <div class="p-2 border-b border-gray-800/50 hover:bg-white/5 transition-colors group">
            <span class="text-[10px] text-gray-600 mr-4 group-hover:text-cyan-500">${line.substring(0, 3)}</span>
            <span class="text-sm tracking-tight">${line.substring(line.indexOf(']') + 1)}</span>
          </div>
        `).join('');

        document.getElementById('phase_label').innerText = `MODE: ${arch.toUpperCase()}`;
        document.getElementById('phase_indicator').style.width = '100%';
        document.getElementById('compact_verse').innerText = lastVerseClean;
        loadStats();
      } catch (e) {
        out.innerHTML = `<div class="text-red-500 text-xs">ERR_CONNECTION_FAILED: ${e.message}</div>`;
      }
    }

    async function loadStats() {
      try {
        const res = await fetch(`http://localhost:${apiPort}/stats`);
        const data = await res.json();
        document.getElementById('stats').innerHTML = data.stats.replace(/\n/g, '<br>').replace(/\*\*/g, '');
      } catch (e) {}
    }

    function toggleCompact() {
      const hud = document.getElementById('compact_overlay');
      hud.classList.toggle('hidden');
    }

    async function copyVerse() {
      if (lastVerseClean && window.electronAPI) {
        await window.electronAPI.copyToClipboard(lastVerseClean);
      }
    }

    init();
  </script>
</body>
</html>
