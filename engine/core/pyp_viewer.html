<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>.pyp Viewer</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; color: #e0e0e0; font-family: 'Segoe UI', monospace; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* Toolbar */
.toolbar { background: #16213e; padding: 8px 16px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #0f3460; flex-shrink: 0; }
.toolbar h1 { font-size: 14px; color: #e94560; font-weight: 600; }
.toolbar .spacer { flex: 1; }
.toolbar .project-name { font-size: 13px; color: #a0a0c0; }
.toolbar button, .toolbar label { background: #0f3460; color: #e0e0e0; border: 1px solid #1a4a8a; padding: 6px 14px; font-size: 12px; cursor: pointer; border-radius: 4px; }
.toolbar button:hover, .toolbar label:hover { background: #1a4a8a; }
.toolbar input[type="file"] { display: none; }

/* Main 3-panel */
.main { display: flex; flex: 1; overflow: hidden; }

/* Panels */
.panel-left { width: 220px; min-width: 180px; background: #1a1a2e; border-right: 1px solid #0f3460; display: flex; flex-direction: column; overflow: hidden; }
.panel-center { flex: 1; background: #1e1e36; overflow: auto; padding: 16px 20px; }
.panel-right { width: 200px; min-width: 160px; background: #1a1a2e; border-left: 1px solid #0f3460; display: flex; flex-direction: column; overflow: hidden; }

/* Panel headers */
.panel-header { padding: 8px 12px; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #e94560; border-bottom: 1px solid #0f3460; flex-shrink: 0; background: #141428; }
.panel-section { padding: 6px 12px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; color: #8888aa; border-bottom: 1px solid #0a0a1a; flex-shrink: 0; }

/* Left panel lists */
.file-list { flex: 1; overflow-y: auto; padding: 4px 0; }
.file-item { padding: 6px 14px; font-size: 12px; cursor: pointer; color: #b0b0d0; border-left: 3px solid transparent; }
.file-item:hover { background: #252545; color: #fff; }
.file-item.active { background: #0f3460; color: #fff; border-left-color: #e94560; }
.file-item .badge { float: right; font-size: 9px; color: #666; }

/* Right panel lists */
.artifact-list { flex: 1; overflow-y: auto; padding: 4px 0; }
.artifact-item { padding: 6px 14px; font-size: 11px; cursor: pointer; color: #b0b0d0; }
.artifact-item:hover { background: #252545; color: #fff; }
.artifact-item .icon { margin-right: 6px; }

/* Center content area */
.content-area { max-width: 900px; margin: 0 auto; }
.content-area h2 { color: #e94560; font-size: 18px; margin-bottom: 8px; }
.content-area .meta { color: #888; font-size: 11px; margin-bottom: 16px; }
.content-area pre { background: #0d0d20; border: 1px solid #1a2a4a; border-radius: 6px; padding: 14px; overflow-x: auto; font-size: 12px; line-height: 1.5; }
.content-area code { font-family: 'Cascadia Code', 'Fira Code', monospace; }
.content-area img { max-width: 100%; border-radius: 6px; border: 1px solid #333; }
.content-area .placeholder { color: #555; text-align: center; padding: 60px 20px; font-size: 14px; }
.content-area .placeholder .big-icon { font-size: 48px; margin-bottom: 12px; }

/* Status bar */
.statusbar { background: #141428; padding: 4px 16px; font-size: 11px; color: #666; border-top: 1px solid #0f3460; flex-shrink: 0; }

/* Drop zone overlay */
.drop-zone { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 52, 96, 0.85); z-index: 1000; justify-content: center; align-items: center; flex-direction: column; }
.drop-zone.active { display: flex; }
.drop-zone .drop-text { font-size: 24px; color: #fff; border: 3px dashed #e94560; padding: 40px 60px; border-radius: 12px; }

/* Run dialog */
.dialog-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 999; justify-content: center; align-items: center; }
.dialog-overlay.active { display: flex; }
.dialog { background: #1e1e36; border: 1px solid #0f3460; border-radius: 8px; padding: 24px; min-width: 400px; max-width: 600px; }
.dialog h3 { color: #e94560; margin-bottom: 12px; }
.dialog label { display: block; margin: 8px 0 4px; font-size: 12px; color: #aaa; }
.dialog input { width: 100%; padding: 8px; background: #0d0d20; border: 1px solid #333; color: #e0e0e0; border-radius: 4px; font-size: 13px; }
.dialog .btn-row { margin-top: 16px; display: flex; gap: 8px; justify-content: flex-end; }
.dialog button { padding: 8px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; }
.dialog .btn-run { background: #e94560; color: white; }
.dialog .btn-cancel { background: #333; color: #ccc; }
.dialog .btn-run:hover { background: #ff5a7a; }
.dialog .btn-cancel:hover { background: #444; }
</style>
</head>
<body>

<div class="toolbar">
  <h1>⬡ .pyp</h1>
  <span class="project-name" id="projectName">no project loaded</span>
  <div class="spacer"></div>
  <label for="pypFile">📂 Load .pyp</label>
  <input type="file" id="pypFile" accept=".pyp">
  <button id="extractBtn" disabled style="display:none">📦 Extract All</button>
  <button id="runBtn" disabled>▶ Run</button>
<button id="setupRunBtn" disabled style="display:none">⚙ Run with Setup</button>
</div>

<div class="main">
  <!-- LEFT: PRD files + Code files + TXT files -->
  <div class="panel-left">
    <div class="panel-header">📋 PRD Files</div>
    <div class="file-list" id="prdList"></div>
    <div class="panel-section">📄 Code Files</div>
    <div class="file-list" id="codeList"></div>
  </div>

  <!-- CENTER: Content display -->
  <div class="panel-center" id="centerPanel">
    <div class="content-area" id="contentArea">
      <div class="placeholder">
        <div class="big-icon">⬡</div>
        <p>Drop a <strong>.pyp</strong> file or click <strong>Load .pyp</strong> to begin</p>
        <p style="font-size: 11px; margin-top: 8px; color: #444;">.pyp — self-contained Python skill container</p>
      </div>
    </div>
  </div>

  <!-- RIGHT: Artifacts + INPUTS + OTHER -->
  <div class="panel-right" id="rightPanel">
    <div class="panel-header">📎 Artifacts</div>
    <div class="artifact-list" id="artifactList"></div>
    <div class="panel-section">📥 INPUTS</div>
    <div class="artifact-list" id="inputList"></div>
    <div class="panel-section">📁 OTHER</div>
    <div class="artifact-list" id="otherList"></div>
  </div>
</div>

<div class="statusbar" id="statusbar">Ready</div>

<!-- Drop zone -->
<div class="drop-zone" id="dropZone">
  <div class="drop-text">⬡ Drop .pyp file here</div>
</div>

<!-- Run dialog -->
<div class="dialog-overlay" id="runDialog">
  <div class="dialog">
    <h3 id="dialogTitle">▶ Run Project</h3>
    <div id="dialogArgs"></div>
    <div class="btn-row">
      <button class="btn-cancel" onclick="closeRunDialog()">Cancel</button>
      <button class="btn-run" onclick="executeRun()">▶ Run</button>
    </div>
  </div>
</div>

<script>
// ===== STATE =====
let pypData = null;
let pypFileName = '';
let pypFilePath = '';
let currentView = null;

// ===== FILE LOADING =====
document.getElementById('pypFile').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (file) loadPypFile(file);
  this.value = '';
});

document.addEventListener('dragover', function(e) {
  e.preventDefault();
  document.getElementById('dropZone').classList.add('active');
});
document.addEventListener('dragleave', function(e) {
  if (!e.relatedTarget || e.relatedTarget.closest) {
    document.getElementById('dropZone').classList.remove('active');
  }
});
document.addEventListener('drop', function(e) {
  e.preventDefault();
  document.getElementById('dropZone').classList.remove('active');
  const files = e.dataTransfer.files;
  if (files.length > 0) {
    const f = files[0];
    if (f.name.endsWith('.pyp')) loadPypFile(f);
    else setStatus('✗ Drop a .pyp file');
  }
});

async function loadPypFile(file) {
  try {
    const text = await file.text();
    pypData = JSON.parse(text);
    pypFileName = file.name;
    // Try to get path from file handle
    try {
      if (file.handle) pypFilePath = (await file.handle.queryPermission()) === 'granted' ? file.handle : '';
    } catch(e) {}
    renderProject();
    setStatus(`✓ Loaded ${file.name} — ${pypData.projectName || 'unnamed'}`);
    document.getElementById('runBtn').disabled = false;
    document.getElementById('extractBtn').disabled = false;
    const hasSetup = pypData.setupScript && pypData.setupScript.trim().length > 0;
    document.getElementById('setupRunBtn').style.display = hasSetup ? 'inline-block' : 'none';
    document.getElementById('setupRunBtn').disabled = !hasSetup;
  } catch(e) {
    setStatus(`✗ Error: ${e.message}`);
  }
}

// ===== RENDER =====
function renderProject() {
  if (!pypData) return;
  const name = pypData.projectName || pypFileName.replace('.pyp', '');
  document.getElementById('projectName').textContent = name;
  document.title = name + ' — .pyp Viewer';

  renderPrdList();
  renderCodeList();
  renderArtifactRight();
  clearContent();
}

function renderPrdList() {
  const list = document.getElementById('prdList');
  list.innerHTML = '';
  const prds = pypData.prdFiles || [];
  if (prds.length === 0) {
    list.innerHTML = '<div class="file-item" style="color:#555;cursor:default;">No PRD files</div>';
    return;
  }
  prds.forEach((f, i) => {
    const div = document.createElement('div');
    div.className = 'file-item';
    div.textContent = f.filename || `PRD #${i+1}`;
    div.addEventListener('click', () => showPrd(i));
    list.appendChild(div);
  });
}

function renderCodeList() {
  const list = document.getElementById('codeList');
  list.innerHTML = '';
  let items = [];
  (pypData.pyFiles || []).forEach(f => items.push({ type: 'py', f }));
  (pypData.htmlFiles || []).forEach(f => items.push({ type: 'html', f }));
  (pypData.txtFiles || []).forEach(f => items.push({ type: 'txt', f }));
  (pypData.mdFiles || []).forEach(f => items.push({ type: 'md', f }));

  // Add setup script if present
  if (pypData.setupScript && pypData.setupScript.trim()) {
    items.push({ type: 'setup', f: { filename: 'setup.sh', content: pypData.setupScript } });
  }

  if (items.length === 0) {
    list.innerHTML = '<div class="file-item" style="color:#555;cursor:default;">No code files</div>';
    return;
  }
  items.forEach((item) => {
    const div = document.createElement('div');
    div.className = 'file-item';
    const badge = { py: '🐍', html: '🌐', txt: '📝', md: '📄', setup: '⚙' };
    div.innerHTML = `${badge[item.type] || '📄'} ${item.f.filename}`;
    div.addEventListener('click', () => {
      if (item.type === 'setup') showSetupInContent();
      else showFile(item.type, item.f);
    });
    list.appendChild(div);
  });
}

function renderArtifactRight() {
  const render = (id, items) => {
    const el = document.getElementById(id);
    el.innerHTML = '';
    if (!items || items.length === 0) {
      el.innerHTML = '<div class="artifact-item" style="color:#555;cursor:default;">empty</div>';
      return;
    }
    items.forEach(name => {
      const div = document.createElement('div');
      div.className = 'artifact-item';
      const ext = (name.split('.').pop() || '').toLowerCase();
      const icon = ['png','jpg','jpeg','gif','svg','webp'].includes(ext) ? '🖼' :
                   ['mp3','wav','ogg','flac'].includes(ext) ? '🎵' :
                   ['mp4','webm','avi'].includes(ext) ? '🎬' :
                   ['pdf'].includes(ext) ? '📄' :
                   ['json','yaml','yml','xml','csv'].includes(ext) ? '📊' : '📎';
      div.innerHTML = `<span class="icon">${icon}</span>${name}`;
      div.addEventListener('click', () => showArtifact(name));
      el.appendChild(div);
    });
  };
  render('artifactList', pypData.artifacts || []);
  render('inputList', pypData.inputs || []);
  render('otherList', pypData.other || []);
}

// ===== DISPLAY CONTENT =====
function clearContent() {
  const area = document.getElementById('contentArea');
  area.innerHTML = '<div class="placeholder"><div class="big-icon">⬡</div><p>Select a file from the left or right panel</p></div>';
}

function showPrd(index) {
  const prds = pypData.prdFiles || [];
  if (index < 0 || index >= prds.length) return;
  currentView = { type: 'prd', index };
  const f = prds[index];
  setActivePrd(index);
  const area = document.getElementById('contentArea');
  area.innerHTML = `
    <h2>📋 ${f.filename}</h2>
    <div class="meta">PRD file · ${f.content ? f.content.length + ' chars' : 'empty'}</div>
    <div class="markdown-body">${marked.parse(f.content || '')}</div>
  `;
  // Highlight matching code blocks
  area.querySelectorAll('pre code').forEach(block => {
    block.innerHTML = highlightCode(block.textContent);
  });
}

function showFile(type, f) {
  currentView = { type: 'file', filename: f.filename };
  const area = document.getElementById('contentArea');
  const lang = { py: 'python', html: 'html', txt: 'text', md: 'markdown' };
  const icon = { py: '🐍', html: '🌐', txt: '📝', md: '📄' };

  if (type === 'html') {
    area.innerHTML = `
      <div style="margin-bottom:12px">
        <button onclick="showHtmlPreview('${f.filename.replace(/'/g, "\\'")}')" style="background:#0f3460;color:#e0e0e0;border:1px solid #1a4a8a;padding:6px 14px;font-size:12px;cursor:pointer;border-radius:4px;">🌐 Preview in new tab</button>
        <button onclick="showHtmlSource('${f.filename.replace(/'/g, "\\'")}')" style="background:#0f3460;color:#e0e0e0;border:1px solid #1a4a8a;padding:6px 14px;font-size:12px;cursor:pointer;border-radius:4px;margin-left:8px;">📄 View source</button>
      </div>
      <h2>${icon[type]} ${f.filename}</h2>
      <div class="meta">${type.toUpperCase()} file · ${f.content ? f.content.length + ' chars' : 'empty'}</div>
      <pre><code class="language-${lang[type]}">${escapeHtml(f.content || '')}</code></pre>
    `;
  } else {
    area.innerHTML = `
      <h2>${icon[type]} ${f.filename}</h2>
      <div class="meta">${type.toUpperCase()} file · ${f.content ? f.content.length + ' chars' : 'empty'}</div>
      <pre><code class="language-${lang[type]}">${escapeHtml(f.content || '')}</code></pre>
    `;
  }
}

function showArtifact(name) {
  currentView = { type: 'artifact', name };
  const area = document.getElementById('contentArea');
  const ext = (name.split('.').pop() || '').toLowerCase();

  if (['png','jpg','jpeg','gif','svg','webp'].includes(ext)) {
    area.innerHTML = `
      <h2>🖼 ${name}</h2>
      <div class="meta">Artifact file</div>
      <p style="color:#888;font-size:12px;">Artifact stored in <code>ARTIFACTS/${name}</code> — drop the file below or place it next to the .pyp viewer</p>
      <div style="border:2px dashed #333;border-radius:8px;padding:20px;text-align:center;margin-top:12px;" id="artifactDrop">
        <p style="color:#555;">Drop artifact file here to preview</p>
      </div>
    `;
    const dropZone = document.getElementById('artifactDrop');
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.style.borderColor = '#e94560'; });
    dropZone.addEventListener('dragleave', () => { dropZone.style.borderColor = '#333'; });
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.style.borderColor = '#333';
      const file = e.dataTransfer.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(ev) {
          dropZone.innerHTML = `<img src="${ev.target.result}" style="max-height:500px;">`;
        };
        reader.readAsDataURL(file);
      }
    });
  } else {
    area.innerHTML = `
      <h2>📎 ${name}</h2>
      <div class="meta">Artifact · stored in ARTIFACTS/</div>
      <p style="color:#888;font-size:12px;">This file is stored in the <code>ARTIFACTS/</code> folder alongside the .pyp file.<br>Drop it here to view its contents.</p>
      <div style="border:2px dashed #333;border-radius:8px;padding:20px;text-align:center;margin-top:12px;" id="artifactDrop">
        <p style="color:#555;">Drop file here</p>
      </div>
    `;
    const dropZone = document.getElementById('artifactDrop');
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.style.borderColor = '#e94560'; });
    dropZone.addEventListener('dragleave', () => { dropZone.style.borderColor = '#333'; });
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.style.borderColor = '#333';
      const file = e.dataTransfer.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(ev) {
          const text = ev.target.result;
          dropZone.innerHTML = `<pre style="text-align:left;max-height:400px;overflow:auto;background:#0d0d20;padding:12px;border-radius:4px;font-size:11px;">${escapeHtml(text.substring(0, 5000))}${text.length > 5000 ? '\n\n... (truncated)' : ''}</pre>`;
        };
        reader.readAsText(file);
      }
    });
  }
}

function showHtmlPreview(filename) {
  const f = (pypData.htmlFiles || []).find(x => x.filename === filename);
  if (!f) return;
  const w = window.open('', '_blank');
  w.document.write(f.content);
  w.document.close();
}

function showHtmlSource(filename) {
  const f = (pypData.htmlFiles || []).find(x => x.filename === filename);
  if (!f) return;
  const area = document.getElementById('contentArea');
  area.innerHTML = `
    <h2>🌐 ${f.filename}</h2>
    <div class="meta">HTML source</div>
    <pre><code class="language-html">${escapeHtml(f.content || '')}</code></pre>
  `;
}

// ===== RUN =====
document.getElementById('runBtn').addEventListener('click', openRunDialog);
document.getElementById('setupRunBtn').addEventListener('click', openSetupRunDialog);

function openSetupRunDialog() {
  if (!pypData) return;
  const script = pypData.setupScript || '';
  document.getElementById('dialogTitle').textContent = '⚙ Run with Setup';
  const argsDiv = document.getElementById('dialogArgs');
  argsDiv.innerHTML = `
    <p style="color:#888;font-size:12px;margin-bottom:8px;">This project includes a custom setup script that will run before launch:</p>
    <pre style="background:#0d0d20;border:1px solid #333;border-radius:4px;padding:10px;font-size:11px;max-height:200px;overflow:auto;white-space:pre-wrap;">${escapeHtml(script)}</pre>
  `;
  document.querySelector('.dialog .btn-run').textContent = '⚙ Run with Setup';
  document.getElementById('runDialog').classList.add('active');
  window._setupRunMode = true;
}

function openRunDialog() {
  if (!pypData) return;
  const mainEntry = pypData.mainEntry || 'main.py';
  const isWeb = pypData.isWebProject || false;
  const args = pypData.requiredArgs || [];

  document.getElementById('dialogTitle').textContent = isWeb ? '🌐 Run Web Project' : '▶ Run ' + mainEntry;
  const argsDiv = document.getElementById('dialogArgs');
  argsDiv.innerHTML = '';

  if (isWeb) {
    argsDiv.innerHTML = '<p style="color:#888;font-size:13px;">This is a web project. Click Run to preview in browser.</p>';
    document.querySelector('.dialog .btn-run').textContent = '🌐 Open in Browser';
  } else if (args.length > 0) {
    args.forEach(arg => {
      const lbl = document.createElement('label');
      lbl.textContent = arg;
      const inp = document.createElement('input');
      inp.id = 'arg_' + arg;
      inp.placeholder = `Enter ${arg}...`;
      argsDiv.appendChild(lbl);
      argsDiv.appendChild(inp);
    });
    document.querySelector('.dialog .btn-run').textContent = '▶ Run';
  } else {
    argsDiv.innerHTML = '<p style="color:#888;font-size:13px;">No arguments required. Click Run to execute.</p>';
    document.querySelector('.dialog .btn-run').textContent = '▶ Run';
  }
  document.getElementById('runDialog').classList.add('active');
}

function closeRunDialog() {
  document.getElementById('runDialog').classList.remove('active');
}

function executeRun() {
  if (!pypData) return;

  // Setup run mode
  if (window._setupRunMode) {
    window._setupRunMode = false;
    const script = pypData.setupScript || '';
    setStatus('⚙ Setup script ready. Extract the .pyp, then run:');
    const area = document.getElementById('contentArea');
    area.innerHTML = `
      <h2>⚙ Setup Script</h2>
      <div class="meta">Custom launch instructions for this project</div>
      <pre style="background:#0d0d20;border:1px solid #333;border-radius:6px;padding:14px;font-size:12px;overflow:auto;">${escapeHtml(script)}</pre>
      <p style="color:#888;font-size:12px;margin-top:12px;">Extract the .pyp to a directory, then run the setup.sh script from that directory.</p>
      <button onclick="showSetupInContent()" style="background:#0f3460;color:#e0e0e0;border:1px solid #1a4a8a;padding:6px 14px;font-size:12px;cursor:pointer;border-radius:4px;margin-top:8px;">📄 Show in main panel</button>
    `;
    closeRunDialog();
    return;
  }

  const mainEntry = pypData.mainEntry || 'main.py';
  const isWeb = pypData.isWebProject || false;
  const args = pypData.requiredArgs || [];
  const argValues = {};

  args.forEach(arg => {
    const inp = document.getElementById('arg_' + arg);
    argValues[arg] = inp ? inp.value : '';
  });

  // Build the Python command info
  const pyFiles = pypData.pyFiles || [];
  const htmlFiles = pypData.htmlFiles || [];

  setStatus(`▶ Executing ${mainEntry}...`);

  if (isWeb) {
    const htmlFile = htmlFiles.find(f => f.filename === mainEntry) || htmlFiles[0];
    if (htmlFile) {
      const w = window.open('', '_blank');
      w.document.write(htmlFile.content);
      w.document.close();
      setStatus(`✓ Opened ${mainEntry} in browser`);
    }
  } else {
    // Show run instructions
    const pyFile = pyFiles.find(f => f.filename === mainEntry) || pyFiles[0];
    let msg = `To run ${mainEntry}`;
    if (Object.keys(argValues).length > 0) {
      msg += ' with args: ' + Object.entries(argValues).map(([k,v]) => `${k}=${v || '(empty)'}`).join(', ');
    }
    msg += '\n\nExtract the .pyp first (click Extract All), then:\n  python ' + mainEntry;
    if (Object.values(argValues).filter(Boolean).length > 0) {
      msg += ' ' + Object.values(argValues).filter(Boolean).join(' ');
    }
    alert(msg);
    setStatus(`Instructions shown for ${mainEntry}`);
  }
  closeRunDialog();
}

// ===== EXTRACT =====
document.getElementById('extractBtn').addEventListener('click', extractAll);

async function extractAll() {
  if (!pypData) return;
  setStatus('📦 Extracting...');

  // Create a synthetic download: all files in a "virtual" extraction
  // For now, show the extraction plan and let user download individual files
  const totalFiles = (pypData.pyFiles || []).length + (pypData.htmlFiles || []).length +
                     (pypData.txtFiles || []).length + (pypData.mdFiles || []).length +
                     (pypData.prdFiles || []).length;
  const artifactCount = (pypData.artifacts || []).length;

  const area = document.getElementById('contentArea');
  area.innerHTML = `
    <h2>📦 Extraction Summary</h2>
    <div class="meta">${pypFileName}</div>
    <div style="margin:16px 0;background:#0d0d20;border:1px solid #1a2a4a;border-radius:6px;padding:16px;">
      <p><strong>🐍 Python files:</strong> ${(pypData.pyFiles || []).length}</p>
      <p><strong>🌐 HTML files:</strong> ${(pypData.htmlFiles || []).length}</p>
      <p><strong>📄 Markdown files:</strong> ${(pypData.mdFiles || []).length}</p>
      <p><strong>📝 Text files:</strong> ${(pypData.txtFiles || []).length}</p>
      <p><strong>📋 PRD files:</strong> ${(pypData.prdFiles || []).length}</p>
      <p><strong>📎 Artifacts:</strong> ${artifactCount} files in ARTIFACTS/</p>
      <hr style="border-color:#1a2a4a;margin:12px 0;">
      <p style="color:#888;font-size:12px;">Save individual files by clicking them in the left/right panels and using the download option.</p>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <button onclick="downloadAllAsZip()" style="background:#0f3460;color:#e0e0e0;border:1px solid #1a4a8a;padding:8px 16px;cursor:pointer;border-radius:4px;">📦 Download All as ZIP</button>
      ${(pypData.pyFiles || []).map((f,i) => `<button onclick="downloadFile('py', ${i})" style="background:#141428;color:#b0b0d0;border:1px solid #333;padding:6px 12px;cursor:pointer;border-radius:4px;font-size:11px;">🐍 ${f.filename}</button>`).join('')}
      ${(pypData.htmlFiles || []).map((f,i) => `<button onclick="downloadFile('html', ${i})" style="background:#141428;color:#b0b0d0;border:1px solid #333;padding:6px 12px;cursor:pointer;border-radius:4px;font-size:11px;">🌐 ${f.filename}</button>`).join('')}
    </div>
  `;
  setStatus(`📦 ${totalFiles} text files + ${artifactCount} artifacts`);
}

function downloadFile(type, index) {
  if (!pypData) return;
  let files;
  if (type === 'py') files = pypData.pyFiles;
  else if (type === 'html') files = pypData.htmlFiles;
  else if (type === 'md') files = pypData.mdFiles;
  else if (type === 'txt') files = pypData.txtFiles;
  else if (type === 'prd') files = pypData.prdFiles;
  else return;

  const f = files[index];
  if (!f) return;
  const blob = new Blob([f.content], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = f.filename;
  a.click();
  URL.revokeObjectURL(url);
  setStatus(`✓ Downloaded ${f.filename}`);
}

function downloadAllAsZip() {
  // Use JSZip-like approach or individual downloads
  // For simplicity, download all files individually
  setStatus('📦 Downloading all files...');
  const allFiles = [
    ...(pypData.pyFiles || []).map(f => ({ ...f, prefix: '' })),
    ...(pypData.htmlFiles || []).map(f => ({ ...f, prefix: '' })),
    ...(pypData.mdFiles || []).map(f => ({ ...f, prefix: '' })),
    ...(pypData.txtFiles || []).map(f => ({ ...f, prefix: '' })),
    ...(pypData.prdFiles || []).map(f => ({ ...f, prefix: 'PRD/' })),
  ];
  // Use a simple zip approach: create a multi-download
  allFiles.forEach((f, i) => {
    setTimeout(() => {
      const blob = new Blob([f.content], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = (f.prefix || '') + f.filename;
      a.click();
      URL.revokeObjectURL(url);
    }, i * 100);
  });
  setStatus(`✓ Downloaded ${allFiles.length} files`);
}

// ===== HIGHLIGHTING =====
function showSetupInContent() {
  if (!pypData || !pypData.setupScript) return;
  const area = document.getElementById('contentArea');
  area.innerHTML = `
    <h2>⚙ Setup Script</h2>
    <div class="meta">Custom launch instructions for ${pypData.projectName}</div>
    <pre><code class="language-bash">${escapeHtml(pypData.setupScript)}</code></pre>
  `;
}

function highlightCode(code) {
  // Simple syntax highlighting
  return escapeHtml(code)
    .replace(/(#.*)/g, '<span style="color:#6a9955">$1</span>')
    .replace(/\b(def|class|if|else|elif|for|while|try|except|import|from|return|yield|async|await|with|as|pass|break|continue|lambda|print|True|False|None|self|in|not|and|or|is|del|raise|finally)\b/g, '<span style="color:#569cd6">$1</span>')
    .replace(/"([^"]*)"/g, '<span style="color:#ce9178">"$1"</span>')
    .replace(/'([^']*)'/g, '<span style="color:#ce9178">\'$1\'</span>')
    .replace(/\b(\d+\.?\d*)\b/g, '<span style="color:#b5cea8">$1</span>');
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function setStatus(msg) {
  document.getElementById('statusbar').textContent = msg;
}

function setActivePrd(index) {
  document.querySelectorAll('#prdList .file-item').forEach((el, i) => {
    el.classList.toggle('active', i === index);
  });
  document.querySelectorAll('#codeList .file-item').forEach(el => el.classList.remove('active'));
}
</script>
