const pending = new Map();
function createRequestId(prefix='spec'){return (window.crypto&&window.crypto.randomUUID)?`${prefix}_${window.crypto.randomUUID()}`:`${prefix}_${Date.now()}_${Math.floor(Math.random()*10000)}`;}
function sendToBridge(action,payload={}){
  return new Promise((resolve,reject)=>{
    const requestId=createRequestId(action);
    pending.set(requestId,{resolve,reject});
    if(!window.parent||window.parent===window){pending.delete(requestId);reject(new Error('Bridge host unavailable.'));return;}
    window.parent.postMessage({from:'spec',action,payload,requestId},'*');
    setTimeout(()=>{if(pending.has(requestId)){pending.delete(requestId);reject(new Error(`Timed out waiting for ${action}.`));}},5000);
  });
}
window.addEventListener('message',(event)=>{
  const data=event.data;
  if(!data||data.from!=='dashboard'||data.type!=='bridgeResponse'||!data.payload||!data.payload.requestId){return;}
  const entry=pending.get(data.payload.requestId);
  if(!entry){return;}
  pending.delete(data.payload.requestId);
  entry.resolve(data.payload);
});

let activeColumn='';
function byId(id){return document.getElementById(id);}
function renderLinks(){const host=byId('links');host.innerHTML='';(SPEC.quickLinks||[]).forEach(link=>{const b=document.createElement('button');b.className='btn';b.textContent=link.label;b.onclick=()=>window.location.href=link.url;host.appendChild(b);});}
function renderCards(){const host=byId('cards');host.innerHTML='';(SPEC.liveCards||[]).forEach(card=>{const el=document.createElement('div');el.className='card';el.id=`card_${card.id}`;el.innerHTML=`<strong>${card.label}</strong><div class="value">Checking...</div><div class="detail">Waiting for runtime response.</div>`;host.appendChild(el);});}
function setCard(id,value,detail){const el=byId(`card_${id}`);if(!el)return;el.querySelector('.value').textContent=value;el.querySelector('.detail').textContent=detail;}
function applyFocus(modeId){const mode=(SPEC.focusModes||[]).find(x=>x.id===modeId);activeColumn=mode?mode.column:'';byId('focusNote').textContent=mode?mode.note:'Choose a focus preset to highlight the strongest fit.';document.querySelectorAll('#focusList .btn').forEach(btn=>btn.classList.toggle('primary',btn.dataset.column===activeColumn));renderTable();}
function renderFocus(){const host=byId('focusList');host.innerHTML='';(SPEC.focusModes||[]).forEach(mode=>{const b=document.createElement('button');b.className='btn';b.dataset.column=mode.column;b.textContent=mode.label;b.onclick=()=>applyFocus(mode.id);host.appendChild(b);});}
function cellClass(value,column){const classes=[];if((SPEC.highlightValues||[]).includes(value))classes.push('highlight');const mapped=SPEC.highlightClasses?SPEC.highlightClasses[column]:'';if(mapped&&(SPEC.highlightValues||[]).includes(value))classes.push(mapped);if(column===activeColumn)classes.push('focus-col');return classes.join(' ');}
function renderTable(){const table=document.createElement('table');const thead=document.createElement('thead');const hr=document.createElement('tr');(SPEC.columns||[]).forEach(col=>{const th=document.createElement('th');th.textContent=col;if(col===activeColumn)th.classList.add('focus-col');hr.appendChild(th);});thead.appendChild(hr);table.appendChild(thead);const tbody=document.createElement('tbody');(SPEC.sections||[]).forEach(section=>{const sr=document.createElement('tr');sr.className='section';const td=document.createElement('td');td.colSpan=SPEC.columns.length;td.textContent=section.title;sr.appendChild(td);tbody.appendChild(sr);(section.rows||[]).forEach(row=>{const tr=document.createElement('tr');row.forEach((value,index)=>{const td=document.createElement('td');const column=SPEC.columns[index]||'';td.dataset.label=column;td.textContent=value;const cls=cellClass(value,column);if(cls)td.className=cls;tr.appendChild(td);});tbody.appendChild(tr);});});table.appendChild(tbody);byId('tableHost').replaceChildren(table);}
async function refreshState(){const [bridge,personas,tts,settings]=await Promise.allSettled([sendToBridge('validateBridge'),sendToBridge('personaCatalog',{refreshCatalog:true}),sendToBridge('ttsStatus'),sendToBridge('settingsRead')]);setCard('bridge',bridge.status==='fulfilled'?(bridge.value.success?'Ready':'Attention'):'Offline',bridge.status==='fulfilled'?(bridge.value.message||'Diagnostics complete.'):bridge.reason.message);if(personas.status==='fulfilled'){const count=Array.isArray(personas.value.data?.personas)?personas.value.data.personas.length:0;setCard('personas',String(count),`${count} persona(s) available.`);}else{setCard('personas','Unavailable',personas.reason.message);}if(tts.status==='fulfilled'){setCard('tts',tts.value.data?.ok?'Online':'Unavailable',tts.value.message||'TTS status refreshed.');}else{setCard('tts','Unavailable',tts.reason.message);}if(settings.status==='fulfilled'){const vault=settings.value.data?.settings?.AiModelsVaultRoot||'(not set)';setCard('settings',vault,'Current vault root from bridge-backed settings.');}else{setCard('settings','Unavailable',settings.reason.message);}}
document.addEventListener('DOMContentLoaded',()=>{byId('heading').textContent=SPEC.heading;byId('description').textContent=SPEC.description;renderLinks();renderCards();renderFocus();applyFocus(SPEC.focusModes?.[0]?.id||'');refreshState();byId('refreshBtn').onclick=refreshState;});
