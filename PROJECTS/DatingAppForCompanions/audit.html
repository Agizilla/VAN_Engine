<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>H.E.A.R.T.CORE - Performance Matrix</title>
  <style>
body{margin:0;padding:24px;background:#070b12;color:#e9eef9;font:15px/1.5 'Segoe UI',sans-serif}
.shell{display:grid;gap:18px}
.panel,.hero{background:#111827;border:1px solid #253047;border-radius:18px;padding:20px;box-shadow:0 18px 50px rgba(0,0,0,.35)}
.hero{display:grid;gap:18px}
.eyebrow{display:inline-block;padding:6px 10px;border-radius:999px;background:#16304f;color:#69bfff;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px}
h1,h2,h3,p{margin:0}.muted{color:#94a3b8}
.actions,.cards,.focus-list,.tab-list,.link-list{display:flex;flex-wrap:wrap;gap:10px}
.btn{border:1px solid #334155;border-radius:999px;background:#0b1220;color:#e9eef9;padding:9px 14px;font-weight:700;cursor:pointer}
.btn.primary{background:#69bfff;color:#07111b;border-color:#69bfff}
.card{background:#0b1220;border:1px solid #253047;border-radius:14px;padding:14px;min-width:180px}
.card strong{display:block;color:#94a3b8;font-size:12px;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.value{font-weight:700;font-size:18px}.detail{font-size:13px;color:#94a3b8}
table{width:100%;border-collapse:collapse;background:#0b1220;border-radius:14px;overflow:hidden}
th,td{padding:12px;border-bottom:1px solid #1e293b;text-align:left;vertical-align:top}
th{color:#69bfff;font-size:12px;text-transform:uppercase;letter-spacing:1px}
.section td{background:#101826;color:#94a3b8;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px}
.human{color:#ffd166;font-weight:700}.ai{color:#7ef0b1;font-weight:700}
.highlight{font-weight:700}.gemini{color:#7ef0b1}.claude{color:#ffb089}.deepseek{color:#7cc6ff}.ollama{color:#d8a5ff}
.focus-col{background:#12243b}
.layout{display:grid;grid-template-columns:280px 1fr;gap:18px;min-height:calc(100vh - 48px)}
.sidebar,.surface{background:#111827;border:1px solid #253047;border-radius:18px;padding:18px;box-shadow:0 18px 50px rgba(0,0,0,.35)}
.surface{display:grid;grid-template-rows:auto auto auto 1fr;gap:14px}
.tab-btn,.link-btn,.action-btn{width:100%;text-align:left;border-radius:14px;border:1px solid #253047;background:#0b1220;color:#e9eef9;padding:12px;cursor:pointer}
.tab-btn.active{border-color:#69bfff;background:#12243b}.kicker{display:block;color:#69bfff;font-size:11px;text-transform:uppercase;letter-spacing:1px;font-weight:700}
.summary,.status{font-size:13px;color:#94a3b8}
iframe{width:100%;min-height:620px;border:1px solid #253047;border-radius:16px;background:#06090f}
code{color:#9dd1ff}
@media(max-width:980px){body{padding:14px}.layout{grid-template-columns:1fr}}

</style>
</head>
<body>

<div class="shell">
  <section class="hero">
    <div>
      <div class="eyebrow">Spec Surface / Audit</div>
      <h1 id="heading"></h1>
      <p class="muted" id="description" style="margin-top:10px;"></p>
      <div class="actions" id="links" style="margin-top:14px;"></div>
    </div>
    <div class="cards" id="cards"></div>
  </section>
  <section class="panel">
    <div style="display:flex;justify-content:space-between;gap:12px;align-items:end;margin-bottom:14px;">
      <div>
        <h2>Performance Matrix</h2>
        <p class="muted">Generated from <code>Audit.spec.json</code>.</p>
      </div>
      <button class="btn" id="refreshBtn" type="button">Refresh Live Studio Snapshot</button>
    </div>
    <div id="tableHost"></div>
  </section>
</div>

<script src="bridge_integration.js"></script>
<script>

window.callBridge ??= (action, payload) => window.BridgePortal
  ? window.BridgePortal.sendToBridge(action, payload)
  : Promise.resolve({ success: false, action, message: 'Bridge unavailable in this shell.' });
console.debug('Specs bridge ready:', window.BridgePortal?.isAvailable);


const SPEC = {
  "title": "H.E.A.R.T.CORE - Performance Matrix",
  "heading": "H.E.A.R.T.CORE: Human (25yr) vs. Gemini (Orchestrator) vs. Codex (Architect)",
  "description": "A spec-driven comparison surface for discussing architectural tradeoffs alongside live studio readiness.",
  "quickLinks": [
    {
      "label": "Concept Studio",
      "url": "Concept.html"
    },
    {
      "label": "Persona Vault",
      "url": "Persona_Module.html"
    },
    {
      "label": "Training Lab",
      "url": "Training_Module.html"
    },
    {
      "label": "Studio Settings",
      "url": "Settings_Module.html"
    }
  ],
  "liveCards": [
    {
      "id": "bridge",
      "label": "Bridge Health"
    },
    {
      "id": "personas",
      "label": "Persona Count"
    },
    {
      "id": "tts",
      "label": "TTS Server"
    },
    {
      "id": "checkpoints",
      "label": "Training Checkpoints"
    }
  ],
  "columns": [
    "Area of Expertise",
    "Senior Human (25yr)",
    "Gemini (Orchestrator)",
    "Codex (Architect)"
  ],
  "sections": [
    {
      "title": "Core Engineering",
      "rows": [
        [
          "Coding Velocity",
          "Measured / Strategic",
          "Instantaneous",
          "High / Concise"
        ],
        [
          "Architecture Integrity",
          "Master (Foresees Debt)",
          "Senior (Cross-Module)",
          "Senior (Pattern-Based)"
        ],
        [
          "Problem Framing",
          "Expert (The Soul)",
          "Expert (The Logic)",
          "Lead (The Spec)"
        ]
      ]
    },
    {
      "title": "Forensic & Practical Skills",
      "rows": [
        [
          "Debugging (Race Conditions)",
          "Instinctive / Forensic",
          "Pattern Recognition",
          "Log Analysis"
        ],
        [
          "Legacy Stack Migration",
          "High (Lived Experience)",
          "High (Documentation-based)",
          "Mid (Syntax-based)"
        ],
        [
          "Hardware / DSP Logic",
          "Physical Understanding",
          "Theoretical Expert",
          "API Specialist"
        ]
      ]
    },
    {
      "title": "The Unfair Advantages",
      "rows": [
        [
          "Energy Consumption",
          "Coffee & Calories",
          "Kilowatts / Constant",
          "Kilowatts / Constant"
        ],
        [
          "Contextual Memory",
          "Decades (Emotional/Deep)",
          "Perfect (Session-bound)",
          "Perfect (Session-bound)"
        ],
        [
          "Burnout Resistance",
          "Variable (Needs Smoke Breaks)",
          "Infinite",
          "Infinite"
        ],
        [
          "Creative Novelty",
          "Pure Creation (Original)",
          "High Synthesis (Remix)",
          "Standard Refactor"
        ]
      ]
    }
  ],
  "highlights": {
    "human": [
      "Master (Foresees Debt)",
      "Expert (The Soul)",
      "Instinctive / Forensic",
      "High (Lived Experience)",
      "Physical Understanding",
      "Pure Creation (Original)"
    ],
    "ai": [
      "Instantaneous",
      "Kilowatts / Constant",
      "Perfect (Session-bound)",
      "Infinite"
    ]
  }
};

const pending = new Map();
function createRequestId(prefix='spec'){return (window.crypto&&window.crypto.randomUUID)?`${prefix}_${window.crypto.randomUUID()}`:`${prefix}_${Date.now()}_${Math.floor(Math.random()*10000)}`;}
function sendToBridge(action,payload={}){
  return new Promise((resolve,reject)=>{
    const requestId=createRequestId(action);
    pending.set(requestId,{resolve,reject});
    if(!window.parent||window.parent===window){pending.delete(requestId);reject(new Error('Bridge host unavailable.'));return;}
    window.parent.postMessage({from:'spec',action,payload,requestId},'*');
    setTimeout(()=>{if(pending.has(requestId)){pending.delete(requestId);reject(new Error(`Timed out waiting for ${action}.`));}},5000);
  });
}
window.addEventListener('message',(event)=>{
  const data=event.data;
  if(!data||data.from!=='dashboard'||data.type!=='bridgeResponse'||!data.payload||!data.payload.requestId){return;}
  const entry=pending.get(data.payload.requestId);
  if(!entry){return;}
  pending.delete(data.payload.requestId);
  entry.resolve(data.payload);
});

function byId(id){return document.getElementById(id);}
function renderLinks(){const host=byId('links');host.innerHTML='';(SPEC.quickLinks||[]).forEach(link=>{const b=document.createElement('button');b.className='btn';b.textContent=link.label;b.onclick=()=>window.location.href=link.url;host.appendChild(b);});}
function renderCards(){const host=byId('cards');host.innerHTML='';(SPEC.liveCards||[]).forEach(card=>{const el=document.createElement('div');el.className='card';el.id=`card_${card.id}`;el.innerHTML=`<strong>${card.label}</strong><div class="value">Checking...</div><div class="detail">Waiting for runtime response.</div>`;host.appendChild(el);});}
function setCard(id,value,detail){const el=byId(`card_${id}`);if(!el)return;el.querySelector('.value').textContent=value;el.querySelector('.detail').textContent=detail;}
function classify(value){if((SPEC.highlights?.human||[]).includes(value))return 'human';if((SPEC.highlights?.ai||[]).includes(value))return 'ai';return '';}
function renderTable(){const table=document.createElement('table');const thead=document.createElement('thead');const hr=document.createElement('tr');(SPEC.columns||[]).forEach(col=>{const th=document.createElement('th');th.textContent=col;hr.appendChild(th);});thead.appendChild(hr);table.appendChild(thead);const tbody=document.createElement('tbody');(SPEC.sections||[]).forEach(section=>{const sr=document.createElement('tr');sr.className='section';const td=document.createElement('td');td.colSpan=SPEC.columns.length;td.textContent=section.title;sr.appendChild(td);tbody.appendChild(sr);(section.rows||[]).forEach(row=>{const tr=document.createElement('tr');row.forEach((value,index)=>{const td=document.createElement('td');td.dataset.label=SPEC.columns[index]||'';td.textContent=value;const cls=classify(value);if(cls)td.classList.add(cls);tr.appendChild(td);});tbody.appendChild(tr);});});table.appendChild(tbody);byId('tableHost').replaceChildren(table);}
async function refreshState(){const [bridge,personas,tts,checkpoints]=await Promise.allSettled([sendToBridge('validateBridge'),sendToBridge('personaCatalog',{refreshCatalog:true}),sendToBridge('ttsStatus'),sendToBridge('trainingCheckpoints')]);setCard('bridge',bridge.status==='fulfilled'?(bridge.value.success?'Ready':'Attention'):'Offline',bridge.status==='fulfilled'?(bridge.value.message||'Diagnostics complete.'):bridge.reason.message);if(personas.status==='fulfilled'){const count=Array.isArray(personas.value.data?.personas)?personas.value.data.personas.length:0;setCard('personas',String(count),`${count} persona(s) discovered.`);}else{setCard('personas','Unavailable',personas.reason.message);}if(tts.status==='fulfilled'){const ok=!!tts.value.data?.ok;const loaded=Array.isArray(tts.value.data?.loadedModels)?tts.value.data.loadedModels.length:0;setCard('tts',ok?'Online':'Unavailable',ok?`${loaded} loaded model(s).`:(tts.value.message||'TTS unavailable.'));}else{setCard('tts','Unavailable',tts.reason.message);}if(checkpoints.status==='fulfilled'){const count=Array.isArray(checkpoints.value.data?.checkpoints)?checkpoints.value.data.checkpoints.length:0;setCard('checkpoints',String(count),count?`${count} resume candidate(s) found.`:'No resume checkpoints found yet.');}else{setCard('checkpoints','Unavailable',checkpoints.reason.message);}}
document.addEventListener('DOMContentLoaded',()=>{byId('heading').textContent=SPEC.heading;byId('description').textContent=SPEC.description;renderLinks();renderCards();renderTable();refreshState();byId('refreshBtn').onclick=refreshState;});

</script>
</body>
</html>
