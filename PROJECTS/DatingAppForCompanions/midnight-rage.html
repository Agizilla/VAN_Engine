let loadedImages = {};

function init() {
  // Populate chapter filter
  const chapters = [...new Set(ALL_PANELS.map(p => p.chapter))];
  const sel = document.getElementById('chapterFilter');
  chapters.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c;
    opt.textContent = `Chapter ${c+1}: ${ALL_PANELS.find(p => p.chapter === c).chapter_title}`;
    sel.appendChild(opt);
  });
  filterPanels();
}

function filterPanels() {
  const chapterFilter = parseInt(document.getElementById('chapterFilter').value) || -1;
  const statusFilter = document.getElementById('statusFilter').value;
  const search = document.getElementById('searchInput').value.toLowerCase();

  const filtered = ALL_PANELS.filter(p => {
    if (chapterFilter >= 0 && p.chapter !== chapterFilter) return false;
    if (statusFilter === 'missing' && loadedImages[`${p.chapter}-${p.panel_num}`]) return false;
    if (statusFilter === 'has' && !loadedImages[`${p.chapter}-${p.panel_num}`]) return false;
    if (search) {
      const haystack = (p.visual + ' ' + p.caption + ' ' + Object.values(p.dialogue).join(' ')).toLowerCase();
      if (!haystack.includes(search)) return false;
    }
    return true;
  });

  renderPanels(filtered);
  document.getElementById('panelStats').textContent = `${filtered.length} / ${ALL_PANELS.length} panels`;
}

function renderPanels(panels) {
  const grid = document.getElementById('panelGrid');
  grid.innerHTML = panels.map(p => renderCard(p)).join('');
}

function renderCard(p) {
  const key = `${p.chapter}-${p.panel_num}`;
  const hasImage = !!loadedImages[key];
  const dialogueHtml = Object.entries(p.dialogue).map(([speaker, line]) =>
    `<div class="dialogue"><span class="speaker">${speaker}</span> ${line}</div>`
  ).join('');
  const internalThoughts = p.internal_thought || '';

  const imageHtml = hasImage
    ? `<div class="image-area"><img src="${loadedImages[key]}" onclick="previewImage(this.src)"></div>`
    : `<div class="image-area"><span class="placeholder">No image — search below</span></div>`;

  const searchQuery = encodeURIComponent((p.visual + ' ' + (p.style_note || '') + ' comic art cinematic').slice(0, 200));

  return `
    <div class="panel-card ${hasImage ? 'has-image' : 'missing'}">
      <div class="panel-header">
        <span class="label">Panel ${p.panel_num}</span>
        <span class="chapter">Ch.${p.chapter + 1} — ${p.chapter_title}</span>
      </div>
      <div class="panel-body">
        <div class="visual"><strong>VISUAL</strong> ${p.visual.slice(0, 250)}${p.visual.length > 250 ? '...' : ''}</div>
        ${p.style_note ? `<div class="style-note">${p.style_note.slice(0, 150)}</div>` : ''}
        ${p.sfx ? `<div class="sfx">${p.sfx}</div>` : ''}
        ${dialogueHtml}
        ${p.caption ? `<div class="caption">${p.caption.slice(0, 150)}</div>` : ''}
        ${internalThoughts ? `<div class="internal-thought">${internalThoughts.slice(0, 150)}</div>` : ''}
        ${imageHtml}
        <div class="search-buttons">
          <button class="search-btn google" onclick="searchGoogle('${searchQuery}')">🔍 Google Images</button>
          <button class="search-btn pollinations" onclick="generateImage(${p.chapter}, ${p.panel_num}, '${encodeURIComponent(p.visual.slice(0, 200))}')">🎨 Generate AI</button>
        </div>
      </div>
    </div>
  `;
}

function searchGoogle(query) {
  const url = `https://www.google.com/search?tbm=isch&q=${query}`;
  window.open(url, '_blank');
}

function generateImage(chapter, panelNum, visualDesc) {
  const prompt = decodeURIComponent(visualDesc) + ' cinematic comic art';
  const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?width=512&height=768&model=flux&nologo=true&seed=${Math.floor(Math.random() * 99999)}`;
  const key = `${chapter}-${panelNum}`;
  loadedImages[key] = url;
  filterPanels();
}

function previewImage(src) {
  const overlay = document.createElement('div');
  overlay.className = 'image-preview active';
  overlay.innerHTML = `<span class="close" onclick="this.parentElement.remove()">×</span><img src="${src}">`;
  document.body.appendChild(overlay);
}

window.addEventListener('DOMContentLoaded', init);
</script>
